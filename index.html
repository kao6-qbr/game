<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>修仙转盘 · 波途 · 天衍版</title>
    <style>
        /* ===== 全局样式（与之前相同，省略重复） ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #1a1410;
            color: #d4c9b0;
            font-family: 'Georgia', '宋体', serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-image: radial-gradient(ellipse at 20% 50%, #2a2018 0%, #0d0a08 100%);
        }
        .game-wrapper {
            max-width: 1400px;
            width: 100%;
            background: rgba(30, 24, 20, 0.88);
            border: 2px solid #6a5a4a;
            border-radius: 28px;
            padding: 25px 22px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8), inset 0 0 80px rgba(80, 60, 40, 0.15);
            backdrop-filter: blur(4px);
        }
        .game-title {
            text-align: center;
            font-size: 2rem;
            font-weight: bold;
            letter-spacing: 8px;
            color: #e6d5b8;
            text-shadow: 0 0 20px #b89a6a, 0 2px 4px #000;
            margin-bottom: 16px;
            border-bottom: 1px solid #4a3f34;
            padding-bottom: 10px;
        }
        .game-title small {
            font-size: 0.9rem;
            letter-spacing: 2px;
            color: #a08060;
            display: block;
            margin-top: 2px;
        }
        .main-area {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }
        .left-panel {
            flex: 2.2;
            min-width: 380px;
        }
        .right-panel {
            flex: 1.2;
            min-width: 260px;
            background: rgba(20, 16, 12, 0.65);
            border-radius: 18px;
            padding: 16px 14px;
            border: 1px solid #3d3228;
            max-height: 700px;
            overflow-y: auto;
        }
        .right-panel::-webkit-scrollbar {
            width: 4px;
        }
        .right-panel::-webkit-scrollbar-thumb {
            background: #6a5a4a;
            border-radius: 8px;
        }
        .wheel-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        canvas#wheelCanvas {
            width: 100%;
            max-width: 440px;
            height: auto;
            aspect-ratio: 1/1;
            background: #2a221a;
            border-radius: 50%;
            border: 6px solid #6a5a4a;
            box-shadow: 0 0 40px rgba(180, 140, 100, 0.25), inset 0 0 30px #00000066;
            cursor: pointer;
        }
        .btn-spin {
            margin-top: 14px;
            padding: 10px 36px;
            font-size: 1.3rem;
            font-weight: bold;
            background: #3d3228;
            border: 2px solid #b89a6a;
            color: #e6d5b8;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.2s;
            letter-spacing: 4px;
            text-shadow: 0 0 8px #b89a6a44;
        }
        .btn-spin:hover {
            background: #5a4a3a;
            border-color: #d4b080;
            box-shadow: 0 0 30px #b89a6a33;
        }
        .btn-spin:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            box-shadow: none;
        }
        .subtitle {
            min-height: 56px;
            margin: 10px 0 6px;
            font-size: 1.1rem;
            text-align: center;
            color: #f0e0c8;
            background: rgba(0, 0, 0, 0.55);
            padding: 10px 16px;
            border-radius: 12px;
            border-left: 4px solid #b89a6a;
            transition: all 0.3s;
            width: 100%;
            max-width: 440px;
            line-height: 1.5;
        }
        .subtitle.good {
            border-left-color: #6fc;
            color: #bfe;
        }
        .subtitle.bad {
            border-left-color: #c66;
            color: #fcc;
        }
        .subtitle.special {
            border-left-color: #fa0;
            color: #fea;
            background: rgba(40, 30, 10, 0.7);
        }
        .log-area {
            margin-top: 10px;
            max-height: 140px;
            overflow-y: auto;
            background: #0d0a08cc;
            border-radius: 12px;
            padding: 6px 12px;
            font-size: 0.8rem;
            border: 1px solid #3d3228;
            width: 100%;
            max-width: 440px;
            line-height: 1.6;
        }
        .log-area p {
            margin: 2px 0;
            padding: 2px 0;
            border-bottom: 1px dashed #1f1814;
            color: #c4b8a8;
        }
        .log-area p .highlight {
            color: #f5d080;
        }
        .log-area p .badge {
            color: #d66;
        }
        .log-area p .good {
            color: #8cc;
        }
        .log-area::-webkit-scrollbar {
            width: 3px;
        }
        .log-area::-webkit-scrollbar-thumb {
            background: #5a4a3a;
        }
        .panel-item {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            border-bottom: 1px solid #221c16;
            font-size: 0.9rem;
            flex-wrap: wrap;
            gap: 4px;
        }
        .panel-item .label {
            color: #a09080;
        }
        .panel-item .value {
            color: #ecd8c0;
            font-weight: bold;
        }
        .panel-item .value.gold {
            color: #f5d080;
        }
        .panel-item .value.green {
            color: #8cc;
        }
        .panel-item .value.red {
            color: #d66;
        }
        .progress-bar {
            width: 100%;
            height: 7px;
            background: #1a1410;
            border-radius: 8px;
            overflow: hidden;
            margin: 3px 0 6px;
            border: 1px solid #3d3228;
        }
        .progress-bar .fill {
            height: 100%;
            background: linear-gradient(90deg, #b89a6a, #e6c08a);
            border-radius: 8px;
            transition: width 0.4s;
        }
        .progress-bar .fill.life {
            background: linear-gradient(90deg, #6a8a6a, #8aba8a);
        }
        .progress-bar .fill.cult {
            background: linear-gradient(90deg, #8a6a9a, #b08ac0);
        }
        .ability-tag,
        .law-tag,
        .achieve-tag {
            display: inline-block;
            background: #2a221a;
            padding: 1px 10px;
            border-radius: 12px;
            margin: 2px 3px 2px 0;
            font-size: 0.75rem;
            border: 1px solid #4a3f34;
        }
        .ability-tag.gold {
            border-color: #b89a6a;
            color: #f5d080;
        }
        .law-tag {
            border-color: #6a8aba;
            color: #8ac0e0;
        }
        .law-tag.complete {
            border-color: #f5d080;
            background: #3d3228;
            color: #f5d080;
            box-shadow: 0 0 12px #f5d08044;
        }
        .achieve-tag.locked {
            opacity: 0.35;
            filter: grayscale(0.7);
        }
        .achieve-tag.unlocked {
            border-color: #f5d080;
            color: #f5d080;
            background: #3d3228;
        }
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.88);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
            backdrop-filter: blur(10px);
            flex-direction: column;
        }
        .overlay.show {
            display: flex;
        }
        .overlay-box {
            background: #1a1410;
            border: 2px solid #6a5a4a;
            border-radius: 28px;
            padding: 35px 45px;
            max-width: 800px;
            width: 95%;
            text-align: center;
            box-shadow: 0 0 80px rgba(0, 0, 0, 0.95);
            max-height: 90vh;
            overflow-y: auto;
        }
        .overlay-box h1 {
            font-size: 2.4rem;
            color: #f5d080;
            margin-bottom: 8px;
        }
        .overlay-box p {
            font-size: 1.05rem;
            color: #d4c9b0;
            margin: 8px 0;
            line-height: 1.6;
        }
        .overlay-box .btn-restart {
            margin-top: 22px;
            padding: 10px 36px;
            font-size: 1.1rem;
            background: #3d3228;
            border: 2px solid #b89a6a;
            color: #e6d5b8;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.2s;
            letter-spacing: 2px;
        }
        .overlay-box .btn-restart:hover {
            background: #5a4a3a;
        }
        .overlay-box .spirit-result {
            font-size: 2rem;
            color: #f5d080;
            margin: 15px 0;
            padding: 10px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 12px;
            border: 1px solid #6a5a4a;
        }
        .log-review {
            text-align: left;
            max-height: 300px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            padding: 10px 14px;
            margin: 12px 0;
            border: 1px solid #4a3f34;
            font-size: 0.85rem;
            line-height: 1.5;
        }
        .log-review p {
            margin: 4px 0;
            padding: 2px 0;
            border-bottom: 1px dashed #2a221a;
        }
        .log-review::-webkit-scrollbar {
            width: 4px;
        }
        .log-review::-webkit-scrollbar-thumb {
            background: #6a5a4a;
            border-radius: 8px;
        }
        .life-summary {
            text-align: left;
            background: rgba(0, 0, 0, 0.5);
            border-left: 4px solid #f5d080;
            border-radius: 8px;
            padding: 14px 18px;
            margin: 16px 0 12px 0;
            font-size: 0.95rem;
            line-height: 1.7;
            color: #e6d5b8;
        }
        .life-summary .highlight {
            color: #f5d080;
            font-weight: bold;
        }
        .life-summary .good {
            color: #8cc;
        }
        .life-summary .bad {
            color: #f88;
        }
        .life-summary .special {
            color: #f5d080;
        }
        .avatar-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            border: 1px solid #3d3228;
        }
        .avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            font-weight: bold;
            color: #1a1410;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
            flex-shrink: 0;
            transition: all 0.6s ease;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.6);
            border: 2px solid #6a5a4a;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #3a3a3a;
        }
        .avatar.realm-0 {
            background-color: #6a7a7a;
        }
        .avatar.realm-1 {
            background-color: #7a9a8a;
        }
        .avatar.realm-2 {
            background-color: #4a8aaa;
        }
        .avatar.realm-3 {
            background-color: #9a6aba;
        }
        .avatar.realm-4 {
            background-color: #d4a04a;
        }
        .avatar.realm-5 {
            background-color: #d47a4a;
        }
        .avatar.realm-6 {
            background-color: #c04a5a;
        }
        .avatar.realm-7 {
            background-color: #f5d080;
            box-shadow: 0 0 40px #f5d08088;
        }
        .avatar .realm-char {
            font-size: 28px;
            color: #1a1410;
            font-weight: bold;
            text-shadow: 0 1px 4px rgba(255, 255, 255, 0.2);
        }
        .avatar.pulse {
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0% {
                transform: scale(1);
                box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
            }
            50% {
                transform: scale(1.08);
                box-shadow: 0 0 40px rgba(255, 215, 0, 0.6);
            }
            100% {
                transform: scale(1);
                box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
            }
        }
        .avatar.breakthrough {
            animation: breakthrough 0.8s ease;
        }
        @keyframes breakthrough {
            0% {
                transform: scale(0.5) rotate(-20deg);
                opacity: 0;
            }
            50% {
                transform: scale(1.4) rotate(10deg);
                opacity: 1;
            }
            100% {
                transform: scale(1) rotate(0deg);
                opacity: 1;
            }
        }
        .trib-wheel {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
            max-width: 400px;
        }
        .trib-item {
            padding: 10px 16px;
            background: #2a221a;
            border: 2px solid #4a3f34;
            border-radius: 12px;
            font-size: 1.2rem;
            color: #a09080;
            transition: 0.1s;
            min-width: 60px;
            text-align: center;
            flex: 1 0 auto;
        }
        .trib-item.active {
            border-color: #f5d080;
            color: #f5d080;
            background: #3d3228;
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(245, 208, 128, 0.3);
        }
        .trib-item.success {
            border-color: #6fc;
            color: #8cc;
        }
        .trib-item.fail {
            border-color: #c66;
            color: #f88;
        }
        .trib-item.success.active {
            border-color: #6fc;
            color: #8cc;
            background: #1a3a2a;
            box-shadow: 0 0 30px rgba(100, 255, 200, 0.2);
        }
        .trib-item.fail.active {
            border-color: #c66;
            color: #f88;
            background: #3a1a1a;
            box-shadow: 0 0 30px rgba(255, 100, 100, 0.2);
        }
        .trib-result {
            font-size: 2rem;
            color: #f5d080;
            margin: 10px 0;
            min-height: 60px;
        }
        .trib-result.success {
            color: #8cc;
        }
        .trib-result.fail {
            color: #f88;
        }
        .birth-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 20px 0;
        }
        .birth-item {
            padding: 12px 8px;
            background: rgba(30, 24, 20, 0.6);
            border: 2px solid #3d3228;
            border-radius: 12px;
            font-size: 0.9rem;
            color: #a09080;
            transition: all 0.15s;
            text-align: center;
        }
        .birth-item.active {
            border-color: #f5d080;
            background: rgba(245, 208, 128, 0.15);
            color: #f5d080;
            box-shadow: 0 0 20px rgba(245, 208, 128, 0.3);
            transform: scale(1.05);
        }
        .birth-item .prob {
            display: block;
            font-size: 0.7rem;
            color: #6a5a4a;
            margin-top: 4px;
        }
        .birth-result {
            font-size: 1.8rem;
            color: #f5d080;
            padding: 12px;
            min-height: 60px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            border: 1px solid #6a5a4a;
            margin: 10px 0;
        }
        .sect-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 20px 0;
        }
        .sect-item {
            padding: 12px 8px;
            background: rgba(30, 24, 20, 0.6);
            border: 2px solid #3d3228;
            border-radius: 12px;
            font-size: 0.9rem;
            color: #a09080;
            transition: all 0.15s;
            text-align: center;
        }
        .sect-item.active {
            border-color: #f5d080;
            background: rgba(245, 208, 128, 0.15);
            color: #f5d080;
            box-shadow: 0 0 20px rgba(245, 208, 128, 0.3);
            transform: scale(1.05);
        }
        .sect-item .desc {
            font-size: 0.7rem;
            color: #6a5a4a;
            display: block;
            margin-top: 4px;
        }
        .sect-result {
            font-size: 1.8rem;
            color: #f5d080;
            padding: 12px;
            min-height: 60px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            border: 1px solid #6a5a4a;
            margin: 10px 0;
        }
        @media (max-width: 800px) {
            .game-wrapper {
                padding: 12px;
            }
            .right-panel {
                max-height: 380px;
            }
            .overlay-box {
                padding: 25px 20px;
                margin: 0 16px;
            }
            .birth-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .sect-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .trib-item {
                font-size: 1rem;
                padding: 8px 12px;
                min-width: 50px;
            }
            .avatar {
                width: 48px;
                height: 48px;
            }
            .life-summary {
                font-size: 0.85rem;
                padding: 10px 14px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== 主界面 ===== -->
    <div class="game-wrapper" id="mainMenu" style="display:none;">
        <div class="game-title">修仙转盘 · 波途 <small>天命由运 · 万法归一</small></div>
        <div class="main-area">
            <div class="left-panel">
                <div class="wheel-container">
                    <canvas id="wheelCanvas" width="500" height="500"></canvas>
                    <button class="btn-spin" id="spinBtn">开始修仙</button>
                    <div class="subtitle" id="subtitle">点击转盘，抽取命运之轮</div>
                    <div class="log-area" id="logArea"></div>
                </div>
            </div>
            <div class="right-panel" id="panelContent"></div>
        </div>
    </div>

    <!-- ===== 覆盖层（开始、出生地、灵根、宗门、渡劫、结局） ===== -->
    <div class="overlay show" id="startOverlay">
        <div class="overlay-box">
            <h1 style="font-size:2.8rem;">修仙转盘</h1>
            <p style="font-size:1.2rem; color:#b89a6a;">波照 · 天命伊始</p>
            <button class="btn-restart" id="startBtn">开始波途</button>
        </div>
    </div>
    <div class="overlay" id="birthOverlay">
        <div class="overlay-box">
            <h1>出生地 · 天命之选</h1>
            <p style="color:#b89a6a;">波照将生于何方？</p>
            <div class="birth-grid" id="birthGrid"></div>
            <div class="birth-result" id="birthResult">点击「抽取」决定命运</div>
            <button class="btn-restart" id="drawBirthBtn">抽取出生地</button>
        </div>
    </div>
    <div class="overlay" id="spiritOverlay">
        <div class="overlay-box">
            <h1>灵根测试</h1>
            <p style="color:#b89a6a;">波照正在感应天地灵气...</p>
            <div class="spirit-result" id="spiritResult">???</div>
            <button class="btn-restart" id="testSpiritBtn">测试灵根</button>
        </div>
    </div>
    <div class="overlay" id="sectOverlay">
        <div class="overlay-box">
            <h1>宗门 · 道途之择</h1>
            <p style="color:#b89a6a;">波照将拜入何门何派？</p>
            <div class="sect-grid" id="sectGrid"></div>
            <div class="sect-result" id="sectResult">点击「抽取」决定宗门</div>
            <button class="btn-restart" id="drawSectBtn">抽取宗门</button>
        </div>
    </div>
    <div class="overlay" id="tribOverlay">
        <div class="overlay-box">
            <h1>⚡ 天劫降临 ⚡</h1>
            <p style="color:#b89a6a;" id="tribProbDisplay">点击「渡劫」旋转命运之轮</p>
            <div class="trib-wheel" id="tribWheel"></div>
            <div class="trib-result" id="tribResult">?</div>
            <button class="btn-restart" id="tribBtn">渡劫</button>
        </div>
    </div>
    <div class="overlay" id="endOverlay">
        <div class="overlay-box">
            <h1 id="endTitle">道陨</h1>
            <p id="endDesc"></p>
            <p id="endSummary" style="font-size:0.9rem; color:#a09080; margin-top:8px;"></p>
            <div id="lifeSummary" class="life-summary"></div>
            <div class="log-review" id="endLogReview"></div>
            <button class="btn-restart" id="restartBtn">轮回重修</button>
        </div>
    </div>

    <script>
        // ================================================================
        //  CONFIG — 事件配置（与之前相同，省略重复部分）
        // ================================================================
        const CONFIG = {
            realms: ['炼气', '筑基', '金丹', '元婴', '化神', '合体', '渡劫', '大乘'],
            realmCult: [0, 100, 300, 800, 2000, 5000, 12000, 25000],
            realmLifespan: [100, 150, 250, 400, 600, 900, 1300, Infinity],
            realmCoeff: [1, 2, 3, 4, 5, 6, 7, 8],
            spiritQuality: [
                { name: '下品', prob: 0.40, speed: 0.05, power: 0.03 },
                { name: '中品', prob: 0.35, speed: 0.20, power: 0.12 },
                { name: '上品', prob: 0.20, speed: 0.50, power: 0.25 },
                { name: '极品', prob: 0.05, speed: 1.00, power: 0.45 }
            ],
            spiritCount: [
                { count: 1, prob: 0.30, bonus: 0.00 },
                { count: 2, prob: 0.35, bonus: 0.05 },
                { count: 3, prob: 0.25, bonus: 0.08 },
                { count: 4, prob: 0.08, bonus: 0.12 },
                { count: 5, prob: 0.02, bonus: 0.15 }
            ],
            elements: ['金', '木', '水', '火', '土'],
            elementAbility: { '金': '飞剑', '木': '御风术', '水': '不死之身', '火': '炼丹术', '土': '法天象地' },
            birthlands: [
                { name: '荒芜村落', prob: 0.30, cult: 0, power: 80, items: [], bonusCult: 0, bonusLife: 0, extraPower: 0,
                    desc: '灵气枯竭之地' },
                { name: '边境小镇', prob: 0.25, cult: 10, power: 90, items: [], bonusCult: 0, bonusLife: 10, extraPower: 0,
                    desc: '边陲之地' },
                { name: '灵溪村', prob: 0.20, cult: 30, power: 110, items: ['疗伤药'], bonusCult: 0.05, bonusLife: 0,
                    extraPower: 0, desc: '灵溪之畔' },
                { name: '青云镇', prob: 0.13, cult: 60, power: 140, items: ['御风术'], bonusCult: 0, bonusLife: 0,
                    extraPower: 10, desc: '仙气萦绕' },
                { name: '仙踪城', prob: 0.08, cult: 100, power: 180, items: ['炼丹术', '疗伤药', '疗伤药'], bonusCult: 0,
                    bonusLife: 20, extraPower: 20, desc: '上古遗城' },
                { name: '紫府圣地', prob: 0.04, cult: 150, power: 220, items: ['渡劫丹', '疗伤药', '疗伤药'], bonusCult: 0.15,
                    bonusLife: 30, extraPower: 20, desc: '万古圣地' }
            ],
            sects: [
                { name: '青云宗', prob: 0.35, bonusCult: 0.05, desc: '正道魁首，修仙正统',
                    story: '波照在游历时偶遇青云宗长老，长老见他根骨清奇，便引他拜入山门。青云宗乃正道第一大宗，门规森严，功法中正平和，虽无捷径但胜在稳妥。',
                    special: '' },
                { name: '合欢宗', prob: 0.20, bonusCult: 0.08, desc: '阴阳双修，采补之道',
                    story: '波照在一处秘境中被合欢宗女修所救，对方见他元阳未泄，便邀请他加入合欢宗。此宗以双修采补为功法核心，虽可速成但易招非议。',
                    special: 'caibup' },
                { name: '魔道宗', prob: 0.15, bonusCult: 0.15, desc: '杀伐果断，以战养战',
                    story: '波照被仇家追杀时误入魔道宗地界，魔道宗主见他杀伐果决，强行收他为徒。魔道以战养战，修行极快但处处树敌。',
                    special: 'modao' },
                { name: '丹霞谷', prob: 0.15, bonusCult: 0.06, desc: '丹道圣地，药香萦绕',
                    story: '波照在采药时遇到丹霞谷的采药长老，长老见他识得百草，便引他入谷修行。丹霞谷以丹道立派，丹药供给充足，修行稳中有进。',
                    special: '' },
                { name: '天机阁', prob: 0.10, bonusCult: 0.04, desc: '推演天机，运筹帷幄',
                    story: '波照在破解一座古阵时被天机阁阁主注意到，阁主推算出波照身负大气运，便收他为关门弟子。天机阁擅长推演天机，虽修行缓慢但常有奇遇。',
                    special: '' },
                { name: '万兽山', prob: 0.05, bonusCult: 0.10, desc: '御兽为道，万灵归心',
                    story: '波照在山中偶遇一只受伤的灵兽，救治之后竟引来万兽山之主，对方见波照与灵兽有缘，便引他入山修行。万兽山以御兽闻名，灵兽辅佐修炼事半功倍。',
                    special: '' }
            ],
            abstractEvents: [
                // ---- 正面 ----
                { id: '天降流星', label: '天降流星', desc: '一颗流星坠落在波照面前，其中蕴含一块天外陨铁。', type: 'cult', value: 80,
                    story: (g) => `波照在夜观星象时，忽见一颗流星划破天际，落在不远处。他寻到陨石坑，从中挖出一块拳头大的星辰陨铁，其上星光流转，波照吸收其中精华，修为暴涨80点！` },
                { id: '古树悟道', label: '古树悟道', desc: '波照在一棵万年古树下打坐，忽听树心传来大道之音。', type: 'cult', value: 60,
                    story: (g) => `波照在深山中发现一棵遮天蔽日的古榕树，树干上隐隐有符文浮现。他盘坐树下，入定后听到树心传来阵阵道音，仿佛天地初开时的韵律。醒来后修为大增60点。` },
                { id: '镜花水月', label: '镜花水月', desc: '波照在湖边看到自己的倒影，却从中看到了另一条人生轨迹。', type: 'law', value: '命运',
                    story: (g) => `波照在月下湖畔静立，水中倒影突然扭曲，映出他从未经历过的命运。波照心有所感，悟出命运的虚幻与真实，命运法则+1。` },
                { id: '焚香祈愿', label: '焚香祈愿', desc: '波照在道观中点燃三炷香，虔诚祈愿，香火竟化作一道金光没入眉心。', type: 'cult',
                    value: 50, story: (g) => `波照路遇一座破败道观，观中香火已绝。他心生怜悯，点燃三炷香，祈愿众生平安。香火缭绕间，竟化作一道金光涌入他的识海，修为增长50点。` },
                { id: '石壁留影', label: '石壁留影', desc: '波照在山壁上看到一幅古仙人留下的剑痕，其中蕴含着无上剑意。', type: 'ability',
                    name: '剑心通明', story: (g) => `波照在绝壁前看到一道数丈长的剑痕，深可见骨，剑意凛然。他凝神参悟三日，竟从剑痕中领悟了「剑心通明」的能力。` },
                { id: '灵蝶引路', label: '灵蝶引路', desc: '一只通体散发荧光的灵蝶飞来，在波照面前盘旋，似要引他去某处。', type: 'event',
                    event: '灵蝶奇遇', story: (g) => `波照在林中遇到一只灵蝶，它翩翩飞舞，似乎在指引方向。波照跟随灵蝶来到一处隐秘的山谷，谷中灵气浓郁，他趁机修炼，修为大增。` },
                { id: '幽泉洗髓', label: '幽泉洗髓', desc: '波照寻得一眼幽泉，泉水冰冷刺骨，却能洗涤肉身杂质。', type: 'cult', value: 100,
                    story: (g) => `波照在深山中找到一眼幽泉，泉水漆黑如墨，寒气逼人。他咬牙浸入泉中，一股冰寒之力渗入骨髓，将肉身中的杂质一一逼出。出泉后，修为暴涨100点。` },
                { id: '藏经阁偶遇', label: '藏经阁偶遇', desc: '波照在宗门藏经阁中翻到一本残卷，记录着失传的秘术。', type: 'ability',
                    name: '缩地成寸', story: (g) => `波照在藏经阁的角落发现一本蒙尘的残卷，封面写着「缩地成寸」。他研读之后，竟真的掌握了这门上古遁术。` },
                { id: '雷雨淬体', label: '雷雨淬体', desc: '波照在暴雨中修炼，引天雷之力淬炼肉身。', type: 'cult', value: 90,
                    story: (g) => `波照立于山巅，迎着雷雨修炼。一道闪电劈下，他不闪不避，以肉身硬接，雷光在体表游走，淬炼筋骨。雷雨过后，修为增长90点。` },
                { id: '仙鹤赠药', label: '仙鹤赠药', desc: '一只仙鹤叼着一株灵芝飞到波照面前，放下灵芝后便飞走了。', type: 'item',
                    item: '疗伤药', story: (g) => `一只仙鹤从云中落下，将一株紫芝放在波照面前，长鸣一声后飞走。波照认出这是疗伤圣药，获得疗伤药一枚。` },
                { id: '道侣赠剑', label: '道侣赠剑', desc: '一位神秘女子赠予波照一柄古朴长剑，剑身刻有「断念」二字。', type: 'ability',
                    name: '断念剑意', story: (g) => `波照在渡口遇见一位白衣女子，她将一柄古剑交给波照，说此剑名为「断念」，可斩断执念。波照接过古剑，领悟了断念剑意。` },
                { id: '云海日出', label: '云海日出', desc: '波照在云海上静候日出，第一缕阳光照在脸上时，他豁然开朗。', type: 'cult', value: 70,
                    story: (g) => `波照在高峰之巅守候一夜，当第一缕阳光刺破云海，万丈金光洒落，波照心中多年的困惑突然解开，修为大增70点。` },
                { id: '琴音洗心', label: '琴音洗心', desc: '波照听到山间传来的空灵琴声，心神为之宁澈。', type: 'cult', value: 40,
                    story: (g) => `波照在山中漫步时，忽闻悠扬琴声，如泉水叮咚，洗涤心灵。他循声而去，只见一位白须老者抚琴，却转瞬不见。波照只觉心神清明，修为增长40点。` },
                { id: '神通觉醒', label: '神通觉醒', desc: '波照在战斗中偶然激发体内潜藏的神通之力。', type: 'ability', name: '金刚不坏',
                    story: (g) => `波照在与妖兽搏斗时，危急关头体内突然涌出一股金光，皮肤变得坚如金石，硬抗了妖兽一击。他后知后觉，原来自己觉醒了「金刚不坏」的神通。` },
                { id: '梦回前世', label: '梦回前世', desc: '波照在梦中看到自己前世作为大能的记忆碎片。', type: 'law', value: '生命',
                    story: (g) => `波照在睡梦中走入一片迷雾，看到自己前世是一位寿元悠长的仙人，领悟了生命的真谛。醒来后，生命法则+1。` },
                { id: '奇遇·丹炉', label: '奇遇·丹炉', desc: '波照在一处废墟中发现一座完好的炼丹炉，炉中尚有余温。', type: 'ability',
                    name: '炼丹术', story: (g) => `波照在废墟中发现一座古朴丹炉，炉上刻有「九转还魂」四字。他尝试生火，竟成功炼出一枚丹药，从此掌握了炼丹术。` },
                { id: '感悟·生死', label: '感悟·生死', desc: '波照目睹一只小兽死去，又见新芽破土，忽悟生死轮回。', type: 'law', value: '生命',
                    story: (g) => `波照在林中看到一只幼鹿被猛兽咬死，心中悲悯。却又见旁边一株枯木上冒出绿芽，他顿悟生死相依，生命法则+1。` },
                { id: '奇遇·灵泉', label: '奇遇·灵泉', desc: '波照寻到一眼灵泉，泉水含有浓郁的生命力。', type: 'cult', value: 120,
                    story: (g) => `波照在石缝中发现一眼灵泉，泉水呈乳白色，散发出草木清香。他饮下几口，只觉生机勃勃，修为暴涨120点。` },
                // ---- 负面 ----
                { id: '血月当空', label: '血月当空', desc: '天现血月，波照体内气血翻涌，心魔蠢蠢欲动。', type: 'event', event: '血月心魔',
                    story: (g) => `血月之夜，天空挂着一轮妖异的红月，波照感到一股无名邪火在体内燃烧，心魔趁机入侵。他盘坐凝神，以剑心通明斩断幻象，最终击退心魔，但修为略有损耗。` },
                { id: '古墓惊魂', label: '古墓惊魂', desc: '波照误入一座古墓，墓中机关重重，他历经生死考验。', type: 'event', event: '古墓探险',
                    story: (g) => `波照在一处荒山发现古墓入口，好奇心驱使下进入。墓中暗箭、毒雾、傀儡轮番来袭，他拼尽全力才逃出生天，虽身受轻伤，但捡到了一些陪葬的灵玉，修为增加50点。` },
                { id: '险境·断崖', label: '险境·断崖', desc: '波照在断崖边行走，不慎失足，险些丧命。', type: 'event', event: '断崖惊魂',
                    story: (g) => `波照在悬崖边采摘草药，脚下岩石松动，整个人跌落下去。他拼命抓住崖壁上的藤蔓，这才保住了性命，但手臂被藤蔓割伤，轻伤。` },
                { id: '心魔作祟', label: '心魔作祟', desc: '修炼时心魔入侵，道心不稳。', type: 'event', event: '心魔反噬',
                    story: (g) => `波照闭关修炼时，心魔突然爆发，幻象丛生，他险些走火入魔。拼尽全力才稳住心神，但修为折损不少。` },
                { id: '灵气暴动', label: '灵气暴动', desc: '天地灵气突然狂暴，波照遭受反噬。', type: 'cult', value: -40,
                    story: (g) => `波照修炼之际，天地灵气骤然暴动，如刀割般冲击经脉。他强运功法抵御，却仍被震伤，修为倒退40点。` },
                { id: '雷劫余波', label: '雷劫余波', desc: '他人渡劫引来的天雷波及波照。', type: 'cult', value: -60,
                    story: (g) => `不远处有修士渡劫，一道漏网的天雷劈向波照！他仓促应对，仍被雷光扫中，修为大损60点。` },
                { id: '采阴补阳', label: '采阴补阳', desc: '被邪修偷袭，元阳被夺。', type: 'event', event: '采补',
                    story: (g) => `波照在客栈休息时，被一个修炼采补邪术的男修盯上。对方趁其不备，以迷香将他迷晕，强行采补，波照醒来后元气大伤。` },
                { id: '桃花劫', label: '桃花劫', desc: '波照误入桃花庵，被一群女修缠住。', type: 'event', event: '桃花劫',
                    story: (g) => `波照在深山中发现一座桃花庵，庵中女修个个妖娆妩媚，将他团团围住。波照被灌下迷情酒，险些失身，最终凭借意志力逃脱，但已是精疲力竭。` },
                { id: '合欢酒宴', label: '合欢酒宴', desc: '被邀请参加合欢宗的酒宴，席间暗藏玄机。', type: 'event', event: '合欢酒宴',
                    story: (g) => `波照受邀参加合欢宗的酒宴，席间香艳无比，众女修频频敬酒。波照察觉到酒中有催情之效，巧妙避过，但为了脱身，不得不假装醉倒，狼狈而逃。` },
                { id: '迷情香', label: '迷情香', desc: '被对手释放迷情香，神智迷乱。', type: 'event', event: '迷情香',
                    story: (g) => `波照与人对战时，对方突然释放粉色迷情香，波照吸入后浑身燥热，差点失去理智。他猛咬舌尖，以剧痛清醒，奋力击退对手，却也因此消耗了大量体力。` },
                // ---- 保命道具 ----
                { id: '神秘护符', label: '神秘护符', desc: '波照在古庙中发现一枚护身符，上面刻有“替身”二字。', type: 'item',
                    item: '替身草人', story: (g) => `波照在一座荒废古庙的佛像下发现一个草人，上面缠着红线，灵气流动。他得知这是上古修士炼制的「替身草人」，可在生死之际代死一次。获得替身草人×1。` },
                { id: '药王谷奇遇', label: '药王谷奇遇', desc: '波照误入药王谷，谷中灵药遍地，还得到了一件保命秘宝。', type: 'item',
                    item: '替身草人', story: (g) => `波照在迷雾中迷失，误入药王谷，谷中老者赠他一株千年灵芝和一个替身草人。获得替身草人×1，疗伤药×1。` },
                { id: '上古传承', label: '上古传承', desc: '波照在某洞府中接受一位散仙的衣钵，除了功法还有一件保命法器。', type: 'item',
                    item: '替身草人', story: (g) => `波照在一座残破洞府中发现散仙遗骸，旁边有一枚玉简和一只草人。玉简记载了功法，草人则是散仙炼制的替身傀儡。获得替身草人×1。` }
            ],
            allAbilities: ['飞剑', '御风术', '不死之身', '炼丹术', '法天象地', '剑心通明', '缩地成寸', '金刚不坏', '断念剑意', '天眼通', '元神出窍',
                '撒豆成兵', '呼风唤雨', '点石成金', '隐身术', '定身术', '天罡剑意', '驭兽通灵'
            ],
            deathEndings: [
                '「天雷诛邪」：九霄神雷劈碎元神，形神俱灭。',
                '「心魔噬魂」：执念太深，自斩道基，疯癫而亡。',
                '「寿终正寝」：大限已至，坐化洞府。',
                '「道争陨落」：仇家趁虚而入，一剑穿心。',
                '「大道反噬」：强行感悟法则，爆体为血雾。',
                '「虚空放逐」：被吸入虚无裂缝，永坠时空乱流。',
                '「因果业火」：业火焚身，灼烧四十九日而灭。',
                '「天人五衰」：肉身腐朽，神魂消散。',
                '「万蛊噬心」：剧毒攻心，五脏被蛊虫啃噬殆尽。',
                '「道侣背叛」：渡劫时被至亲从背后刺穿丹田。',
                '「采补反噬」：元阳尽失，精气枯竭而亡。',
                '「石壁压顶」：被坍塌的山洞活埋。',
                '「瘴气侵体」：中毒太深，无药可救。',
                '「寒毒入骨」：修炼冰系功法走火入魔。'
            ],
            achievements: [
                { id: 'fate_reversal', name: '逆天改命', check: g => g.birthland === '紫府圣地' && g.spiritQ.name ===
                    '极品' },
                { id: 'chosen_one', name: '天选之人', check: g => g.spiritQ.name === '极品' && Object.values(g.laws)
                        .some(v => v >= 3) },
                { id: 'nine_lives', name: '九死一生', check: g => g._flagNearDeath && g._flagTribPass },
                { id: 'hundred_year_yuan', name: '百岁元婴', check: g => g.realmIndex >= 3 && g.age < 100 },
                { id: 'revenge', name: '采补复仇者', check: g => g._flagCaibup && g._flagRealmUpAfterCaibup },
                { id: 'law_master', name: '法则之主', check: g => Object.values(g.laws).some(v => v >= 3) },
                { id: 'natural_death', name: '寿终正寝', check: g => g._deathCause === 'lifespan' },
                { id: 'thunder_master', name: '渡劫宗师', check: g => g._consecutiveTrib >= 3 },
                { id: 'arena_champion', name: '擂台霸主', check: g => g._winVillage && g._winArena && g._winTourney },
                { id: 'immortal_legend', name: '不死传说', check: g => g.abilities.includes('不死之身') && g
                    ._flagTribPass },
                { id: 'prodigious', name: '神通广大', check: g => g.abilities.length >= 6 },
                { id: 'chaos_body', name: '混沌之体', check: g => g.spiritCount === 5 },
                { id: 'five_elements', name: '五行俱全', check: g => ['飞剑', '御风术', '不死之身', '炼丹术', '法天象地']
                        .every(a => g.abilities.includes(a)) },
                { id: 'prodigy', name: '天才修士', check: g => g.spiritQ.name === '极品' && g.spiritCount >= 2 },
                { id: 'attribute_master', name: '属性大师', check: g => { let m = 0; for (let el of g
                            .spiritElements)
                        if (g.abilities.includes(CONFIG.elementAbility[el])) m++; return m >= 3; } },
                { id: 'gang_slayer', name: '屠刚勇士', check: g => g._gangKill >= 1 }
            ]
        };

        // ================================================================
        //  游戏状态
        // ================================================================
        let G = {};
        const avatarImageCache = {};

        function initState() {
            G = {
                birthland: '',
                birthlandData: null,
                sect: '',
                sectData: null,
                spiritQ: { name: '下品', speed: 0.05, power: 0.03 },
                spiritCount: 1,
                spiritElements: [],
                realmIndex: 0,
                age: 18,
                cult: 0,
                basePower: 80,
                abilities: [],
                items: { '渡劫丹': 0, '疗伤药': 0, '解毒丹': 0, '替身草人': 0 },
                laws: { '时间': 0, '空间': 0, '命运': 0, '毁灭': 0, '生命': 0 },
                status: '健康',
                logs: [],
                achievements: {},
                _flagNearDeath: false,
                _flagTribPass: false,
                _flagCaibup: false,
                _flagRealmUpAfterCaibup: false,
                _consecutiveTrib: 0,
                _winVillage: false,
                _winArena: false,
                _winTourney: false,
                _villageFails: 0,
                _arenaFails: 0,
                _tourneyFails: 0,
                _gangEncounters: 0,
                _gangKill: 0,
                _sectHero: false,
                _deathCause: '',
                _dead: false,
                _bonusLife: 0,
                _powerBuff: 0,
                _spinLock: false,
                _avatarBreakthrough: false,
                _pendingTrib: false,
                _sectSpecial: '',
                _extraAbilities: []
            };
            CONFIG.achievements.forEach(a => G.achievements[a.id] = false);
        }

        function rand(min, max) { return Math.random() * (max - min) + min; }

        function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

        function drawProb(items) { let r = Math.random(),
                c = 0; for (let it of items) { c += it.prob; if (r < c) return it; } return items[items.length - 1]; }

        // ================================================================
        //  辅助函数（省略与之前相同部分）
        // ================================================================
        function getSpiritDisplay() {
            if (!G.spiritQ || !G.spiritElements) return '未知灵根';
            let q = G.spiritQ.name || '下品';
            let els = G.spiritElements.join('') || '';
            let c = G.spiritCount || 1;
            let suffix = c === 1 ? '灵根' : (c === 5 ? '混沌五灵根' : ['单', '双', '三', '四', '五'][c - 1] + '灵根');
            return `${q}${els}${suffix}`;
        }

        function calcPower() {
            const base = G.birthlandData ? G.birthlandData.power : 80;
            const realmAdd = CONFIG.realmCoeff[G.realmIndex] * 50;
            const abilityAdd = (G.abilities || []).length * 30;
            const specials = ['不死之身', '法天象地', '古神血脉', '神兽伙伴', '金刚不坏', '剑心通明', '断念剑意', '天眼通', '元神出窍'];
            const specialAdd = (G.abilities || []).filter(a => specials.includes(a)).length * 100;
            const lawAdd = G.laws ? Object.values(G.laws).reduce((a, b) => a + b, 0) * 20 : 0;
            const extra = G.birthlandData ? G.birthlandData.extraPower : 0;
            let raw = base + realmAdd + abilityAdd + specialAdd + lawAdd + extra + (G._powerBuff || 0);
            let mult = 1;
            if (G.status === '轻伤') mult *= 0.8;
            if (G.status === '重伤') mult *= 0.5;
            if (G.status === '濒死') mult *= 0.2;
            if (G.status && G.status.includes('中毒')) mult *= 0.9;
            const spiritPower = G.spiritQ ? G.spiritQ.power : 0;
            return Math.floor(raw * mult * (1 + spiritPower));
        }

        function applyCultGain(base) {
            let mult = 1 + (G.birthlandData ? G.birthlandData.bonusCult : 0) + (G.sectData ? G.sectData.bonusCult : 0) + (G
                .spiritQ ? G.spiritQ.speed : 0);
            let match = 0;
            if (G.spiritElements && G.abilities) {
                for (let el of G.spiritElements) {
                    if (G.abilities.includes(CONFIG.elementAbility[el])) match++;
                }
            }
            mult += match * 0.30;
            const cb = CONFIG.spiritCount.find(s => s.count === G.spiritCount)?.bonus || 0;
            mult += cb;
            mult *= (1 + G.realmIndex * 0.2);
            let gain = Math.floor(base * mult);
            return gain;
        }

        function addLog(msg) {
            if (!G.logs) G.logs = [];
            G.logs.push(`【${G.age}岁】波照 ${msg}`);
            if (G.logs.length > 200) G.logs.shift();
            updateLogUI();
        }

        function updateLogUI() {
            const area = document.getElementById('logArea');
            if (area && G.logs) area.innerHTML = G.logs.slice(-25).map(s => `<p>${s}</p>`).join('');
        }

        function setSubtitle(text, cls = '') {
            const el = document.getElementById('subtitle');
            if (el) { el.textContent = text;
                el.className = 'subtitle ' + (cls || ''); }
        }

        // ================================================================
        //  头像更新（与之前相同，省略）
        // ================================================================
        function updateAvatar() {
            const avatarEl = document.getElementById('avatar');
            if (!avatarEl) return;
            const idx = G.realmIndex || 0;
            const chars = ['炼', '筑', '金', '婴', '化', '合', '渡', '仙'];
            let imgSrc = (idx < 2) ? 'obstacle-sprite.png' : 'zhujue.jpg';
            if (avatarImageCache[imgSrc] === true) {
                avatarEl.style.backgroundImage = `url(${imgSrc})`;
                avatarEl.style.backgroundSize = 'cover';
                avatarEl.style.backgroundPosition = 'center';
                avatarEl.innerHTML = '';
                avatarEl.className = 'avatar';
                applyAvatarAnimations(avatarEl, idx);
                return;
            }
            if (avatarImageCache[imgSrc] === false) {
                showTextAvatar(avatarEl, idx, chars);
                return;
            }
            const img = new Image();
            img.onload = function() {
                avatarImageCache[imgSrc] = true;
                avatarEl.style.backgroundImage = `url(${imgSrc})`;
                avatarEl.style.backgroundSize = 'cover';
                avatarEl.style.backgroundPosition = 'center';
                avatarEl.innerHTML = '';
                avatarEl.className = 'avatar';
                applyAvatarAnimations(avatarEl, idx);
            };
            img.onerror = function() {
                avatarImageCache[imgSrc] = false;
                showTextAvatar(avatarEl, idx, chars);
            };
            img.src = imgSrc;
        }

        function applyAvatarAnimations(avatarEl, idx) {
            if (G._avatarBreakthrough) {
                avatarEl.classList.add('breakthrough');
                setTimeout(() => { avatarEl.classList.remove('breakthrough');
                    G._avatarBreakthrough = false; }, 800);
            }
            if (idx === 7) avatarEl.classList.add('pulse');
            else avatarEl.classList.remove('pulse');
        }

        function showTextAvatar(avatarEl, idx, chars) {
            avatarEl.className = `avatar realm-${idx}`;
            avatarEl.innerHTML = `<span class="realm-char">${chars[idx]}</span>`;
            avatarEl.style.backgroundImage = '';
            if (G._avatarBreakthrough) {
                avatarEl.classList.add('breakthrough');
                setTimeout(() => { avatarEl.classList.remove('breakthrough');
                    G._avatarBreakthrough = false; }, 800);
            }
            if (idx === 7) avatarEl.classList.add('pulse');
            else avatarEl.classList.remove('pulse');
        }

        // ================================================================
        //  更新面板
        // ================================================================
        function updatePanel() {
            const p = document.getElementById('panelContent');
            if (!p) return;
            const realm = CONFIG.realms[G.realmIndex] || '炼气';
            const nextCult = G.realmIndex < 7 ? CONFIG.realmCult[G.realmIndex + 1] : Infinity;
            const cultProgress = G.realmIndex < 7 ? (G.cult - CONFIG.realmCult[G.realmIndex]) / (nextCult - CONFIG
                .realmCult[G.realmIndex]) : 1;
            const lifespan = CONFIG.realmLifespan[G.realmIndex] + (G._bonusLife || 0);
            const ageProgress = G.age / lifespan;
            const power = calcPower();
            const smap = { '健康': '❤️', '轻伤': '🟡', '重伤': '🔴', '濒死': '💀', '中毒': '☠️' };
            const avatarHTML = `
                <div class="avatar-container">
                    <div class="avatar" id="avatar"></div>
                    <div>
                        <div style="font-size:1.2rem; font-weight:bold; color:#f5d080;">波照</div>
                        <div style="font-size:0.8rem; color:#a09080;">${G.birthland || ''} · ${G.sect || ''}</div>
                    </div>
                </div>
            `;
            let allAbilities = G.abilities || [];
            let abTags = allAbilities.map(a => `<span class="ability-tag ${CONFIG.elementAbility.includes? '':'gold'}">${a}</span>`)
                .join('');
            let html = avatarHTML + `
                <div class="panel-item"><span class="label">🌱 灵根</span><span class="value gold">${getSpiritDisplay()}</span></div>
                <div class="panel-item"><span class="label">⚔️ 境界</span><span class="value">${realm}</span></div>
                <div class="panel-item"><span class="label">📅 年龄</span><span class="value ${G.age>lifespan*0.9?'red':''}">${G.age}/${lifespan===Infinity?'∞':lifespan}</span></div>
                <div class="progress-bar"><div class="fill life" style="width:${Math.min(ageProgress,1)*100}%"></div></div>
                <div class="panel-item"><span class="label">📈 修为</span><span class="value">${Math.floor(G.cult)}/${nextCult===Infinity?'∞':nextCult}</span></div>
                <div class="progress-bar"><div class="fill cult" style="width:${Math.min(cultProgress,1)*100}%"></div></div>
                <div class="panel-item"><span class="label">⚡ 战力</span><span class="value gold">${Math.floor(power)}</span></div>
                <div class="panel-item"><span class="label">🧬 状态</span><span class="value">${G.status} ${smap[G.status]||'❤️'}</span></div>
                <div class="panel-item"><span class="label">🏯 宗门</span><span class="value gold">${G.sect || '无'}</span></div>
                <div class="panel-item" style="flex-wrap:wrap;"><span class="label">📜 能力</span><span>${abTags || '无'}</span></div>
                <div class="panel-item" style="flex-wrap:wrap;"><span class="label">⚖️ 法则</span><span>${Object.entries(G.laws||{}).map(([k,v])=>`<span class="law-tag ${v>=3?'complete':''}">${k} ${v}/3</span>`).join('')}</span></div>
                <div class="panel-item" style="flex-wrap:wrap;"><span class="label">🏆 成就</span><span>${CONFIG.achievements.map(a=>`<span class="achieve-tag ${G.achievements && G.achievements[a.id]?'unlocked':'locked'}">${a.name}</span>`).join('')}</span></div>
                <div class="panel-item" style="flex-wrap:wrap;"><span class="label">🎒 道具</span><span>${Object.entries(G.items||{}).filter(([k,v])=>v>0).map(([k,v])=>`${k}×${v}`).join(' ')||'无'}</span></div>
            `;
            p.innerHTML = html;
            updateAvatar();
        }

        // ================================================================
        //  成就系统
        // ================================================================
        function checkAchievements() {
            let unlocked = [];
            for (let a of CONFIG.achievements) {
                if (!G.achievements[a.id] && a.check(G)) {
                    G.achievements[a.id] = true;
                    unlocked.push(a.name);
                    let bonus = Math.floor(G.cult * 0.05);
                    G.cult += bonus;
                    addLog(`🏆 解锁成就：${a.name}！修为额外提升${bonus}点（5%）`);
                }
            }
            if (unlocked.length) {
                setSubtitle(`🏆 解锁成就：${unlocked.join('、')}，修为提升！`, 'special');
                updatePanel();
            }
        }

        // ================================================================
        //  状态恢复（含疗伤药）
        // ================================================================
        function recoverStatus() {
            const p = calcPower();
            const bonus = (p > 500 ? 0.05 : 0) + (p > 1000 ? 0.05 : 0);

            if (G.items['疗伤药'] > 0) {
                if (G.status === '重伤') {
                    G.items['疗伤药']--;
                    G.status = '轻伤';
                    setSubtitle('服用疗伤药，重伤→轻伤', 'good');
                    addLog('💊 使用疗伤药，重伤减轻为轻伤');
                    updatePanel();
                    return;
                } else if (G.status === '轻伤') {
                    G.items['疗伤药']--;
                    G.status = '健康';
                    setSubtitle('服用疗伤药，轻伤痊愈！', 'good');
                    addLog('💊 使用疗伤药，轻伤痊愈');
                    updatePanel();
                    return;
                }
            }

            if (G.status === '轻伤' && Math.random() < 0.30 + bonus) {
                G.status = '健康';
                setSubtitle('伤势好转，轻伤已愈！', 'good');
                addLog('伤势恢复，回到健康');
            } else if (G.status === '重伤' && Math.random() < 0.15 + bonus) {
                G.status = '轻伤';
                setSubtitle('伤势好转，重伤→轻伤', 'good');
                addLog('重伤缓解为轻伤');
            } else if (G.status === '濒死') {
                if (G.items['替身草人'] > 0) {
                    G.items['替身草人']--;
                    G.status = '重伤';
                    setSubtitle('替身草人发动！保下一命，重伤', 'special');
                    addLog('🧵 替身草人替你挡下致命一击，状态恢复为重伤');
                    updatePanel();
                    return;
                } else if (Math.random() < 0.05 + (p > 500 ? 0.05 : 0)) {
                    G.status = '重伤';
                    setSubtitle('吊住一口气，濒死→重伤', 'good');
                    addLog('从濒死中缓过来');
                } else {
                    triggerDeath('濒死未能挺过');
                    return;
                }
            }
            updatePanel();
        }

        // ================================================================
        //  波生总结（同前，省略）
        // ================================================================
        function generateLifeSummary() {
            const birthName = G.birthland || '未知之地';
            const birthDesc = G.birthlandData ? G.birthlandData.desc : '';
            const spiritDisplay = getSpiritDisplay();
            const finalRealm = CONFIG.realms[G.realmIndex] || '炼气';
            const age = G.age;
            const sect = G.sect || '无门无派';
            const abilities = G.abilities.length ? G.abilities.join('、') : '无';
            const laws = Object.entries(G.laws).filter(([k, v]) => v > 0).map(([k, v]) => `${k}(${v}/3)`).join('、') || '无';
            const achievements = CONFIG.achievements.filter(a => G.achievements[a.id]).map(a => a.name).join('、') || '无';
            const gangKill = G._gangKill || 0;
            const tribPass = G._flagTribPass ? '成功渡过天劫' : '未渡劫';
            const isAscend = (G.realmIndex === 7 && Object.values(G.laws).some(v => v >= 3));
            const deathCause = G._deathCause || '未知';
            let birthSentence =
                `波照，生于「${birthName}」——${birthDesc}之地。天生拥有「${spiritDisplay}」，根骨不凡，注定与仙道有缘。`;
            let sectSentence = '';
            if (sect !== '无门无派') {
                sectSentence = `少年时偶遇机缘，拜入「${sect}」，从此踏上漫漫修仙路。`;
            } else {
                sectSentence = `少年时未遇名师，独自修行，在红尘中挣扎求索。`;
            }
            let cultSentence =
                `凭借坚韧不拔的意志，波照一路修炼至「${finalRealm}」境界，享寿 ${age} 岁。`;
            let abilitySentence = '';
            if (abilities !== '无') {
                abilitySentence = `他苦修多年，精通多种神通：「${abilities}」；在法则感悟上也颇有建树，触及「${laws}」之真谛。`;
            } else {
                abilitySentence = `虽无惊人神通，但波照一直勤勉修行，不曾懈怠。`;
            }
            let deeds = [];
            if (gangKill > 0) {
                deeds.push('曾与恶徒波刚数次交锋，最终将其斩杀，为一方百姓除害');
            }
            if (tribPass === '成功渡过天劫') {
                deeds.push('成功渡过天劫，修为大进');
            }
            if (achievements !== '无') {
                deeds.push(`一生荣获诸多成就：${achievements}`);
            }
            let deedSentence = deeds.length > 0 ? `波照的一生充满传奇：${deeds.join('；')}。` : '';
            let endingSentence = '';
            if (isAscend) {
                endingSentence = '最终，他在大乘之巅迎来天劫，以无上法力破开虚空，飞升成仙，证得永恒大道！';
            } else if (deathCause === 'lifespan' || deathCause.includes('寿元')) {
                endingSentence = '大限已至，波照于洞府中平静坐化，一生圆满，无憾而去。';
            } else {
                endingSentence = `虽遭遇「${deathCause}」之劫，但他留下的传奇故事，依然在修仙界中流传。`;
            }
            return birthSentence + sectSentence + cultSentence + abilitySentence + deedSentence + endingSentence;
        }

        // ================================================================
        //  死亡与结局
        // ================================================================
        function triggerDeath(reason) {
            if (G._dead) return;
            if (G.items['替身草人'] > 0 && reason !== '寿元耗尽') {
                G.items['替身草人']--;
                G.status = '重伤';
                G._dead = false;
                setSubtitle('替身草人救你一命！', 'special');
                addLog('🧵 替身草人代你应劫，重伤但生还');
                updatePanel();
                return;
            }
            G._dead = true;
            G._deathCause = reason;
            let deathStory = '';
            if (reason === 'lifespan' || reason.includes('寿元')) {
                deathStory = '波照寿元已尽，于洞府中盘膝而坐，面带微笑，化作一道流光消散于天地间。';
            } else if (reason.includes('天劫')) {
                deathStory = '雷劫之下，波照未能撑过，肉身化为齑粉，神魂亦被天雷彻底抹去。';
            } else if (reason.includes('心魔')) {
                deathStory = '心魔爆发，波照陷入无尽幻境，最终道心崩溃，疯癫而亡。';
            } else if (reason.includes('波刚')) {
                deathStory = '波照与波刚的恩怨最终以悲剧收场，他被波刚以邪术吸干精元，化为一具干尸。';
            } else if (reason.includes('采补')) {
                deathStory = '波照沉迷于采补之术，最终反被他人采补，精气枯竭而亡。';
            } else {
                deathStory = `波照遭遇了「${reason}」，不幸陨落，修仙之路就此终止。`;
            }
            const ending = pick(CONFIG.deathEndings);
            document.getElementById('endTitle').textContent = '道陨 · ' + ending.split('：')[0].replace(/[「」]/g, '');
            document.getElementById('endDesc').textContent = deathStory + '\n' + ending;
            document.getElementById('endSummary').textContent =
                `寿元 ${G.age} 岁 · 境界 ${CONFIG.realms[G.realmIndex]||'炼气'} · 战力 ${Math.floor(calcPower())} · 修为 ${Math.floor(G.cult)}`;
            document.getElementById('lifeSummary').textContent = generateLifeSummary();
            const review = document.getElementById('endLogReview');
            review.innerHTML = G.logs.map(s => `<p>${s}</p>`).join('');
            document.getElementById('endOverlay').classList.add('show');
            document.getElementById('spinBtn').disabled = true;
            addLog(`⚠️ 道陨：${ending}`);
        }

        function checkRealmDrop() {
            while (G.realmIndex > 0 && G.cult < CONFIG.realmCult[G.realmIndex]) {
                G.realmIndex--;
                addLog(`⚠️ 修为不足，境界跌落至 ${CONFIG.realms[G.realmIndex]}`);
                setSubtitle(`修为不足，跌落至 ${CONFIG.realms[G.realmIndex]}！`, 'bad');
                let maxLife = CONFIG.realmLifespan[G.realmIndex] + (G._bonusLife || 0);
                if (G.age > maxLife) { triggerDeath('境界跌落导致寿元耗尽'); return; }
                updatePanel();
            }
        }

        // ================================================================
        //  渡劫转盘
        // ================================================================
        let tribResolve = null;
        let tribSuccess = false;

        function showTribWheel(baseProb, success) {
            return new Promise((resolve) => {
                tribResolve = resolve;
                tribSuccess = success;
                const overlay = document.getElementById('tribOverlay');
                const wheel = document.getElementById('tribWheel');
                const resultEl = document.getElementById('tribResult');
                const probDisplay = document.getElementById('tribProbDisplay');
                const btn = document.getElementById('tribBtn');
                const pct = Math.round(baseProb);
                probDisplay.textContent = `⚡ 当前渡劫成功率：${pct}%  · 点击「渡劫」旋转命运之轮`;
                const totalSlots = 8;
                const successSlots = Math.round((baseProb / 100) * totalSlots);
                const failSlots = totalSlots - successSlots;
                let slots = [];
                for (let i = 0; i < successSlots; i++) slots.push('success');
                for (let i = 0; i < failSlots; i++) slots.push('fail');
                for (let i = slots.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [slots[i], slots[j]] = [slots[j], slots[i]];
                }
                if (successSlots === 0) slots = ['fail', 'fail', 'fail', 'fail', 'fail', 'fail', 'fail', 'fail'];
                if (failSlots === 0) slots = ['success', 'success', 'success', 'success', 'success', 'success', 'success',
                    'success'
                ];
                wheel.innerHTML = '';
                slots.forEach((type, idx) => {
                    const div = document.createElement('div');
                    div.className = `trib-item ${type}`;
                    div.dataset.index = idx;
                    div.dataset.type = type;
                    div.textContent = type === 'success' ? '✅ 成功' : '❌ 失败';
                    wheel.appendChild(div);
                });
                resultEl.textContent = '?';
                resultEl.className = 'trib-result';
                btn.disabled = false;
                overlay.classList.add('show');
            });
        }

        document.getElementById('tribBtn').addEventListener('click', function() {
            const btn = this;
            if (btn.disabled) return;
            btn.disabled = true;
            const wheel = document.getElementById('tribWheel');
            const items = wheel.querySelectorAll('.trib-item');
            const resultEl = document.getElementById('tribResult');
            const targetType = tribSuccess ? 'success' : 'fail';
            let count = 0;
            const maxCount = 20 + Math.floor(Math.random() * 10);
            const interval = 80;
            const timer = setInterval(() => {
                items.forEach(el => el.classList.remove('active'));
                const showIdx = Math.floor(Math.random() * items.length);
                items[showIdx].classList.add('active');
                count++;
                if (count >= maxCount) {
                    clearInterval(timer);
                    items.forEach(el => el.classList.remove('active'));
                    let targetEl = null;
                    for (let el of items) {
                        if (el.dataset.type === targetType) {
                            targetEl = el;
                            break;
                        }
                    }
                    if (targetEl) targetEl.classList.add('active');
                    else items[0].classList.add('active');
                    const label = tribSuccess ? '✅ 渡劫成功！' : '❌ 渡劫失败…';
                    resultEl.textContent = label;
                    resultEl.className = 'trib-result ' + (tribSuccess ? 'success' : 'fail');
                    setTimeout(() => {
                        document.getElementById('tribOverlay').classList.remove('show');
                        if (tribResolve) {
                            tribResolve(tribSuccess);
                            tribResolve = null;
                        }
                        btn.disabled = false;
                    }, 1200);
                }
            }, interval);
        });

        // ================================================================
        //  渡劫逻辑
        // ================================================================
        async function attemptTribulation() {
            if (G.realmIndex >= 7) return;
            if (G.cult < CONFIG.realmCult[G.realmIndex + 1]) {
                setSubtitle('修为不足，无法渡劫', 'bad');
                return;
            }
            if (G.realmIndex < 2) {
                G.realmIndex++;
                G._consecutiveTrib = (G._consecutiveTrib || 0) + 1;
                G._flagTribPass = true;
                G.status = '健康';
                G._avatarBreakthrough = true;
                setSubtitle(`🎉 突破成功！当前境界：${CONFIG.realms[G.realmIndex]}`, 'good');
                addLog(`🎉 突破成功！晋升至 ${CONFIG.realms[G.realmIndex]}`);
                updatePanel();
                checkAchievements();
                checkRealmDrop();
                if (G.realmIndex < 7 && G.cult >= CONFIG.realmCult[G.realmIndex + 1]) {
                    await attemptTribulation();
                }
                return;
            }
            if (G.realmIndex === 5 && !Object.values(G.laws).some(v => v >= 1)) {
                setSubtitle('法则雏形缺失，瓶颈凝滞！', 'bad');
                addLog('法则不全，无法渡劫');
                return;
            }
            let power = calcPower();
            let baseProb = Math.min(99, 50 + (power - 100) / 20);
            if (G.items['渡劫丹'] > 0) {
                G.items['渡劫丹']--;
                baseProb = Math.max(baseProb, 90);
                addLog('消耗渡劫丹');
            }
            baseProb = Math.min(99, Math.max(0, baseProb));
            const success = Math.random() * 100 < baseProb;
            await showTribWheel(baseProb, success);
            if (success) {
                G.realmIndex++;
                G._consecutiveTrib = (G._consecutiveTrib || 0) + 1;
                G._flagTribPass = true;
                G.status = '健康';
                G._avatarBreakthrough = true;
                if (Math.random() * 100 < 40) {
                    let keys = Object.keys(G.laws);
                    let l = pick(keys);
                    G.laws[l] = (G.laws[l] || 0) + 1;
                    addLog(`⚡ 天降机缘！领悟 ${l} 法则！`);
                    setSubtitle(`领悟 ${l} 法则！（${G.laws[l]}/3）`, 'special');
                } else {
                    let consolation = Math.floor(G.cult * 0.05);
                    G.cult += consolation;
                    addLog(`未能领悟法则，但获得 ${consolation} 修为补偿`);
                    setSubtitle('未能领悟法则，略有遗憾', 'bad');
                }
                setSubtitle(`渡劫成功！突破至 ${CONFIG.realms[G.realmIndex]}`, 'good');
                if (G.realmIndex === 7 && Object.values(G.laws).some(v => v >= 3)) {
                    setSubtitle('🎉 飞升成仙！', 'special');
                    addLog('🎉 飞升成仙！通关！');
                    document.getElementById('endTitle').textContent = '🎉 飞升成仙！';
                    document.getElementById('endDesc').textContent = '波照历经万劫，终证大道，逍遥长生！';
                    document.getElementById('endSummary').textContent =
                        `寿元 ${G.age} 岁 · 境界 大乘 · 战力 ${Math.floor(calcPower())} · 修为 ${Math.floor(G.cult)}`;
                    document.getElementById('lifeSummary').textContent = generateLifeSummary();
                    document.getElementById('endLogReview').innerHTML = G.logs.map(s => `<p>${s}</p>`).join('');
                    document.getElementById('endOverlay').classList.add('show');
                    document.getElementById('spinBtn').disabled = true;
                    return;
                }
                updatePanel();
                checkAchievements();
                checkRealmDrop();
            } else {
                let deathRate = 0.05 + (G.realmIndex >= 3 ? 0.05 : 0) + (G.realmIndex >= 5 ? 0.05 : 0) + (G.realmIndex >= 6 ?
                    0.05 : 0);
                if (Math.random() < deathRate) {
                    if (G.items['替身草人'] > 0) {
                        G.items['替身草人']--;
                        G.status = '重伤';
                        setSubtitle('替身草人挡下天劫！', 'special');
                        addLog('🧵 替身草人代你承受天劫之威，重伤但生还');
                        checkRealmDrop();
                    } else {
                        triggerDeath('渡劫失败，魂飞魄散');
                        return;
                    }
                } else {
                    G.cult *= 0.6;
                    G.age += 15;
                    G.status = '重伤';
                    setSubtitle('渡劫失败，重伤！', 'bad');
                    addLog('渡劫失败，重伤');
                    checkRealmDrop();
                }
                G._consecutiveTrib = 0;
                updatePanel();
            }
        }
