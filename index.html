<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>修仙转盘 · 波途 · 最终版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;}
body{background:#1a1410;color:#d4c9b0;font-family:'Georgia','宋体',serif;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px;background-image:radial-gradient(ellipse at 20% 50%,#2a2018 0%,#0d0a08 100%);}
.game-wrapper{max-width:1400px;width:100%;background:rgba(30,24,20,0.88);border:2px solid #6a5a4a;border-radius:28px;padding:25px 22px;box-shadow:0 20px 60px rgba(0,0,0,0.8),inset 0 0 80px rgba(80,60,40,0.15);backdrop-filter:blur(4px);}
.game-title{text-align:center;font-size:2rem;font-weight:bold;letter-spacing:8px;color:#e6d5b8;text-shadow:0 0 20px #b89a6a,0 2px 4px #000;margin-bottom:16px;border-bottom:1px solid #4a3f34;padding-bottom:10px;}
.game-title small{font-size:0.9rem;letter-spacing:2px;color:#a08060;display:block;margin-top:2px;}
.main-area{display:flex;flex-wrap:wrap;gap:20px;}
.left-panel{flex:2.2;min-width:380px;}
.right-panel{flex:1.2;min-width:260px;background:rgba(20,16,12,0.65);border-radius:18px;padding:16px 14px;border:1px solid #3d3228;max-height:700px;overflow-y:auto;}
.right-panel::-webkit-scrollbar{width:4px;}
.right-panel::-webkit-scrollbar-thumb{background:#6a5a4a;border-radius:8px;}
.wheel-container{position:relative;display:flex;flex-direction:column;align-items:center;}
canvas#wheelCanvas{width:100%;max-width:440px;height:auto;aspect-ratio:1/1;background:#2a221a;border-radius:50%;border:6px solid #6a5a4a;box-shadow:0 0 40px rgba(180,140,100,0.25),inset 0 0 30px #00000066;cursor:pointer;}
.btn-spin{margin-top:14px;padding:10px 36px;font-size:1.3rem;font-weight:bold;background:#3d3228;border:2px solid #b89a6a;color:#e6d5b8;border-radius:50px;cursor:pointer;transition:0.2s;letter-spacing:4px;text-shadow:0 0 8px #b89a6a44;}
.btn-spin:hover{background:#5a4a3a;border-color:#d4b080;box-shadow:0 0 30px #b89a6a33;}
.btn-spin:disabled{opacity:0.4;cursor:not-allowed;box-shadow:none;}
.subtitle{min-height:56px;margin:10px 0 6px;font-size:1.1rem;text-align:center;color:#f0e0c8;background:rgba(0,0,0,0.55);padding:10px 16px;border-radius:12px;border-left:4px solid #b89a6a;transition:all 0.3s;width:100%;max-width:440px;line-height:1.5;}
.subtitle.good{border-left-color:#6fc;color:#bfe;}
.subtitle.bad{border-left-color:#c66;color:#fcc;}
.subtitle.special{border-left-color:#fa0;color:#fea;background:rgba(40,30,10,0.7);}
.log-area{margin-top:10px;max-height:160px;overflow-y:auto;background:#0d0a08cc;border-radius:12px;padding:6px 12px;font-size:0.8rem;border:1px solid #3d3228;width:100%;max-width:440px;line-height:1.6;}
.log-area p{margin:2px 0;padding:2px 0;border-bottom:1px dashed #1f1814;color:#c4b8a8;}
.log-area p .highlight{color:#f5d080;}
.log-area p .badge{color:#d66;}
.log-area p .good{color:#8cc;}
.log-area::-webkit-scrollbar{width:3px;}
.log-area::-webkit-scrollbar-thumb{background:#5a4a3a;}
.panel-item{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #221c16;font-size:0.9rem;flex-wrap:wrap;gap:4px;}
.panel-item .label{color:#a09080;}
.panel-item .value{color:#ecd8c0;font-weight:bold;}
.panel-item .value.gold{color:#f5d080;}
.panel-item .value.green{color:#8cc;}
.panel-item .value.red{color:#d66;}
.progress-bar{width:100%;height:7px;background:#1a1410;border-radius:8px;overflow:hidden;margin:3px 0 6px;border:1px solid #3d3228;}
.progress-bar .fill{height:100%;background:linear-gradient(90deg,#b89a6a,#e6c08a);border-radius:8px;transition:width 0.4s;}
.progress-bar .fill.life{background:linear-gradient(90deg,#6a8a6a,#8aba8a);}
.progress-bar .fill.cult{background:linear-gradient(90deg,#8a6a9a,#b08ac0);}
.ability-tag,.law-tag,.achieve-tag{display:inline-block;background:#2a221a;padding:1px 10px;border-radius:12px;margin:2px 3px 2px 0;font-size:0.75rem;border:1px solid #4a3f34;}
.ability-tag.gold{border-color:#b89a6a;color:#f5d080;}
.law-tag{border-color:#6a8aba;color:#8ac0e0;}
.law-tag.complete{border-color:#f5d080;background:#3d3228;color:#f5d080;box-shadow:0 0 12px #f5d08044;}
.achieve-tag.locked{opacity:0.35;filter:grayscale(0.7);}
.achieve-tag.unlocked{border-color:#f5d080;color:#f5d080;background:#3d3228;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.88);display:none;justify-content:center;align-items:center;z-index:999;backdrop-filter:blur(10px);flex-direction:column;}
.overlay.show{display:flex;}
.overlay-box{background:#1a1410;border:2px solid #6a5a4a;border-radius:28px;padding:35px 45px;max-width:800px;width:95%;text-align:center;box-shadow:0 0 80px rgba(0,0,0,0.95);max-height:90vh;overflow-y:auto;}
.overlay-box h1{font-size:2.4rem;color:#f5d080;margin-bottom:8px;}
.overlay-box p{font-size:1.05rem;color:#d4c9b0;margin:8px 0;line-height:1.6;}
.overlay-box .btn-restart{margin-top:22px;padding:10px 36px;font-size:1.1rem;background:#3d3228;border:2px solid #b89a6a;color:#e6d5b8;border-radius:50px;cursor:pointer;transition:0.2s;letter-spacing:2px;}
.overlay-box .btn-restart:hover{background:#5a4a3a;}
.overlay-box .spirit-result{font-size:2rem;color:#f5d080;margin:15px 0;padding:10px;background:rgba(0,0,0,0.5);border-radius:12px;border:1px solid #6a5a4a;}
.log-review{text-align:left;max-height:300px;overflow-y:auto;background:rgba(0,0,0,0.4);border-radius:12px;padding:10px 14px;margin:12px 0;border:1px solid #4a3f34;font-size:0.85rem;line-height:1.5;}
.log-review p{margin:4px 0;padding:2px 0;border-bottom:1px dashed #2a221a;}
.log-review::-webkit-scrollbar{width:4px;}
.log-review::-webkit-scrollbar-thumb{background:#6a5a4a;border-radius:8px;}
.life-summary{text-align:left;background:rgba(0,0,0,0.5);border-left:4px solid #f5d080;border-radius:8px;padding:14px 18px;margin:16px 0 12px 0;font-size:0.95rem;line-height:1.7;color:#e6d5b8;}
.life-summary .highlight{color:#f5d080;font-weight:bold;}
.life-summary .good{color:#8cc;}
.life-summary .bad{color:#f88;}
.life-summary .special{color:#f5d080;}
.avatar-container{display:flex;align-items:center;gap:12px;margin-bottom:10px;padding:8px 12px;background:rgba(0,0,0,0.3);border-radius:16px;border:1px solid #3d3228;}
.avatar{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:bold;color:#1a1410;text-shadow:0 0 8px rgba(255,255,255,0.3);flex-shrink:0;transition:all 0.6s ease;box-shadow:0 0 20px rgba(0,0,0,0.6);border:2px solid #6a5a4a;background-size:cover;background-position:center;background-repeat:no-repeat;background-color:#3a3a3a;}
.avatar.realm-0{background-color:#6a7a7a;}
.avatar.realm-1{background-color:#7a9a8a;}
.avatar.realm-2{background-color:#4a8aaa;}
.avatar.realm-3{background-color:#9a6aba;}
.avatar.realm-4{background-color:#d4a04a;}
.avatar.realm-5{background-color:#d47a4a;}
.avatar.realm-6{background-color:#c04a5a;}
.avatar.realm-7{background-color:#f5d080;box-shadow:0 0 40px #f5d08088;}
.avatar .realm-char{font-size:28px;color:#1a1410;font-weight:bold;text-shadow:0 1px 4px rgba(255,255,255,0.2);}
.avatar.pulse{animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%{transform:scale(1);box-shadow:0 0 20px rgba(255,215,0,0.2);}50%{transform:scale(1.08);box-shadow:0 0 40px rgba(255,215,0,0.6);}100%{transform:scale(1);box-shadow:0 0 20px rgba(255,215,0,0.2);}}
.avatar.breakthrough{animation:breakthrough 0.8s ease;}
@keyframes breakthrough{0%{transform:scale(0.5) rotate(-20deg);opacity:0;}50%{transform:scale(1.4) rotate(10deg);opacity:1;}100%{transform:scale(1) rotate(0deg);opacity:1;}}
.trib-wheel{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin:20px 0;max-width:400px;}
.trib-item{padding:10px 16px;background:#2a221a;border:2px solid #4a3f34;border-radius:12px;font-size:1.2rem;color:#a09080;transition:0.1s;min-width:60px;text-align:center;flex:1 0 auto;}
.trib-item.active{border-color:#f5d080;color:#f5d080;background:#3d3228;transform:scale(1.1);box-shadow:0 0 30px rgba(245,208,128,0.3);}
.trib-item.success{border-color:#6fc;color:#8cc;}
.trib-item.fail{border-color:#c66;color:#f88;}
.trib-item.success.active{border-color:#6fc;color:#8cc;background:#1a3a2a;box-shadow:0 0 30px rgba(100,255,200,0.2);}
.trib-item.fail.active{border-color:#c66;color:#f88;background:#3a1a1a;box-shadow:0 0 30px rgba(255,100,100,0.2);}
.trib-result{font-size:2rem;color:#f5d080;margin:10px 0;min-height:60px;}
.trib-result.success{color:#8cc;}
.trib-result.fail{color:#f88;}
.birth-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:20px 0;}
.birth-item{padding:12px 8px;background:rgba(30,24,20,0.6);border:2px solid #3d3228;border-radius:12px;font-size:0.9rem;color:#a09080;transition:all 0.15s;text-align:center;}
.birth-item.active{border-color:#f5d080;background:rgba(245,208,128,0.15);color:#f5d080;box-shadow:0 0 20px rgba(245,208,128,0.3);transform:scale(1.05);}
.birth-item .prob{display:block;font-size:0.7rem;color:#6a5a4a;margin-top:4px;}
.birth-result{font-size:1.8rem;color:#f5d080;padding:12px;min-height:60px;background:rgba(0,0,0,0.4);border-radius:12px;border:1px solid #6a5a4a;margin:10px 0;}
.sect-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:20px 0;}
.sect-item{padding:12px 8px;background:rgba(30,24,20,0.6);border:2px solid #3d3228;border-radius:12px;font-size:0.9rem;color:#a09080;transition:all 0.15s;text-align:center;}
.sect-item.active{border-color:#f5d080;background:rgba(245,208,128,0.15);color:#f5d080;box-shadow:0 0 20px rgba(245,208,128,0.3);transform:scale(1.05);}
.sect-item .desc{font-size:0.7rem;color:#6a5a4a;display:block;margin-top:4px;}
.sect-result{font-size:1.8rem;color:#f5d080;padding:12px;min-height:60px;background:rgba(0,0,0,0.4);border-radius:12px;border:1px solid #6a5a4a;margin:10px 0;}
@media (max-width:800px){.game-wrapper{padding:12px;}.right-panel{max-height:380px;}.overlay-box{padding:25px 20px;margin:0 16px;}.birth-grid{grid-template-columns:repeat(2,1fr);}.sect-grid{grid-template-columns:repeat(2,1fr);}.trib-item{font-size:1rem;padding:8px 12px;min-width:50px;}.avatar{width:48px;height:48px;}.life-summary{font-size:0.85rem;padding:10px 14px;}}
</style>
</head>
<body>
<div class="game-wrapper" id="mainMenu" style="display:none;">
<div class="game-title">修仙转盘 · 波途 <small>天命由运 · 万法归一</small></div>
<div class="main-area">
<div class="left-panel">
<div class="wheel-container">
<canvas id="wheelCanvas" width="500" height="500"></canvas>
<button class="btn-spin" id="spinBtn">开始修仙</button>
<div class="subtitle" id="subtitle">点击转盘，抽取命运之轮</div>
<div class="log-area" id="logArea"></div>
</div>
</div>
<div class="right-panel" id="panelContent"></div>
</div>
</div>
<!-- 覆盖层 -->
<div class="overlay show" id="startOverlay"><div class="overlay-box"><h1 style="font-size:2.8rem;">修仙转盘</h1><p style="font-size:1.2rem; color:#b89a6a;">波照 · 天命伊始</p><button class="btn-restart" id="startBtn">开始波途</button></div></div>
<div class="overlay" id="birthOverlay"><div class="overlay-box"><h1>出生地 · 天命之选</h1><p style="color:#b89a6a;">波照将生于何方？</p><div class="birth-grid" id="birthGrid"></div><div class="birth-result" id="birthResult">点击「抽取」决定命运</div><button class="btn-restart" id="drawBirthBtn">抽取出生地</button></div></div>
<div class="overlay" id="spiritOverlay"><div class="overlay-box"><h1>波根测试</h1><p style="color:#b89a6a;">波照正在感应天地波气...</p><div class="spirit-result" id="spiritResult">???</div><button class="btn-restart" id="testSpiritBtn">测试波根</button></div></div>
<div class="overlay" id="sectOverlay"><div class="overlay-box"><h1>宗门 · 道途之择</h1><p style="color:#b89a6a;">波照将拜入何门何派？</p><div class="sect-grid" id="sectGrid"></div><div class="sect-result" id="sectResult">点击「抽取」决定宗门</div><button class="btn-restart" id="drawSectBtn">抽取宗门</button></div></div>
<div class="overlay" id="tribOverlay"><div class="overlay-box"><h1>⚡ 天劫降临 ⚡</h1><p style="color:#b89a6a;" id="tribProbDisplay">点击「渡劫」旋转命运之轮</p><div class="trib-wheel" id="tribWheel"></div><div class="trib-result" id="tribResult">?</div><button class="btn-restart" id="tribBtn">渡劫</button></div></div>
<div class="overlay" id="endOverlay"><div class="overlay-box"><h1 id="endTitle">道陨</h1><p id="endDesc"></p><p id="endSummary" style="font-size:0.9rem; color:#a09080; margin-top:8px;"></p><div id="lifeSummary" class="life-summary"></div><div class="log-review" id="endLogReview"></div><button class="btn-restart" id="restartBtn">轮回重修</button></div></div>

<script>
// ================================================================
// CONFIG — 包含所有新增功能，波刚改为女性，波刚之爱改为相遇10次
// ================================================================
const CONFIG = {
    realms: ['炼气','筑基','金丹','元婴','化神','合体','渡劫','大乘'],
    realmCult: [0,100,300,800,2000,5000,12000,25000],
    realmLifespan: [100,150,250,400,600,900,1300,Infinity],
    realmCoeff: [1,2,3,4,5,6,7,8],
    spiritQuality: [{name:'下品',prob:0.40,speed:0.05,power:0.03},{name:'中品',prob:0.35,speed:0.20,power:0.12},{name:'上品',prob:0.20,speed:0.50,power:0.25},{name:'极品',prob:0.05,speed:1.00,power:0.45}],
    spiritCount: [{count:1,prob:0.30,bonus:0},{count:2,prob:0.35,bonus:0.05},{count:3,prob:0.25,bonus:0.08},{count:4,prob:0.08,bonus:0.12},{count:5,prob:0.02,bonus:0.15}],
    elements: ['金','木','水','火','土'],
    elementAbility: {'金':'飞剑','木':'御风术','水':'不死之身','火':'炼丹术','土':'法天象地'},
    birthlands: [
        {name:'荒芜村落',prob:0.30,cult:0,power:80,items:[],bonusCult:0,bonusLife:0,extraPower:0,desc:'波气枯竭之地'},
        {name:'边境小镇',prob:0.25,cult:10,power:90,items:[],bonusCult:0,bonusLife:10,extraPower:0,desc:'边陲之地'},
        {name:'波溪村',prob:0.20,cult:30,power:110,items:['疗伤药'],bonusCult:0.05,bonusLife:0,extraPower:0,desc:'波溪之畔'},
        {name:'青云镇',prob:0.13,cult:60,power:140,items:['御风术'],bonusCult:0,bonusLife:0,extraPower:10,desc:'仙气萦绕'},
        {name:'仙踪城',prob:0.08,cult:100,power:180,items:['炼丹术','疗伤药','疗伤药'],bonusCult:0,bonusLife:20,extraPower:20,desc:'上古遗城'},
        {name:'紫府圣地',prob:0.04,cult:150,power:220,items:['渡劫丹','疗伤药','疗伤药'],bonusCult:0.15,bonusLife:30,extraPower:20,desc:'万古圣地'}
    ],
    sects: [
        {name:'青云宗',prob:0.35,bonusCult:0.05,desc:'正道魁首，修仙正统',story:'波照在游历时偶遇青云宗长老，长老见他根骨清奇，便引他拜入山门。青云宗乃正道第一大宗，门规森严，功法中正平和，虽无捷径但胜在稳妥。',special:''},
        {name:'合欢宗',prob:0.20,bonusCult:0.08,desc:'阴阳双修，采补之道',story:'波照在一处秘境中被合欢宗女修所救，对方见他元阳未泄，便邀请他加入合欢宗。此宗以双修采补为功法核心，虽可速成但易招非议。',special:'caibup'},
        {name:'魔道宗',prob:0.15,bonusCult:0.15,desc:'杀伐果断，以战养战',story:'波照被仇家追杀时误入魔道宗地界，魔道宗主见他杀伐果决，强行收他为徒。魔道以战养战，修行极快但处处树敌。',special:'modao'},
        {name:'丹霞谷',prob:0.15,bonusCult:0.06,desc:'丹道圣地，药香萦绕',story:'波照在采药时遇到丹霞谷的采药长老，长老见他识得百草，便引他入谷修行。丹霞谷以丹道立派，丹药供给充足，修行稳中有进。',special:''},
        {name:'天机阁',prob:0.10,bonusCult:0.04,desc:'推演天机，运筹帷幄',story:'波照在破解一座古阵时被天机阁阁主注意到，阁主推算出波照身负大气运，便收他为关门弟子。天机阁擅长推演天机，虽修行缓慢但常有奇遇。',special:''},
        {name:'万兽山',prob:0.05,bonusCult:0.10,desc:'御兽为道，万波归心',story:'波照在山中偶遇一只受伤的波兽，救治之后竟引来万兽山之主，对方见波照与波兽有缘，便引他入山修行。万兽山以御兽闻名，波兽辅佐修炼事半功倍。',special:''}
    ],
    lifeSavingItems: [
        {name:'替身草人',story:'用千年波草编织的替身傀儡，可代主承受一次致命伤害。'},
        {name:'护命玉佩',story:'刻有上古避咒的温润古玉，贴身佩戴可挡一劫。'},
        {name:'续命香',story:'点燃后可续命一炷香的时间，在香尽之前无论受多重伤都不会死。'},
        {name:'避劫铜钱',story:'通体金黄的古铜钱，可抵挡一次天劫或杀劫。'},
        {name:'替身符箓',story:'记载着上古替身之术的符箓，危急时刻可化出一道分身代死。'}
    ],
    // ===== 宗门专属事件（每个宗门4~5个，含正负面） =====
    abstractEvents: [
        // ---- 通用正面事件 ----
        {id:'天降流星',label:'天降流星',desc:'一颗流星坠落在波照面前，其中蕴含一块天外陨铁。',type:'cult',value:80,story:(g)=>`波照在夜观星象时，忽见一颗流星划破天际，落在不远处。他寻到陨石坑，从中挖出一块拳头大的星辰陨铁，其上星光流转，波照吸收其中精华，修为暴涨80点！`},
        {id:'古树悟道',label:'古树悟道',desc:'波照在一棵万年古树下打坐，忽听树心传来大道之音。',type:'cult',value:60,story:(g)=>`波照在深山中发现一棵遮天蔽日的古榕树，树干上隐隐有符文浮现。他盘坐树下，入定后听到树心传来阵阵道音，仿佛天地初开时的韵律。醒来后修为大增60点。`},
        // ---- 法则事件（化神以上） ----
        {id:'镜花水月',label:'镜花水月',desc:'波照在湖边看到自己的倒影，却从中看到了另一条人生轨迹。',type:'law',value:'命运',story:(g)=>`波照在月下湖畔静立，水中倒影突然扭曲，映出他从未经历过的命运。波照心有所感，悟出命运的虚幻与真实，命运法则+1。`,minRealm:4},
        {id:'梦回前世',label:'梦回前世',desc:'波照在梦中看到自己前世作为大能的记忆碎片。',type:'law',value:'生命',story:(g)=>`波照在睡梦中走入一片迷雾，看到自己前世是一位寿元悠长的仙人，领悟了生命的真谛。醒来后，生命法则+1。`,minRealm:4},
        {id:'感悟·生死',label:'感悟·生死',desc:'波照目睹一只小兽死去，又见新芽破土，忽悟生死轮回。',type:'law',value:'生命',story:(g)=>`波照在林中看到一只幼鹿被猛兽咬死，心中悲悯。却又见旁边一株枯木上冒出绿芽，他顿悟生死相依，生命法则+1。`,minRealm:4},
        {id:'神兽渡劫',label:'神兽渡劫',desc:'波照偶遇一头神兽渡劫，他旁观领悟了天地法则。',type:'law',value:'生命',story:(g)=>`波照在一处荒山看到一头五爪金龙正在渡劫，雷光万道，龙吟震天。他远远观之，竟从龙族渡劫中悟出了生命的顽强与韧性，生命法则+1。`,minRealm:4},
        {id:'时光回溯',label:'时光回溯',desc:'波照在时光长河中窥见过去的片段，领悟时间法则。',type:'law',value:'时间',story:(g)=>`波照在一处神秘的遗迹中，触发了时光回溯的阵法，看到了千年前的景象，从中领悟了时间的真谛，时间法则+1。`,minRealm:4},
        {id:'空间裂缝',label:'空间裂缝',desc:'波照在虚空中看到一道空间裂缝，窥见空间法则的奥秘。',type:'law',value:'空间',story:(g)=>`波照在修炼时，周围空间突然扭曲，一道空间裂缝出现在面前，波照凝视裂缝，感受到空间的波动，领悟了空间法则，空间法则+1。`,minRealm:4},
        // ---- 论道事件（合体以上） ----
        {id:'论道·天道',label:'论道·天道',desc:'波照与一位大能论道，参悟天道。',type:'cult',value:150,minRealm:5,story:(g)=>`波照在仙缘大会上与一位渡劫期修士论道，对方点破天机，波照豁然开朗，修为暴涨150点。`},
        {id:'论道·剑道',label:'论道·剑道',desc:'波照与剑道宗师论剑，领悟剑意。',type:'ability',name:'天罡剑意',minRealm:5,story:(g)=>`波照与一位剑道宗师论剑三日，终于领悟了天罡剑意的精髓，获得能力「天罡剑意」。`},
        {id:'论道·丹道',label:'论道·丹道',desc:'波照与丹道大师交流炼丹心得，受益匪浅。',type:'cult',value:120,minRealm:5,story:(g)=>`波照在丹道大会上与一位丹道大师交流心得，对方传授了他一味古丹方，波照依方炼丹，修为大涨120点。`},
        {id:'论道·生死',label:'论道·生死',desc:'波照与一位高僧论生死，悟出生命真谛。',type:'cult',value:130,minRealm:5,story:(g)=>`波照在一座古寺中与一位高僧论生死，高僧的一番话让波照醍醐灌顶，修为暴涨130点。`},
        // ---- 寿元丹事件 ----
        {id:'寿元丹',label:'寿元丹',desc:'波照发现一枚上古寿元丹，服用后寿命大增。',type:'life',value:100,story:(g)=>`波照在一处上古丹房中寻得一枚晶莹的寿元丹，服下后只觉一股暖流涌入四肢百骸，寿元增加了100年！`},
        // ---- 其他通用正面 ----
        {id:'焚香祈愿',label:'焚香祈愿',desc:'波照在道观中点燃三炷香，虔诚祈愿，香火竟化作一道金光没入眉心。',type:'cult',value:50,story:(g)=>`波照路遇一座破败道观，观中香火已绝。他心生怜悯，点燃三炷香，祈愿众生平安。香火缭绕间，竟化作一道金光涌入他的识海，修为增长50点。`},
        {id:'石壁留影',label:'石壁留影',desc:'波照在山壁上看到一幅古仙人留下的剑痕，其中蕴含着无上剑意。',type:'ability',name:'剑心通明',story:(g)=>`波照在绝壁前看到一道数丈长的剑痕，深可见骨，剑意凛然。他凝神参悟三日，竟从剑痕中领悟了「剑心通明」的能力。`},
        {id:'波蝶引路',label:'波蝶引路',desc:'一只通体散发荧光的波蝶飞来，在波照面前盘旋，似要引他去某处。',type:'event',event:'波蝶奇遇',story:(g)=>`波照在林中遇到一只波蝶，它翩翩飞舞，似乎在指引方向。波照跟随波蝶来到一处隐秘的山谷，谷中波气浓郁，他趁机修炼，修为大增。`},
        {id:'幽泉洗髓',label:'幽泉洗髓',desc:'波照寻得一眼幽泉，泉水冰冷刺骨，却能洗涤肉身杂质。',type:'cult',value:100,story:(g)=>`波照在深山中找到一眼幽泉，泉水漆黑如墨，寒气逼人。他咬牙浸入泉中，一股冰寒之力渗入骨髓，将肉身中的杂质一一逼出。出泉后，修为暴涨100点。`},
        {id:'藏经阁偶遇',label:'藏经阁偶遇',desc:'波照在宗门藏经阁中翻到一本残卷，记录着失传的秘术。',type:'ability',name:'缩地成寸',story:(g)=>`波照在藏经阁的角落发现一本蒙尘的残卷，封面写着「缩地成寸」。他研读之后，竟真的掌握了这门上古遁术。`},
        {id:'雷雨淬体',label:'雷雨淬体',desc:'波照在暴雨中修炼，引天雷之力淬炼肉身。',type:'cult',value:90,story:(g)=>`波照立于山巅，迎着雷雨修炼。一道闪电劈下，他不闪不避，以肉身硬接，雷光在体表游走，淬炼筋骨。雷雨过后，修为增长90点。`},
        {id:'仙鹤赠药',label:'仙鹤赠药',desc:'一只仙鹤叼着一株波芝飞到波照面前，放下波芝后便飞走了。',type:'item',item:'疗伤药',story:(g)=>`一只仙鹤从云中落下，将一株紫芝放在波照面前，长鸣一声后飞走。波照认出这是疗伤圣药，获得疗伤药一枚。`},
        {id:'道侣赠剑',label:'道侣赠剑',desc:'一位神秘女子赠予波照一柄古朴长剑，剑身刻有「断念」二字。',type:'ability',name:'断念剑意',story:(g)=>`波照在渡口遇见一位白衣女子，她将一柄古剑交给波照，说此剑名为「断念」，可斩断执念。波照接过古剑，领悟了断念剑意。`},
        {id:'云海日出',label:'云海日出',desc:'波照在云海上静候日出，第一缕阳光照在脸上时，他豁然开朗。',type:'cult',value:70,story:(g)=>`波照在高峰之巅守候一夜，当第一缕阳光刺破云海，万丈金光洒落，波照心中多年的困惑突然解开，修为大增70点。`},
        {id:'琴音洗心',label:'琴音洗心',desc:'波照听到山间传来的空波琴声，心神为之宁澈。',type:'cult',value:40,story:(g)=>`波照在山中漫步时，忽闻悠扬琴声，如泉水叮咚，洗涤心波。他循声而去，只见一位白须老者抚琴，却转瞬不见。波照只觉心神清明，修为增长40点。`},
        {id:'神通觉醒',label:'神通觉醒',desc:'波照在战斗中偶然激发体内潜藏的神通之力。',type:'ability',name:'金刚不坏',story:(g)=>`波照在与妖兽搏斗时，危急关头体内突然涌出一股金光，皮肤变得坚如金石，硬抗了妖兽一击。他后知后觉，原来自己觉醒了「金刚不坏」的神通。`},
        {id:'奇遇·丹炉',label:'奇遇·丹炉',desc:'波照在一处废墟中发现一座完好的炼丹炉，炉中尚有余温。',type:'ability',name:'炼丹术',story:(g)=>`波照在废墟中发现一座古朴丹炉，炉上刻有「九转还魂」四字。他尝试生火，竟成功炼出一枚丹药，从此掌握了炼丹术。`},
        {id:'奇遇·波泉',label:'奇遇·波泉',desc:'波照寻到一眼波泉，泉水含有浓郁的生命力。',type:'cult',value:120,story:(g)=>`波照在石缝中发现一眼波泉，泉水呈乳白色，散发出草木清香。他饮下几口，只觉生机勃勃，修为暴涨120点。`},
        // ---- 丹药事件（百分比） ----
        {id:'波丹妙药',label:'波丹妙药',desc:'波照发现一枚上古波丹，服下后修为大增。',type:'cult_percent',value:0.10,story:(g)=>`波照在一处隐秘洞府中发现一枚通体晶莹的波丹，丹香扑鼻。他盘坐服下，一股精纯药力在体内化开，修为暴涨${Math.floor((G.cult||1)*0.1)}点（10%）！`},
        // ---- 波兽神兽通用事件 ----
        {id:'受伤波兽',label:'受伤波兽',desc:'波照在山中发现一只受伤的波兽，悉心照料后获得其感激。',type:'cult',value:60,story:(g)=>`波照在山中遇到一只浑身是伤的波兽，它警惕地瞪着波照，但已无力逃离。波照心生怜悯，用疗伤药为它包扎，又寻来波草喂食。波兽伤势渐愈，临走前将一缕波气渡入波照体内，修为暴涨60点。`},
        {id:'波兽蛋',label:'波兽蛋',desc:'波照在秘境中发现一枚上古波兽蛋，蛋壳上流转着七彩光芒。',type:'ability',name:'神兽伙伴',story:(g)=>`波照在一处被遗忘的秘境中发现一枚巨大的波兽蛋，蛋身温热，隐隐有生命脉动。他将蛋带回悉心孵化，最终破壳而出的竟是一头幼年麒麟！麒麟认波照为主，波照获得「神兽伙伴」的能力。`},
        // ---- 通用负面事件 ----
        {id:'血月当空',label:'血月当空',desc:'天现血月，波照体内气血翻涌，心魔蠢蠢欲动。',type:'event',event:'血月心魔',story:(g)=>`血月之夜，天空挂着一轮妖异的红月，波照感到一股无名邪火在体内燃烧，心魔趁机入侵。他盘坐凝神，以剑心通明斩断幻象，最终击退心魔，但修为略有损耗。`},
        {id:'古墓惊魂',label:'古墓惊魂',desc:'波照误入一座古墓，墓中机关重重，他历经生死考验。',type:'event',event:'古墓探险',story:(g)=>`波照在一处荒山发现古墓入口，好奇心驱使下进入。墓中暗箭、毒雾、傀儡轮番来袭，他拼尽全力才逃出生天，虽身受轻伤，但捡到了一些陪葬的波玉，修为增加50点。`},
        {id:'险境·断崖',label:'险境·断崖',desc:'波照在断崖边行走，不慎失足，险些丧命。',type:'event',event:'断崖惊魂',story:(g)=>`波照在悬崖边采摘草药，脚下岩石松动，整个人跌落下去。他拼命抓住崖壁上的藤蔓，这才保住了性命，但手臂被藤蔓割伤，轻伤。`},
        {id:'心魔作祟',label:'心魔作祟',desc:'修炼时心魔入侵，道心不稳。',type:'event',event:'心魔反噬',story:(g)=>`波照闭关修炼时，心魔突然爆发，幻象丛生，他险些走火入魔。拼尽全力才稳住心神，但修为折损不少。`},
        {id:'波气暴动',label:'波气暴动',desc:'天地波气突然狂暴，波照遭受反噬。',type:'cult',value:-40,story:(g)=>`波照修炼之际，天地波气骤然暴动，如刀割般冲击经脉。他强运功法抵御，却仍被震伤，修为倒退40点。`},
        {id:'雷劫余波',label:'雷劫余波',desc:'他人渡劫引来的天雷波及波照。',type:'cult',value:-60,story:(g)=>`不远处有修士渡劫，一道漏网的天雷劈向波照！他仓促应对，仍被雷光扫中，修为大损60点。`},
        // ---- ★★★ 新增“男采波贼”事件（通用） ★★★ ----
        {id:'采阳修士',label:'采阳修士',desc:'一个修炼采补邪术的男修盯上了波照的元阳。',type:'event',event:'男采补',story:(g)=>`波照在荒郊野外遇到一个面色苍白的男修，对方淫笑着靠近，声称要采补波照的元阳。波照被迫应战。`},
        // ---- 原有采补事件（通用） ----
        {id:'采阴补阳',label:'采阴补阳',desc:'被邪修偷袭，元阳被夺。',type:'event',event:'采补',story:(g)=>`波照在客栈休息时，被一个修炼采补邪术的男修盯上。对方趁其不备，以迷香将他迷晕，强行采补，波照醒来后元气大伤。`},
        {id:'桃花劫',label:'桃花劫',desc:'波照误入桃花庵，被一群女修缠住。',type:'event',event:'桃花劫',story:(g)=>`波照在深山中发现一座桃花庵，庵中女修个个妖娆妩媚，将他团团围住。波照被灌下迷情酒，险些失身，最终凭借意志力逃脱，但已是精疲力竭。`},
        {id:'合欢酒宴',label:'合欢酒宴',desc:'被邀请参加合欢宗的酒宴，席间暗藏玄机。',type:'event',event:'合欢酒宴',story:(g)=>`波照受邀参加合欢宗的酒宴，席间香艳无比，众女修频频敬酒。波照察觉到酒中有催情之效，巧妙避过，但为了脱身，不得不假装醉倒，狼狈而逃。`},
        {id:'迷情香',label:'迷情香',desc:'被对手释放迷情香，神智迷乱。',type:'event',event:'迷情香',story:(g)=>`波照与人对战时，对方突然释放粉色迷情香，波照吸入后浑身燥热，差点失去理智。他猛咬舌尖，以剧痛清醒，奋力击退对手，却也因此消耗了大量体力。`},
        // 保命道具奇遇
        {id:'神秘护符',label:'神秘护符',desc:'波照在古庙中发现一枚护身符，上面刻有“替身”二字。',type:'item',item:'保命道具',story:(g)=>`波照在一座荒废古庙的佛像下发现一个草人，上面缠着红线，波气流动。他得知这是上古修士炼制的「替身草人」，可在生死之际代死一次。获得保命道具×1。`},
        {id:'药王谷奇遇',label:'药王谷奇遇',desc:'波照误入药王谷，谷中波药遍地，还得到了一件保命秘宝。',type:'item',item:'保命道具',story:(g)=>`波照在迷雾中迷失，误入药王谷，谷中老者赠他一株千年波芝和一个替身草人。获得保命道具×1，疗伤药×1。`},
        {id:'上古传承',label:'上古传承',desc:'波照在某洞府中接受一位散仙的衣钵，除了功法还有一件保命法器。',type:'item',item:'保命道具',story:(g)=>`波照在一座残破洞府中发现散仙遗骸，旁边有一枚玉简和一只草人。玉简记载了功法，草人则是散仙炼制的替身傀儡。获得保命道具×1。`},
        // ===== ★★★ 新增宗门专属事件（每个宗门4~5个） ★★★ =====
        // ---- 青云宗（新增3个，已有1个） ----
        {id:'青云剑诀',label:'青云剑诀',desc:'波照在青云宗秘传剑碑前参悟，意外领悟了失传的剑诀。',type:'sect_ability',sect:'青云宗',name:'天罡剑意',story:(g)=>`波照在青云宗后山的剑碑林中，发现一块布满苔藓的古碑，碑上刻有「天罡剑意」四字。他盘坐参悟七日，终于领悟了这门失传的剑诀，剑气纵横，可破万法。`},
        {id:'心魔侵扰',label:'心魔侵扰',desc:'修炼青云心法时被心魔入侵，道心不稳。',type:'sect_event',sect:'青云宗',event:'心魔反噬',story:(g)=>`波照在修炼青云心法时，心魔突然爆发，幻象丛生，他险些走火入魔。拼尽全力才稳住心神，但修为折损不少。`},
        {id:'正道围剿',label:'正道围剿',desc:'波照被其他正道宗门误会，遭到围攻。',type:'sect_event',sect:'青云宗',event:'被挑衅',story:(g)=>`波照在外历练时，被一群其他宗门的修士围住，他们污蔑波照勾结魔道，群起而攻之。波照寡不敌众，身受重伤，修为大损。`},
        {id:'剑冢参悟',label:'剑冢参悟',desc:'波照在青云宗剑冢中感应到古剑意，获得剑道感悟。',type:'sect_cult',sect:'青云宗',value:80,story:(g)=>`波照在青云宗的剑冢中，面对无数上古残剑，突然感应到一股苍茫的剑意，他盘坐参悟，修为大涨80点。`},

let G={};
const avatarImageCache={};

function initState(){
    G={
        birthland:'',birthlandData:null,sect:'',sectData:null,
        spiritQ:{name:'下品',speed:0.05,power:0.03},spiritCount:1,spiritElements:[],
        realmIndex:0,age:18,cult:0,basePower:80,
        abilities:[],items:{'渡劫丹':0,'疗伤药':0,'解毒丹':0,'保命道具':0},
        laws:{'时间':0,'空间':0,'命运':0,'毁灭':0,'生命':0},
        status:'健康',logs:[],achievements:{},
        _flagNearDeath:false,_flagTribPass:false,_flagCaibup:false,_flagRealmUpAfterCaibup:false,
        _consecutiveTrib:0,_winVillage:false,_winArena:false,_winTourney:false,
        _villageFails:0,_arenaFails:0,_tourneyFails:0,
        _gangEncounters:0,_gangKill:0,_gangLosses:0,
        _deathCause:'',_dead:false,_bonusLife:0,_powerBuff:0,
        _spinLock:false,_avatarBreakthrough:false,_pendingTrib:false,_sectSpecial:''
    };
    CONFIG.achievements.forEach(a=>G.achievements[a.id]=false);
}

function rand(a,b){return Math.random()*(b-a)+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
function drawProb(items){let r=Math.random(),c=0;for(let it of items){c+=it.prob;if(r<c)return it;}return items[items.length-1];}

function getSpiritDisplay(){
    if(!G.spiritQ||!G.spiritElements)return'未知波根';
    let q=G.spiritQ.name||'下品',els=G.spiritElements.join('')||'',c=G.spiritCount||1;
    let suffix=c===1?'波根':(c===5?'混沌五波根':['单','双','三','四','五'][c-1]+'波根');
    return q+els+suffix;
}

function calcPower(){
    const base=G.birthlandData?G.birthlandData.power:80;
    const realmAdd=CONFIG.realmCoeff[G.realmIndex]*50;
    const abilityAdd=(G.abilities||[]).length*30;
    const specials=['不死之身','法天象地','古神血脉','神兽伙伴','金刚不坏','剑心通明','断念剑意','天眼通','元神出窍','波刚之爱','神兽契约'];
    const specialAdd=(G.abilities||[]).filter(a=>specials.includes(a)).length*100;
    const lawAdd=G.laws?Object.values(G.laws).reduce((a,b)=>a+b,0)*20:0;
    const extra=G.birthlandData?G.birthlandData.extraPower:0;
    let raw=base+realmAdd+abilityAdd+specialAdd+lawAdd+extra+(G._powerBuff||0);
    let mult=1;
    if(G.status==='轻伤')mult*=0.8;
    if(G.status==='重伤')mult*=0.5;
    if(G.status==='濒死')mult*=0.2;
    if(G.status&&G.status.includes('中毒'))mult*=0.9;
    const spiritPower=G.spiritQ?G.spiritQ.power:0;
    return Math.floor(raw*mult*(1+spiritPower));
}

function applyCultGain(base){
    let mult=1+(G.birthlandData?G.birthlandData.bonusCult:0)+(G.sectData?G.sectData.bonusCult:0)+(G.spiritQ?G.spiritQ.speed:0);
    let match=0;
    if(G.spiritElements&&G.abilities){for(let el of G.spiritElements){if(G.abilities.includes(CONFIG.elementAbility[el]))match++;}}
    mult+=match*0.30;
    const cb=CONFIG.spiritCount.find(s=>s.count===G.spiritCount)?.bonus||0;
    mult+=cb;
    mult*=(1+G.realmIndex*0.2);
    return Math.floor(base*mult);
}

function addLog(msg){if(!G.logs)G.logs=[];G.logs.push(`【${G.age}岁】波照 ${msg}`);if(G.logs.length>200)G.logs.shift();updateLogUI();}
function updateLogUI(){const area=document.getElementById('logArea');if(area&&G.logs)area.innerHTML=G.logs.slice(-50).map(s=>`<p>${s}</p>`).join('');}
function setSubtitle(text,cls=''){const el=document.getElementById('subtitle');if(el){el.textContent=text;el.className='subtitle '+(cls||'');}}

function updateAvatar(){
    const avatarEl=document.getElementById('avatar');if(!avatarEl)return;
    const idx=G.realmIndex||0,chars=['炼','筑','金','婴','化','合','渡','仙'];
    let imgSrc=(idx<2)?'obstacle-sprite.png':'zhujue.jpg';
    if(avatarImageCache[imgSrc]===true){
        avatarEl.style.backgroundImage=`url(${imgSrc})`;avatarEl.style.backgroundSize='cover';avatarEl.style.backgroundPosition='center';
        avatarEl.innerHTML='';avatarEl.className='avatar';applyAvatarAnimations(avatarEl,idx);return;
    }
    if(avatarImageCache[imgSrc]===false){showTextAvatar(avatarEl,idx,chars);return;}
    const img=new Image();
    img.onload=function(){avatarImageCache[imgSrc]=true;avatarEl.style.backgroundImage=`url(${imgSrc})`;avatarEl.style.backgroundSize='cover';avatarEl.style.backgroundPosition='center';avatarEl.innerHTML='';avatarEl.className='avatar';applyAvatarAnimations(avatarEl,idx);};
    img.onerror=function(){avatarImageCache[imgSrc]=false;showTextAvatar(avatarEl,idx,chars);};
    img.src=imgSrc;
}
function applyAvatarAnimations(avatarEl,idx){if(G._avatarBreakthrough){avatarEl.classList.add('breakthrough');setTimeout(()=>{avatarEl.classList.remove('breakthrough');G._avatarBreakthrough=false;},800);}if(idx===7)avatarEl.classList.add('pulse');else avatarEl.classList.remove('pulse');}
function showTextAvatar(avatarEl,idx,chars){avatarEl.className=`avatar realm-${idx}`;avatarEl.innerHTML=`<span class="realm-char">${chars[idx]}</span>`;avatarEl.style.backgroundImage='';if(G._avatarBreakthrough){avatarEl.classList.add('breakthrough');setTimeout(()=>{avatarEl.classList.remove('breakthrough');G._avatarBreakthrough=false;},800);}if(idx===7)avatarEl.classList.add('pulse');else avatarEl.classList.remove('pulse');}

function updatePanel(){

    const cultProgress=G.realmIndex<7?(G.cult-CONFIG.realmCult[G.realmIndex])/(nextCult-CONFIG.realmCult[G.realmIndex]):1;
    const lifespan=CONFIG.realmLifespan[G.realmIndex]+(G._bonusLife||0);
    const ageProgress=G.age/lifespan,power=calcPower();
    const smap={'健康':'❤️','轻伤':'🟡','重伤':'🔴','濒死':'💀','中毒':'☠️'};
    const avatarHTML=`<div class="avatar-container"><div class="avatar" id="avatar"></div><div><div style="font-size:1.2rem;font-weight:bold;color:#f5d080;">波照</div><div style="font-size:0.8rem;color:#a09080;">${G.birthland||''} · ${G.sect||''}</div></div></div>`;
    let allAbilities=G.abilities||[],abTags=allAbilities.map(a=>`<span class="ability-tag">${a}</span>`).join('');
    let lifeItemCount=G.items['保命道具']||0;
    let html=avatarHTML+`

        <div class="panel-item"><span class="label">⚔️ 境界</span><span class="value">${realm}</span></div>
        <div class="panel-item"><span class="label">📅 年龄</span><span class="value ${G.age>lifespan*0.9?'red':''}">${G.age}/${lifespan===Infinity?'∞':lifespan}</span></div>
        <div class="progress-bar"><div class="fill life" style="width:${Math.min(ageProgress,1)*100}%"></div></div>
        <div class="panel-item"><span class="label">📈 修为</span><span class="value">${Math.floor(G.cult)}/${nextCult===Infinity?'∞':nextCult}</span></div>
        <div class="progress-bar"><div class="fill cult" style="width:${Math.min(cultProgress,1)*100}%"></div></div>
        <div class="panel-item"><span class="label">⚡ 战力</span><span class="value gold">${Math.floor(power)}</span></div>
        <div class="panel-item"><span class="label">🧬 状态</span><span class="value">${G.status} ${smap[G.status]||'❤️'}</span></div>
        <div class="panel-item"><span class="label">🏯 宗门</span><span class="value gold">${G.sect||'无'}</span></div>
        <div class="panel-item"><span class="label">🛡️ 保命道具</span><span class="value gold">${lifeItemCount}/5</span></div>

        <div class="panel-item" style="flex-wrap:wrap;"><span class="label">🏆 成就</span><span>${CONFIG.achievements.map(a=>`<span class="achieve-tag ${G.achievements&&G.achievements[a.id]?'unlocked':'locked'}">${a.name}</span>`).join('')}</span></div>
        <div class="panel-item" style="flex-wrap:wrap;"><span class="label">🎒 道具</span><span>${Object.entries(G.items||{}).filter(([k,v])=>v>0&&k!=='保命道具').map(([k,v])=>`${k}×${v}`).join(' ')||'无'}</span></div>
    `;

function checkAchievements(){
    let unlocked=[];

        if(!G.achievements[a.id]&&a.check(G)){
            G.achievements[a.id]=true;unlocked.push(a.name);

function recoverStatus(){
    const p=calcPower(),bonus=(p>500?0.05:0)+(p>1000?0.05:0);
    if(G.items['疗伤药']>0){
        if(G.status==='重伤'){G.items['疗伤药']--;G.status='轻伤';setSubtitle('服用疗伤药，重伤→轻伤','good');addLog('💊 使用疗伤药，重伤减轻为轻伤');updatePanel();return;}
        else if(G.status==='轻伤'){G.items['疗伤药']--;G.status='健康';setSubtitle('服用疗伤药，轻伤痊愈！','good');addLog('💊 使用疗伤药，轻伤痊愈');updatePanel();return;}
    }
    if(G.status==='轻伤'&&Math.random()<0.30+bonus){G.status='健康';setSubtitle('伤势好转，轻伤已愈！','good');addLog('伤势恢复，回到健康');}
    else if(G.status==='重伤'&&Math.random()<0.15+bonus){G.status='轻伤';setSubtitle('伤势好转，重伤→轻伤','good');addLog('重伤缓解为轻伤');}
    else if(G.status==='濒死'){
        if(G.items['保命道具']>0){G.items['保命道具']--;G.status='重伤';setSubtitle('保命道具发动！保下一命，重伤','special');addLog('🛡️ 保命道具替你挡下致命一击，状态恢复为重伤');updatePanel();return;}
        else if(Math.random()<0.05+(p>500?0.05:0)){G.status='重伤';setSubtitle('吊住一口气，濒死→重伤','good');addLog('从濒死中缓过来');}
        else {triggerDeath('濒死未能挺过');return;}
    }
    if(G.status&&G.status.includes('中毒')&&Math.random()<0.20+(p>800?0.15:0)){
        G.status=G.status.replace('中毒','').trim()||'健康';setSubtitle('毒素消退！','good');addLog('解毒成功');
    }
    updatePanel();
}

function generateLifeSummary(){
    const birthName=G.birthland||'未知之地',birthDesc=G.birthlandData?G.birthlandData.desc:'',spiritDisplay=getSpiritDisplay();
    const finalRealm=CONFIG.realms[G.realmIndex]||'炼气',age=G.age,sect=G.sect||'无门无派';
    const abilities=G.abilities.length?G.abilities.join('、'):'无';
    const laws=Object.entries(G.laws).filter(([k,v])=>v>0).map(([k,v])=>`${k}(${v}/3)`).join('、')||'无';
    const achievements=CONFIG.achievements.filter(a=>G.achievements[a.id]).map(a=>a.name).join('、')||'无';
    const gangKill=G._gangKill||0,tribPass=G._flagTribPass?'成功渡过天劫':'未渡劫';
    const isAscend=(G.realmIndex===7&&Object.values(G.laws).filter(v=>v>=3).length>=3),deathCause=G._deathCause||'未知';
    let birthSentence=`波照，生于「${birthName}」——${birthDesc}之地。天生拥有「${spiritDisplay}」，根骨不凡，注定与仙道有缘。`;
    let sectSentence=sect!=='无门无派'?`少年时偶遇机缘，拜入「${sect}」，从此踏上漫漫修仙路。`:`少年时未遇名师，独自修行，在红尘中挣扎求索。`;
    let cultSentence=`凭借坚韧不拔的意志，波照一路修炼至「${finalRealm}」境界，享寿 ${age} 岁。`;
    let abilitySentence=abilities!=='无'?`他苦修多年，精通多种神通：「${abilities}」；在法则感悟上也颇有建树，触及「${laws}」之真谛。`:`虽无惊人神通，但波照一直勤勉修行，不曾懈怠。`;
    let deeds=[];
    if(gangKill>0)deeds.push('曾与采阳女贼波刚数次交锋，最终将其斩杀，为一方除害');
    if(tribPass==='成功渡过天劫')deeds.push('成功渡过天劫，修为大进');
    if(achievements!=='无')deeds.push(`一生荣获诸多成就：${achievements}`);
    let deedSentence=deeds.length>0?`波照的一生充满传奇：${deeds.join('；')}。`:'';
    let endingSentence='';
    if(isAscend)endingSentence='最终，他在大乘之巅迎来天劫，以无上法力破开虚空，飞升成仙，证得永恒大道！';
    else if(deathCause==='lifespan'||deathCause.includes('寿元'))endingSentence='大限已至，波照于洞府中平静坐化，一生圆满，无憾而去。';
    else endingSentence=`虽遭遇「${deathCause}」之劫，但他留下的传奇故事，依然在修仙界中流传。`;
    return birthSentence+sectSentence+cultSentence+abilitySentence+deedSentence+endingSentence;
}

function triggerDeath(reason){
    if(G._dead)return;
    if(G.items['保命道具']>0&&reason!=='寿元耗尽'){
        G.items['保命道具']--;G.status='重伤';G._dead=false;
        setSubtitle('保命道具救你一命！','special');
        addLog('🛡️ 保命道具代你应劫，重伤但生还');
        updatePanel();
        return;
    }
    G._dead=true;G._deathCause=reason;
    let deathStory='';
    if(reason==='lifespan'||reason.includes('寿元'))deathStory='波照寿元已尽，于洞府中盘膝而坐，面带微笑，化作一道流光消散于天地间。';
    else if(reason.includes('天劫'))deathStory='雷劫之下，波照未能撑过，肉身化为齑粉，神魂亦被天雷彻底抹去。';
    else if(reason.includes('心魔'))deathStory='心魔爆发，波照陷入无尽幻境，最终道心崩溃，疯癫而亡。';
    else if(reason.includes('波刚'))deathStory='波照与波刚的恩怨最终以悲剧收场，他被波刚以邪术吸干精元，化为一具干尸。';
    else if(reason.includes('采补'))deathStory='波照沉迷于采补之术，最终反被他人采补，精气枯竭而亡。';
    else deathStory=`波照遭遇了「${reason}」，不幸陨落，修仙之路就此终止。`;
    const ending=pick(CONFIG.deathEndings);
    document.getElementById('endTitle').textContent='道陨 · '+ending.split('：')[0].replace(/[「」]/g,'');
    document.getElementById('endDesc').textContent=deathStory+'\n'+ending;
    document.getElementById('endSummary').textContent=`寿元 ${G.age} 岁 · 境界 ${CONFIG.realms[G.realmIndex]||'炼气'} · 战力 ${Math.floor(calcPower())} · 修为 ${Math.floor(G.cult)}`;
    document.getElementById('lifeSummary').textContent=generateLifeSummary();
    const review=document.getElementById('endLogReview');
    review.innerHTML=G.logs.map(s=>`<p>${s}</p>`).join('');
    document.getElementById('endOverlay').classList.add('show');
    document.getElementById('spinBtn').disabled=true;
    addLog(`⚠️ 道陨：${ending}`);
}

function checkRealmDrop(){
    while(G.realmIndex>0&&G.cult<CONFIG.realmCult[G.realmIndex]){
        G.realmIndex--;
        addLog(`⚠️ 修为不足，境界跌落至 ${CONFIG.realms[G.realmIndex]}`);
        setSubtitle(`修为不足，跌落至 ${CONFIG.realms[G.realmIndex]}！`,'bad');
        let maxLife=CONFIG.realmLifespan[G.realmIndex]+(G._bonusLife||0);
        if(G.age>maxLife){triggerDeath('境界跌落导致寿元耗尽');return;}
        updatePanel();
    }
}

let tribResolve=null,tribSuccess=false;
function showTribWheel(baseProb,success){
    return new Promise((resolve)=>{
        tribResolve=resolve;tribSuccess=success;
        const overlay=document.getElementById('tribOverlay'),wheel=document.getElementById('tribWheel');
        const resultEl=document.getElementById('tribResult'),probDisplay=document.getElementById('tribProbDisplay');
        const btn=document.getElementById('tribBtn');const pct=Math.round(baseProb);
        probDisplay.textContent=`⚡ 当前渡劫成功率：${pct}%  · 点击「渡劫」旋转命运之轮`;
        const totalSlots=8,successSlots=Math.round((baseProb/100)*totalSlots),failSlots=totalSlots-successSlots;
        let slots=[];
        for(let i=0;i<successSlots;i++)slots.push('success');
        for(let i=0;i<failSlots;i++)slots.push('fail');
        for(let i=slots.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[slots[i],slots[j]]=[slots[j],slots[i]];}
        if(successSlots===0)slots=['fail','fail','fail','fail','fail','fail','fail','fail'];
        if(failSlots===0)slots=['success','success','success','success','success','success','success','success'];
        wheel.innerHTML='';
        slots.forEach((type,idx)=>{const div=document.createElement('div');div.className=`trib-item ${type}`;div.dataset.index=idx;div.dataset.type=type;div.textContent=type==='success'?'✅ 成功':'❌ 失败';wheel.appendChild(div);});
        resultEl.textContent='?';resultEl.className='trib-result';btn.disabled=false;overlay.classList.add('show');
    });
}
document.getElementById('tribBtn').addEventListener('click',function(){
    const btn=this;if(btn.disabled)return;btn.disabled=true;
    const wheel=document.getElementById('tribWheel'),items=wheel.querySelectorAll('.trib-item');
    const resultEl=document.getElementById('tribResult'),targetType=tribSuccess?'success':'fail';
    let count=0,maxCount=20+Math.floor(Math.random()*10),interval=80;
    const timer=setInterval(()=>{
        items.forEach(el=>el.classList.remove('active'));
        const showIdx=Math.floor(Math.random()*items.length);items[showIdx].classList.add('active');count++;
        if(count>=maxCount){
            clearInterval(timer);items.forEach(el=>el.classList.remove('active'));
            let targetEl=null;for(let el of items){if(el.dataset.type===targetType){targetEl=el;break;}}
            if(targetEl)targetEl.classList.add('active');else items[0].classList.add('active');
            const label=tribSuccess?'✅ 渡劫成功！':'❌ 渡劫失败…';
            resultEl.textContent=label;resultEl.className='trib-result '+(tribSuccess?'success':'fail');
            setTimeout(()=>{document.getElementById('tribOverlay').classList.remove('show');if(tribResolve){tribResolve(tribSuccess);tribResolve=null;}btn.disabled=false;},1200);
        }
    },interval);
});

async function attemptTribulation(){
    if(G.realmIndex>=7)return;
    if(G.cult<CONFIG.realmCult[G.realmIndex+1]){setSubtitle('修为不足，无法渡劫','bad');return;}
    // 法则条件
    if(G.realmIndex===4 && !Object.values(G.laws).some(v=>v>=1)){
        setSubtitle('需要法则雏形才能突破合体！','bad');
        addLog('法则不足，无法突破合体');
        return;
    }
    if(G.realmIndex===5 && !Object.values(G.laws).some(v=>v>=3)){
        setSubtitle('需要一条完整法则才能突破渡劫！','bad');
        addLog('没有完整法则，无法渡劫');
        return;
    }
    if(G.realmIndex===6 && Object.values(G.laws).filter(v=>v>=3).length<3){
        setSubtitle('需要三条完整法则才能飞升大乘！','bad');
        addLog('法则不足，无法飞升');
        return;
    }
    if(G.realmIndex<2){
        G.realmIndex++;G._consecutiveTrib=(G._consecutiveTrib||0)+1;G._flagTribPass=true;G.status='健康';G._avatarBreakthrough=true;
        setSubtitle(`🎉 突破成功！当前境界：${CONFIG.realms[G.realmIndex]}`,'good');
        addLog(`🎉 突破成功！晋升至 ${CONFIG.realms[G.realmIndex]}`);
        updatePanel();checkAchievements();checkRealmDrop();
        if(G.realmIndex<7&&G.cult>=CONFIG.realmCult[G.realmIndex+1]){await attemptTribulation();}
        return;
    }
    let power=calcPower(),baseProb=Math.min(99,50+(power-100)/20);
    if(G.items['渡劫丹']>0){G.items['渡劫丹']--;baseProb=Math.max(baseProb,90);addLog('消耗渡劫丹');}
    baseProb=Math.min(99,Math.max(0,baseProb));
    const success=Math.random()*100<baseProb;
    await showTribWheel(baseProb,success);
    if(success){
        G.realmIndex++;G._consecutiveTrib=(G._consecutiveTrib||0)+1;G._flagTribPass=true;G.status='健康';G._avatarBreakthrough=true;
        if(Math.random()*100<40){let keys=Object.keys(G.laws);let l=pick(keys);G.laws[l]=(G.laws[l]||0)+1;addLog(`⚡ 天降机缘！领悟 ${l} 法则！`);setSubtitle(`领悟 ${l} 法则！（${G.laws[l]}/3)`,'special');}
        else{let consolation=Math.floor(G.cult*0.05);G.cult+=consolation;addLog(`未能领悟法则，但获得 ${consolation} 修为补偿`);setSubtitle('未能领悟法则，略有遗憾','bad');}
        setSubtitle(`渡劫成功！突破至 ${CONFIG.realms[G.realmIndex]}`,'good');
        if(G.realmIndex===7 && Object.values(G.laws).filter(v=>v>=3).length>=3){
            setSubtitle('🎉 飞升成仙！','special');addLog('🎉 飞升成仙！通关！');
            document.getElementById('endTitle').textContent='🎉 飞升成仙！';
            document.getElementById('endDesc').textContent='波照历经万劫，终证大道，逍遥长生！';
            document.getElementById('endSummary').textContent=`寿元 ${G.age} 岁 · 境界 大乘 · 战力 ${Math.floor(calcPower())} · 修为 ${Math.floor(G.cult)}`;
            document.getElementById('lifeSummary').textContent=generateLifeSummary();
            document.getElementById('endLogReview').innerHTML=G.logs.map(s=>`<p>${s}</p>`).join('');
            document.getElementById('endOverlay').classList.add('show');
            document.getElementById('spinBtn').disabled=true;
            return;
        }
        updatePanel();checkAchievements();checkRealmDrop();
    }else{
        let deathRate=0.05+(G.realmIndex>=3?0.05:0)+(G.realmIndex>=5?0.05:0)+(G.realmIndex>=6?0.05:0);
        if(Math.random()<deathRate){
            if(G.items['保命道具']>0){
                G.items['保命道具']--;
                G.status='重伤';
                setSubtitle('保命道具挡下天劫！','special');
                addLog('🛡️ 保命道具代你承受天劫之威，重伤但生还');
                checkRealmDrop();
            }else{
                triggerDeath('渡劫失败，魂飞魄散');
                return;
            }
        }else{
            G.cult*=0.6;G.age+=15;G.status='重伤';setSubtitle('渡劫失败，重伤！','bad');addLog('渡劫失败，重伤');checkRealmDrop();
        }
        G._consecutiveTrib=0;updatePanel();
    }
}

function handleEvent(eventName){
    const power=calcPower();let story,gain,opp;
    const abstract=CONFIG.abstractEvents.find(e=>e.id===eventName||e.event===eventName);
    const hasLifeItem=(G.items['保命道具']||0)>0;

    if(abstract){
        // ---- 保命道具 ----
        if(abstract.type==='item'&&abstract.item==='保命道具'){
            let currentCount=G.items['保命道具']||0;
            if(currentCount>=5){
                let comp=applyCultGain(20);G.cult+=comp;
                story=`波照发现了一个保命法器，但已拥有太多，无法携带。他将法器中的波气吸收，修为+${comp}。`;
                setSubtitle(`保命道具已满，修为+${comp}`,'good');addLog(story);
            }else{
                let item=pick(CONFIG.lifeSavingItems);
                G.items['保命道具']=(G.items['保命道具']||0)+1;
                story=`波照获得「${item.name}」：${item.story}`;
                setSubtitle(`获得保命道具：${item.name}！`,'special');addLog(story);
                addLog('⚠️ 你感到一股不祥的气息——拥有保命道具，危险正在逼近...');
            }
            checkAchievements();checkRealmDrop();updatePanel();return;
        }
        // ---- 丹药 ----
        if(abstract.type==='cult_percent'){
            let percent=abstract.value||0.10;
            let gainAmount=Math.floor(G.cult*percent);
            G.cult+=gainAmount;
            story=abstract.story(G);
            setSubtitle(`服下波丹，修为+${gainAmount}（${Math.round(percent*100)}%）`,'good');
            addLog(story);
            checkAchievements();checkRealmDrop();updatePanel();return;
        }
        // ---- 寿元丹 ----
        if(abstract.type==='life'){
            let bonusLife=abstract.value||100;
            G._bonusLife=(G._bonusLife||0)+bonusLife;
            story=abstract.story(G);
            setSubtitle(`寿元 +${bonusLife} 年！`,'good');
            addLog(story);
            checkAchievements();checkRealmDrop();updatePanel();return;
        }
        // ---- 法则事件（化神以上） ----
        if(abstract.type==='law'){
            if(G.realmIndex>=4){
                let lawName=abstract.value;
                if(G.laws[lawName]>=3){
                    gain=applyCultGain(80);
                    G.cult+=gain;
                    story=`${lawName}法则已圆满，波照将其化为精纯修为，+${gain}。`;
                    setSubtitle(`${lawName}法则圆满，修为+${gain}`,'good');
                    addLog(story);
                }else{
                    G.laws[lawName]=(G.laws[lawName]||0)+1;
                    story=abstract.story(G);
                    setSubtitle(`${lawName}法则+1（${G.laws[lawName]}/3)`,'special');
                    addLog(story);
                }
            }else{
                gain=applyCultGain(50);
                G.cult+=gain;
                story=`波照试图感悟法则，但境界不足，未能领悟，却获得了一些修为补偿，+${gain}。`;
                setSubtitle(`修为+${gain}`,'good');
                addLog(story);
            }
            checkAchievements();checkRealmDrop();updatePanel();return;
        }
        // ---- 论道事件 ----
        if(abstract.type==='cult' && abstract.minRealm && G.realmIndex<abstract.minRealm){
            gain=applyCultGain(20);
            G.cult+=gain;
            story=`波照虽未达到论道的境界，但也从旁听中获得了些许感悟，修为+${gain}。`;
            setSubtitle(`修为+${gain}`,'good');
            addLog(story);
            checkAchievements();checkRealmDrop();updatePanel();return;
        }
        // ===== ★★★ 宗门专属事件处理 ★★★ =====
        // ---- sect_cult：宗门专属修为 ----
        if(abstract.type==='sect_cult'){
            if(abstract.sect && G.sect===abstract.sect){
                gain=applyCultGain(abstract.value||50);
                G.cult+=gain;
                story=abstract.story(G);
                setSubtitle(`宗门机缘，修为+${gain}！`,'special');
                addLog(story);
            }else{
                gain=applyCultGain(15);
                G.cult+=gain;
                story=`波照在探索中发现了一些零散机缘，修为+${gain}。`;
                setSubtitle(`修为+${gain}`,'good');
                addLog(story);
            }
            checkAchievements();checkRealmDrop();updatePanel();return;
        }
        // ---- sect_ability：宗门专属能力 ----
        if(abstract.type==='sect_ability'){
            if(abstract.sect && G.sect===abstract.sect){
                const abName=abstract.name;
                if(!G.abilities.includes(abName)){
                    G.abilities.push(abName);
                    story=abstract.story(G);

                gain=applyCultGain(15);
                G.cult+=gain;
                story=`波照在外历练时获得一些杂学感悟，修为+${gain}。`;
                setSubtitle(`修为+${gain}`,'good');
                addLog(story);

            checkAchievements();checkRealmDrop();updatePanel();return;
        }

        if(abstract.type==='sect_law'){
            if(abstract.sect && G.sect===abstract.sect){
                let lawName=abstract.law||'命运';
                if(G.realmIndex>=4){

// ================================================================
// 年龄消耗计算（金丹后×0.7）
// ================================================================
function getAgeCost(){
    let baseCost;
    if(G.realmIndex===0) baseCost = 1;
    else if(G.realmIndex<=2) baseCost = 5;
    else baseCost = 5 * Math.pow(2, G.realmIndex - 2);
    if(G.realmIndex >= 2){
        return Math.floor(baseCost * 0.7);
    }
    return baseCost;
}

const canvas=document.getElementById('wheelCanvas'),ctx=canvas.getContext('2d');
let currentSegments=[],spinAngle=0,isSpinning=false;const PI=Math.PI;

function getSegments(){
    let segs=[],isModao=(G._sectSpecial==='modao'),isCaibup=(G._sectSpecial==='caibup'),pool=[];
    // 过滤掉宗门专属事件中的保命道具（保命道具单独处理）
    let allAbstracts=CONFIG.abstractEvents.filter(e=>!(e.type==='item'&&e.item==='保命道具'));
    let shuffled=[...allAbstracts];
    for(let i=shuffled.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]];}
    let chosen=shuffled.slice(0,10);
    chosen.forEach(ab=>{pool.push({label:ab.label,type:'abstract',event:ab.id,color:'#8a7a6a'});});

    let currentLifeCount=G.items['保命道具']||0;
    if(currentLifeCount<5&&Math.random()<0.03){
        pool.push({label:'保命道具',type:'abstract',event:'神秘护符',color:'#f5d080'});
    }

    // 擂台按顺序
    if(!G._winVillage&&G._villageFails<2){pool.push({label:'村斗',type:'event',event:'村斗',color:'#7a8a6a'});pool.push({label:'村斗',type:'event',event:'村斗',color:'#7a8a6a'});}
    if(G._winVillage&&!G._winArena&&G._arenaFails<2){pool.push({label:'擂台',type:'event',event:'擂台',color:'#6a8a7a'});pool.push({label:'擂台',type:'event',event:'擂台',color:'#6a8a7a'});}
    if(G._winArena&&!G._winTourney&&G._tourneyFails<2){pool.push({label:'仙道大会',type:'event',event:'仙道大会',color:'#d4a06a'});pool.push({label:'仙道大会',type:'event',event:'仙道大会',color:'#d4a06a'});}
    // 波刚
    if(G._gangKill===0 && !G.abilities.includes('波刚之爱')){
        let count=1+(G._gangEncounters||0);
        for(let i=0;i<Math.min(count,4);i++){
            pool.push({label:'波刚',type:'event',event:'波刚',color:'#8a4a3a'});
        }
    }
    const normalEvents=[{label:'抢劫',type:'event',event:'被抢劫',color:'#5a4a4a'},{label:'路见不平',type:'event',event:'路见不平',color:'#4a6a5a'},{label:'挑衅',type:'event',event:'被挑衅',color:'#6a4a5a'},{label:'隐世高手',type:'event',event:'隐世高手',color:'#3a3a5a'}];
    let shuffledNormal=[...normalEvents];for(let i=shuffledNormal.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[shuffledNormal[i],shuffledNormal[j]]=[shuffledNormal[j],shuffledNormal[i]];}
    let chosenNormal=shuffledNormal.slice(0,2+Math.floor(Math.random()*2));
    chosenNormal.forEach(ev=>{pool.push({label:ev.label,type:'event',event:ev.event,color:ev.color});});

    let baseCult=30+G.realmIndex*25;
    const cultItems=[
        {label:`+${baseCult}修`,type:'cult',value:baseCult,color:'#b89a6a'},
        {label:`+${baseCult*2}修`,type:'cult',value:baseCult*2,color:'#c8aa7a'},
        {label:`+${baseCult*4}修`,type:'cult',value:baseCult*4,color:'#d4b08a'}
    ];
    pool.push(...cultItems);

    const allAb=CONFIG.allAbilities.slice();let chosenAb=[];for(let i=0;i<3&&allAb.length>0;i++){let idx=Math.floor(Math.random()*allAb.length);chosenAb.push(allAb.splice(idx,1)[0]);}
    chosenAb.forEach(ab=>{pool.push({label:ab,type:'ability',name:ab,color:'#6a9a7a'});});
    if(isModao){pool.push({label:'魔袭',type:'event',event:'魔道偷袭',color:'#5a3a5a'});pool.push({label:'反噬',type:'event',event:'反噬',color:'#6a3a3a'});}
    if(isCaibup){pool.push({label:'采补',type:'event',event:'采补',color:'#8a4a5a'});}
    for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
    if(pool.length>18)pool=pool.slice(0,18);else if(pool.length<14){while(pool.length<14){pool.push({label:`+${baseCult}修`,type:'cult',value:baseCult,color:'#b89a6a'});}}
    segs=pool.map(item=>({label:item.label,type:item.type||'event',value:item.value||0,name:item.name||'',event:item.event||'',color:item.color||'#6a5a4a'}));
    return segs;
}

function drawWheel(angle){
    const segs=getSegments();currentSegments=segs;
    const n=segs.length,arc=2*PI/n,w=canvas.width,h=canvas.height,r=Math.min(w,h)*0.42,cx=w/2,cy=h/2;
    ctx.clearRect(0,0,w,h);ctx.save();ctx.translate(cx,cy);ctx.rotate(angle);
    for(let i=0;i<n;i++){const start=i*arc,end=start+arc;ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,r,start,end);ctx.closePath();ctx.fillStyle=segs[i].color;ctx.fill();ctx.strokeStyle='#2a221a';ctx.lineWidth=2;ctx.stroke();ctx.save();ctx.rotate(start+arc/2);ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle='#1a1410';ctx.font='bold 11px serif';ctx.shadowColor='rgba(0,0,0,0.3)';ctx.shadowBlur=4;ctx.fillText(segs[i].label,r*0.68,0);ctx.restore();}
    ctx.restore();ctx.save();ctx.translate(cx,cy);ctx.beginPath();ctx.moveTo(0,-r-10);ctx.lineTo(-12,-r-30);ctx.lineTo(12,-r-30);ctx.closePath();ctx.fillStyle='#d4b080';ctx.shadowColor='#000';ctx.shadowBlur=12;ctx.fill();ctx.restore();ctx.beginPath();ctx.arc(cx,cy,14,0,2*PI);ctx.fillStyle='#2a221a';ctx.fill();ctx.strokeStyle='#b89a6a';ctx.lineWidth=3;ctx.stroke();
}

function spinWheel(){
    if(isSpinning||G._dead)return;
    isSpinning=true;document.getElementById('spinBtn').disabled=true;
    const segs=getSegments(),n=segs.length,targetIndex=Math.floor(Math.random()*n),arc=2*PI/n;
    const targetAngle=-PI/2-targetIndex*arc-arc/2,spins=5+Math.floor(Math.random()*4);
    const totalAngle=targetAngle+spins*2*PI,startAngle=spinAngle,duration=2500+Math.random()*1000,startTime=performance.now();
    function animate(time){
        const elapsed=time-startTime,progress=Math.min(elapsed/duration,1),ease=1-Math.pow(1-progress,3);
        const current=startAngle+(totalAngle-startAngle)*ease;spinAngle=current;drawWheel(current);
        if(progress<1)requestAnimationFrame(animate);
        else{spinAngle=current;drawWheel(current);const result=segs[targetIndex];isSpinning=false;document.getElementById('spinBtn').disabled=false;handleSpinResult(result);}
    }
    requestAnimationFrame(animate);
}

function handleSpinResult(seg){
    if(G._dead)return;
    if(seg.type==='ability'&&G.abilities.includes(seg.name)){
        setSubtitle(`已拥有${seg.name}，再抽一次！`,'special');addLog(`重复能力${seg.name}，重转`);
        setTimeout(()=>spinWheel(),800);return;
    }
    if(seg.type==='abstract'){
        const ab=CONFIG.abstractEvents.find(e=>e.id===seg.event);
        if(ab){handleEvent(seg.event);}else{let gain=applyCultGain(30);G.cult+=gain;setSubtitle(`奇遇，修为+${gain}`,'good');addLog(`奇遇，修为+${gain}`);}
    }else if(seg.type==='ability'){
        if(!G.abilities.includes(seg.name)){G.abilities.push(seg.name);setSubtitle(`获得能力：${seg.name}`,'good');addLog(`获得能力：${seg.name}`);checkAchievements();}
    }else if(seg.type==='cult'){
        let gain=applyCultGain(seg.value);G.cult+=gain;setSubtitle(`修为 +${gain}`,'good');addLog(`修为增加 ${gain}`);
    }else if(seg.type==='event'){
        handleEvent(seg.event);
    }else{
        let gain=applyCultGain(20);G.cult+=gain;setSubtitle(`机缘，修为+${gain}`,'good');addLog(`机缘，修为+${gain}`);
    }
    if(seg.type!=='event'){
        let ageCost = getAgeCost();
        G.age += ageCost;
    }
    if(G.status&&G.status.includes('中毒'))G._poisonAge=(G._poisonAge||0)+1;
    let maxLife=CONFIG.realmLifespan[G.realmIndex]+(G._bonusLife||0);
    if(G.age>maxLife){triggerDeath('寿元耗尽');return;}
    recoverStatus();checkAchievements();checkRealmDrop();updatePanel();
    if(G.realmIndex<7&&G.cult>=CONFIG.realmCult[G.realmIndex+1]){attemptTribulation();}
}

}
document.getElementById('drawSectBtn').addEventListener('click',function(){
    if(sectTimer)return;const btn=this;btn.disabled=true;
    const items=document.querySelectorAll('.sect-item'),resultEl=document.getElementById('sectResult');
    const targetIdx=Math.floor(Math.random()*CONFIG.sects.length);
    let count=0,maxCount=20+Math.floor(Math.random()*10),interval=80;
    sectTimer=setInterval(()=>{
        items.forEach(el=>el.classList.remove('active'));
        const showIdx=Math.floor(Math.random()*items.length);items[showIdx].classList.add('active');count++;
        if(count>=maxCount){
            clearInterval(sectTimer);sectTimer=null;items.forEach(el=>el.classList.remove('active'));
            items[targetIdx].classList.add('active');const sect=CONFIG.sects[targetIdx];
            resultEl.textContent=`✨ 波照拜入「${sect.name}」— ${sect.desc} ✨`;
            pendingSect=sect;btn.disabled=false;
            setSubtitle(`📜 ${sect.story}`,'special');addLog(`📜 ${sect.story}`);
            setTimeout(()=>{
                document.getElementById('sectOverlay').classList.remove('show');
                G.sect=sect.name;G.sectData=sect;G.sectSpecial=sect.special||'';
                if(G.sectSpecial==='caibup')addLog('🌸 合欢宗秘术：采补之道，阴阳双修');
                else if(G.sectSpecial==='modao')addLog('⚔️ 魔道宗：杀伐果断，以战养战');
                document.getElementById('mainMenu').style.display='block';
                setSubtitle('波照已拜入宗门，点击转盘开始修仙！','special');
                drawWheel(0);updatePanel();pendingSect=null;
            },1500);
        }
    },interval);
});

let birthTimer2=null,pendingBirth2=null;
function initBirthOverlay(){
    const grid=document.getElementById('birthGrid');if(!grid)return;grid.innerHTML='';
    CONFIG.birthlands.forEach((b,idx)=>{const div=document.createElement('div');div.className='birth-item';div.dataset.index=idx;div.innerHTML=`${b.name}<span class="prob">${(b.prob*100).toFixed(0)}%</span>`;grid.appendChild(div);});
    document.getElementById('birthResult').textContent='点击「抽取出生地」决定命运';
    document.getElementById('drawBirthBtn').disabled=false;
}
document.getElementById('startBtn').addEventListener('click',function(){document.getElementById('startOverlay').classList.remove('show');initBirthOverlay();document.getElementById('birthOverlay').classList.add('show');});
document.getElementById('drawBirthBtn').addEventListener('click',function(){
    if(birthTimer2)return;const btn=this;btn.disabled=true;
    const items=document.querySelectorAll('.birth-item'),resultEl=document.getElementById('birthResult');
    const targetIdx=Math.floor(Math.random()*CONFIG.birthlands.length);
    let count=0,maxCount=20+Math.floor(Math.random()*10),interval=80;
    birthTimer2=setInterval(()=>{
        items.forEach(el=>el.classList.remove('active'));
        const showIdx=Math.floor(Math.random()*items.length);items[showIdx].classList.add('active');count++;
        if(count>=maxCount){
            clearInterval(birthTimer2);birthTimer2=null;items.forEach(el=>el.classList.remove('active'));
            items[targetIdx].classList.add('active');const birth=CONFIG.birthlands[targetIdx];
            resultEl.textContent=`✨ 波照生于「${birth.name}」— ${birth.desc} ✨`;
            pendingBirth2=birth;btn.disabled=false;
            addLog(`🌍 波照生于「${birth.name}」，${birth.desc}`);
            setTimeout(()=>{document.getElementById('birthOverlay').classList.remove('show');document.getElementById('spiritOverlay').classList.add('show');document.getElementById('spiritResult').textContent='点击测试波根';document.getElementById('spiritResult').style.color='#f5d080';},1200);
        }
    },interval);
});
document.getElementById('testSpiritBtn').addEventListener('click',function(){
    if(!pendingBirth2)return;const resultEl=document.getElementById('spiritResult');
    let count=0,maxCount=20,interval=80;
    let timer=setInterval(()=>{
        let tempQ=pick(CONFIG.spiritQuality),tempCnt=pick(CONFIG.spiritCount),avail=[...CONFIG.elements],tempEls=[];
        for(let i=0;i<tempCnt.count;i++){let idx=Math.floor(Math.random()*avail.length);tempEls.push(avail[idx]);avail.splice(idx,1);}
        let suffix=tempCnt.count===1?'波根':(tempCnt.count===5?'混沌五波根':['单','双','三','四','五'][tempCnt.count-1]+'波根');
        resultEl.textContent=`${tempQ.name}${tempEls.join('')}${suffix}`;count++;
        if(count>=maxCount){
            clearInterval(timer);
            let q=drawProb(CONFIG.spiritQuality.map(s=>({...s,prob:s.prob})));
            let cnt=drawProb(CONFIG.spiritCount.map(s=>({...s,prob:s.prob})));
            G.spiritQ=q;G.spiritCount=cnt.count;
            let avail2=[...CONFIG.elements],chosen=[];for(let i=0;i<cnt.count;i++){let idx=Math.floor(Math.random()*avail2.length);chosen.push(avail2[idx]);avail2.splice(idx,1);}
            G.spiritElements=chosen;
            let birth=pendingBirth2;
            G.birthland=birth.name;G.birthlandData=birth;
            G.cult=birth.cult;G.basePower=birth.power;G.age=18;
            G.items={'渡劫丹':0,'疗伤药':0,'解毒丹':0,'保命道具':0};
            birth.items.forEach(item=>{if(item==='疗伤药')G.items['疗伤药']=(G.items['疗伤药']||0)+1;else if(item==='渡劫丹')G.items['渡劫丹']=(G.items['渡劫丹']||0)+1;else if(CONFIG.allAbilities.includes(item)){if(!G.abilities.includes(item))G.abilities.push(item);}});
            if(birth.name==='紫府圣地'){let keys=Object.keys(G.laws);G.laws[pick(keys)]=1;}
            G._bonusLife=birth.bonusLife||0;G._flagNearDeath=false;G._flagTribPass=false;G._flagCaibup=false;G._flagRealmUpAfterCaibup=false;
            G._consecutiveTrib=0;G._winVillage=false;G._winArena=false;G._winTourney=false;
            G._villageFails=0;G._arenaFails=0;G._tourneyFails=0;
            G._gangEncounters=0;G._gangKill=0;G._gangLosses=0;
            G._dead=false;G._deathCause='';G._powerBuff=0;G.logs=[];G.achievements={};
            CONFIG.achievements.forEach(a=>G.achievements[a.id]=false);
            let finalDisplay=getSpiritDisplay();resultEl.textContent=`✨ ${finalDisplay} ✨`;
            if(q.name==='极品')resultEl.style.color='#ffd700';else resultEl.style.color='#f5d080';
            let spiritStory=q.name==='极品'?'天资卓越，修行之路一片坦途。':q.name==='上品'?'资质上佳，勤修苦练可成大器。':q.name==='中品'?'资质平平，唯有以勤补拙。':'资质愚钝，但心怀坚韧，亦能逆天而行。';
            addLog(`🌱 波照的波根为：${finalDisplay}，${spiritStory}`);
            setTimeout(()=>{document.getElementById('spiritOverlay').classList.remove('show');initSectOverlay();document.getElementById('sectOverlay').classList.add('show');pendingBirth2=null;},1500);
        }
    },interval);
});

document.getElementById('restartBtn').addEventListener('click',function(){
    document.getElementById('endOverlay').classList.remove('show');
    document.getElementById('mainMenu').style.display='none';
    document.getElementById('startOverlay').classList.add('show');
    document.getElementById('birthOverlay').classList.remove('show');
    document.getElementById('spiritOverlay').classList.remove('show');
    document.getElementById('sectOverlay').classList.remove('show');
    document.getElementById('spinBtn').disabled=false;
    if(birthTimer2){clearInterval(birthTimer2);birthTimer2=null;}
    if(sectTimer){clearInterval(sectTimer);sectTimer=null;}
    if(tribResolve){tribResolve=null;}
    initState();
});

document.getElementById('spinBtn').addEventListener('click',function(){spinWheel();});

initState();
document.getElementById('mainMenu').style.display='none';
document.getElementById('startOverlay').classList.add('show');
console.log('🧘 修仙转盘 · 波途 — 所有宗门已平衡（4~5个事件，含正负面）');
</script>
