<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>修仙转盘 · 波途 · 天衍版</title>
    <style>
        /* ===== 全局 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #1a1410;
            color: #d4c9b0;
            font-family: 'Georgia', '宋体', serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-image: radial-gradient(ellipse at 20% 50%, #2a2018 0%, #0d0a08 100%);
        }

        .game-wrapper {
            max-width: 1400px;
            width: 100%;
            background: rgba(30, 24, 20, 0.88);
            border: 2px solid #6a5a4a;
            border-radius: 28px;
            padding: 25px 22px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8), inset 0 0 80px rgba(80, 60, 40, 0.15);
            backdrop-filter: blur(4px);
        }
        .game-title {
            text-align: center;
            font-size: 2rem;
            font-weight: bold;
            letter-spacing: 8px;
            color: #e6d5b8;
            text-shadow: 0 0 20px #b89a6a, 0 2px 4px #000;
            margin-bottom: 16px;
            border-bottom: 1px solid #4a3f34;
            padding-bottom: 10px;
        }
        .game-title small {
            font-size: 0.9rem;
            letter-spacing: 2px;
            color: #a08060;
            display: block;
            margin-top: 2px;
        }

        .main-area {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }
        .left-panel {
            flex: 2.2;
            min-width: 380px;
        }
        .right-panel {
            flex: 1.2;
            min-width: 260px;
            background: rgba(20, 16, 12, 0.65);
            border-radius: 18px;
            padding: 16px 14px;
            border: 1px solid #3d3228;
            max-height: 700px;
            overflow-y: auto;
        }
        .right-panel::-webkit-scrollbar {
            width: 4px;
        }
        .right-panel::-webkit-scrollbar-thumb {
            background: #6a5a4a;
            border-radius: 8px;
        }

        /* ===== 转盘 ===== */
        .wheel-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        canvas#wheelCanvas {
            width: 100%;
            max-width: 440px;
            height: auto;
            aspect-ratio: 1/1;
            background: #2a221a;
            border-radius: 50%;
            border: 6px solid #6a5a4a;
            box-shadow: 0 0 40px rgba(180, 140, 100, 0.25), inset 0 0 30px #00000066;
            cursor: pointer;
        }

        .btn-spin {
            margin-top: 14px;
            padding: 10px 36px;
            font-size: 1.3rem;
            font-weight: bold;
            background: #3d3228;
            border: 2px solid #b89a6a;
            color: #e6d5b8;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.2s;
            letter-spacing: 4px;
            text-shadow: 0 0 8px #b89a6a44;
        }
        .btn-spin:hover {
            background: #5a4a3a;
            border-color: #d4b080;
            box-shadow: 0 0 30px #b89a6a33;
        }
        .btn-spin:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            box-shadow: none;
        }

        .subtitle {
            min-height: 56px;
            margin: 10px 0 6px;
            font-size: 1.1rem;
            text-align: center;
            color: #f0e0c8;
            background: rgba(0, 0, 0, 0.55);
            padding: 10px 16px;
            border-radius: 12px;
            border-left: 4px solid #b89a6a;
            transition: all 0.3s;
            width: 100%;
            max-width: 440px;
            line-height: 1.5;
        }
        .subtitle.good {
            border-left-color: #6fc;
            color: #bfe;
        }
        .subtitle.bad {
            border-left-color: #c66;
            color: #fcc;
        }
        .subtitle.special {
            border-left-color: #fa0;
            color: #fea;
            background: rgba(40, 30, 10, 0.7);
        }

        .log-area {
            margin-top: 10px;
            max-height: 140px;
            overflow-y: auto;
            background: #0d0a08cc;
            border-radius: 12px;
            padding: 6px 12px;
            font-size: 0.8rem;
            border: 1px solid #3d3228;
            width: 100%;
            max-width: 440px;
            line-height: 1.6;
        }
        .log-area p {
            margin: 2px 0;
            padding: 2px 0;
            border-bottom: 1px dashed #1f1814;
            color: #c4b8a8;
        }
        .log-area p .highlight {
            color: #f5d080;
        }
        .log-area p .badge {
            color: #d66;
        }
        .log-area p .good {
            color: #8cc;
        }
        .log-area::-webkit-scrollbar {
            width: 3px;
        }
        .log-area::-webkit-scrollbar-thumb {
            background: #5a4a3a;
        }

        /* ===== 右侧面板 ===== */
        .panel-item {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            border-bottom: 1px solid #221c16;
            font-size: 0.9rem;
            flex-wrap: wrap;
            gap: 4px;
        }
        .panel-item .label {
            color: #a09080;
        }
        .panel-item .value {
            color: #ecd8c0;
            font-weight: bold;
        }
        .panel-item .value.gold {
            color: #f5d080;
        }
        .panel-item .value.green {
            color: #8cc;
        }
        .panel-item .value.red {
            color: #d66;
        }

        .progress-bar {
            width: 100%;
            height: 7px;
            background: #1a1410;
            border-radius: 8px;
            overflow: hidden;
            margin: 3px 0 6px;
            border: 1px solid #3d3228;
        }
        .progress-bar .fill {
            height: 100%;
            background: linear-gradient(90deg, #b89a6a, #e6c08a);
            border-radius: 8px;
            transition: width 0.4s;
        }
        .progress-bar .fill.life {
            background: linear-gradient(90deg, #6a8a6a, #8aba8a);
        }
        .progress-bar .fill.cult {
            background: linear-gradient(90deg, #8a6a9a, #b08ac0);
        }

        .ability-tag,
        .law-tag,
        .achieve-tag {
            display: inline-block;
            background: #2a221a;
            padding: 1px 10px;
            border-radius: 12px;
            margin: 2px 3px 2px 0;
            font-size: 0.75rem;
            border: 1px solid #4a3f34;
        }
        .ability-tag.gold {
            border-color: #b89a6a;
            color: #f5d080;
        }
        .law-tag {
            border-color: #6a8aba;
            color: #8ac0e0;
        }
        .law-tag.complete {
            border-color: #f5d080;
            background: #3d3228;
            color: #f5d080;
            box-shadow: 0 0 12px #f5d08044;
        }
        .achieve-tag.locked {
            opacity: 0.35;
            filter: grayscale(0.7);
        }
        .achieve-tag.unlocked {
            border-color: #f5d080;
            color: #f5d080;
            background: #3d3228;
        }

        /* ===== 覆盖层 ===== */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.88);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
            backdrop-filter: blur(10px);
            flex-direction: column;
        }
        .overlay.show {
            display: flex;
        }
        .overlay-box {
            background: #1a1410;
            border: 2px solid #6a5a4a;
            border-radius: 28px;
            padding: 35px 45px;
            max-width: 700px;
            width: 90%;
            text-align: center;
            box-shadow: 0 0 80px rgba(0, 0, 0, 0.95);
            max-height: 90vh;
            overflow-y: auto;
        }
        .overlay-box h1 {
            font-size: 2.4rem;
            color: #f5d080;
            margin-bottom: 8px;
        }
        .overlay-box p {
            font-size: 1.05rem;
            color: #d4c9b0;
            margin: 8px 0;
            line-height: 1.6;
        }
        .overlay-box .btn-restart {
            margin-top: 22px;
            padding: 10px 36px;
            font-size: 1.1rem;
            background: #3d3228;
            border: 2px solid #b89a6a;
            color: #e6d5b8;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.2s;
            letter-spacing: 2px;
        }
        .overlay-box .btn-restart:hover {
            background: #5a4a3a;
        }
        .overlay-box .spirit-result {
            font-size: 2rem;
            color: #f5d080;
            margin: 15px 0;
            padding: 10px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 12px;
            border: 1px solid #6a5a4a;
        }
        .log-review {
            text-align: left;
            max-height: 300px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            padding: 10px 14px;
            margin: 12px 0;
            border: 1px solid #4a3f34;
            font-size: 0.85rem;
            line-height: 1.5;
        }
        .log-review p {
            margin: 4px 0;
            padding: 2px 0;
            border-bottom: 1px dashed #2a221a;
        }
        .log-review::-webkit-scrollbar {
            width: 4px;
        }
        .log-review::-webkit-scrollbar-thumb {
            background: #6a5a4a;
            border-radius: 8px;
        }

        /* ===== 头像 ===== */
        .avatar-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            border: 1px solid #3d3228;
        }
        .avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            font-weight: bold;
            color: #1a1410;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
            flex-shrink: 0;
            transition: all 0.6s ease;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.6);
            border: 2px solid #6a5a4a;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #3a3a3a;
        }
        /* 回退文字样式 */
        .avatar.realm-0 {
            background-color: #6a7a7a;
        }
        .avatar.realm-1 {
            background-color: #7a9a8a;
        }
        .avatar.realm-2 {
            background-color: #4a8aaa;
        }
        .avatar.realm-3 {
            background-color: #9a6aba;
        }
        .avatar.realm-4 {
            background-color: #d4a04a;
        }
        .avatar.realm-5 {
            background-color: #d47a4a;
        }
        .avatar.realm-6 {
            background-color: #c04a5a;
        }
        .avatar.realm-7 {
            background-color: #f5d080;
            box-shadow: 0 0 40px #f5d08088;
        }
        .avatar .realm-char {
            font-size: 28px;
            color: #1a1410;
            font-weight: bold;
            text-shadow: 0 1px 4px rgba(255, 255, 255, 0.2);
        }
        .avatar.pulse {
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0% {
                transform: scale(1);
                box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
            }
            50% {
                transform: scale(1.08);
                box-shadow: 0 0 40px rgba(255, 215, 0, 0.6);
            }
            100% {
                transform: scale(1);
                box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
            }
        }
        .avatar.breakthrough {
            animation: breakthrough 0.8s ease;
        }
        @keyframes breakthrough {
            0% {
                transform: scale(0.5) rotate(-20deg);
                opacity: 0;
            }
            50% {
                transform: scale(1.4) rotate(10deg);
                opacity: 1;
            }
            100% {
                transform: scale(1) rotate(0deg);
                opacity: 1;
            }
        }

        /* ===== 渡劫转盘 ===== */
        .trib-wheel {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
            max-width: 400px;
        }
        .trib-item {
            padding: 10px 16px;
            background: #2a221a;
            border: 2px solid #4a3f34;
            border-radius: 12px;
            font-size: 1.2rem;
            color: #a09080;
            transition: 0.1s;
            min-width: 60px;
            text-align: center;
            flex: 1 0 auto;
        }
        .trib-item.active {
            border-color: #f5d080;
            color: #f5d080;
            background: #3d3228;
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(245, 208, 128, 0.3);
        }
        .trib-item.success {
            border-color: #6fc;
            color: #8cc;
        }
        .trib-item.fail {
            border-color: #c66;
            color: #f88;
        }
        .trib-item.success.active {
            border-color: #6fc;
            color: #8cc;
            background: #1a3a2a;
            box-shadow: 0 0 30px rgba(100, 255, 200, 0.2);
        }
        .trib-item.fail.active {
            border-color: #c66;
            color: #f88;
            background: #3a1a1a;
            box-shadow: 0 0 30px rgba(255, 100, 100, 0.2);
        }
        .trib-result {
            font-size: 2rem;
            color: #f5d080;
            margin: 10px 0;
            min-height: 60px;
        }
        .trib-result.success {
            color: #8cc;
        }
        .trib-result.fail {
            color: #f88;
        }

        /* ===== 出生地 ===== */
        .birth-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 20px 0;
        }
        .birth-item {
            padding: 12px 8px;
            background: rgba(30, 24, 20, 0.6);
            border: 2px solid #3d3228;
            border-radius: 12px;
            font-size: 0.9rem;
            color: #a09080;
            transition: all 0.15s;
            text-align: center;
        }
        .birth-item.active {
            border-color: #f5d080;
            background: rgba(245, 208, 128, 0.15);
            color: #f5d080;
            box-shadow: 0 0 20px rgba(245, 208, 128, 0.3);
            transform: scale(1.05);
        }
        .birth-item .prob {
            display: block;
            font-size: 0.7rem;
            color: #6a5a4a;
            margin-top: 4px;
        }
        .birth-result {
            font-size: 1.8rem;
            color: #f5d080;
            padding: 12px;
            min-height: 60px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            border: 1px solid #6a5a4a;
            margin: 10px 0;
        }

        /* ===== 宗门 ===== */
        .sect-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 20px 0;
        }
        .sect-item {
            padding: 12px 8px;
            background: rgba(30, 24, 20, 0.6);
            border: 2px solid #3d3228;
            border-radius: 12px;
            font-size: 0.9rem;
            color: #a09080;
            transition: all 0.15s;
            text-align: center;
        }
        .sect-item.active {
            border-color: #f5d080;
            background: rgba(245, 208, 128, 0.15);
            color: #f5d080;
            box-shadow: 0 0 20px rgba(245, 208, 128, 0.3);
            transform: scale(1.05);
        }
        .sect-item .desc {
            font-size: 0.7rem;
            color: #6a5a4a;
            display: block;
            margin-top: 4px;
        }
        .sect-result {
            font-size: 1.8rem;
            color: #f5d080;
            padding: 12px;
            min-height: 60px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            border: 1px solid #6a5a4a;
            margin: 10px 0;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 800px) {
            .game-wrapper {
                padding: 12px;
            }
            .right-panel {
                max-height: 380px;
            }
            .overlay-box {
                padding: 25px 20px;
                margin: 0 16px;
            }
            .birth-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .sect-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .trib-item {
                font-size: 1rem;
                padding: 8px 12px;
                min-width: 50px;
            }
            .avatar {
                width: 48px;
                height: 48px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== 主界面 ===== -->
    <div class="game-wrapper" id="mainMenu" style="display:none;">
        <div class="game-title">修仙转盘 · 波途 <small>天命由运 · 万法归一</small></div>
        <div class="main-area">
            <div class="left-panel">
                <div class="wheel-container">
                    <canvas id="wheelCanvas" width="500" height="500"></canvas>
                    <button class="btn-spin" id="spinBtn">开始修仙</button>
                    <div class="subtitle" id="subtitle">点击转盘，抽取命运之轮</div>
                    <div class="log-area" id="logArea"></div>
                </div>
            </div>
            <div class="right-panel" id="panelContent"></div>
        </div>
    </div>

    <!-- ===== 开始 ===== -->
    <div class="overlay show" id="startOverlay">
        <div class="overlay-box">
            <h1 style="font-size:2.8rem;">修仙转盘</h1>
            <p style="font-size:1.2rem; color:#b89a6a;">波照 · 天命伊始</p>
            <button class="btn-restart" id="startBtn">开始波途</button>
        </div>
    </div>

    <!-- ===== 出生地 ===== -->
    <div class="overlay" id="birthOverlay">
        <div class="overlay-box">
            <h1>出生地 · 天命之选</h1>
            <p style="color:#b89a6a;">波照将生于何方？</p>
            <div class="birth-grid" id="birthGrid"></div>
            <div class="birth-result" id="birthResult">点击「抽取」决定命运</div>
            <button class="btn-restart" id="drawBirthBtn">抽取出生地</button>
        </div>
    </div>

    <!-- ===== 灵根 ===== -->
    <div class="overlay" id="spiritOverlay">
        <div class="overlay-box">
            <h1>灵根测试</h1>
            <p style="color:#b89a6a;">波照正在感应天地灵气...</p>
            <div class="spirit-result" id="spiritResult">???</div>
            <button class="btn-restart" id="testSpiritBtn">测试灵根</button>
        </div>
    </div>

    <!-- ===== 宗门 ===== -->
    <div class="overlay" id="sectOverlay">
        <div class="overlay-box">
            <h1>宗门 · 道途之择</h1>
            <p style="color:#b89a6a;">波照将拜入何门何派？</p>
            <div class="sect-grid" id="sectGrid"></div>
            <div class="sect-result" id="sectResult">点击「抽取」决定宗门</div>
            <button class="btn-restart" id="drawSectBtn">抽取宗门</button>
        </div>
    </div>

    <!-- ===== 渡劫 ===== -->
    <div class="overlay" id="tribOverlay">
        <div class="overlay-box">
            <h1>⚡ 天劫降临 ⚡</h1>
            <p style="color:#b89a6a;" id="tribProbDisplay">点击「渡劫」旋转命运之轮</p>
            <div class="trib-wheel" id="tribWheel"></div>
            <div class="trib-result" id="tribResult">?</div>
            <button class="btn-restart" id="tribBtn">渡劫</button>
        </div>
    </div>

    <!-- ===== 结局 ===== -->
    <div class="overlay" id="endOverlay">
        <div class="overlay-box">
            <h1 id="endTitle">道陨</h1>
            <p id="endDesc"></p>
            <p id="endSummary" style="font-size:0.9rem; color:#a09080; margin-top:8px;"></p>
            <div class="log-review" id="endLogReview"></div>
            <button class="btn-restart" id="restartBtn">轮回重修</button>
        </div>
    </div>

    <script>
        // ================================================================
        //  CONFIG
        // ================================================================
        const CONFIG = {
            realms: ['炼气', '筑基', '金丹', '元婴', '化神', '合体', '渡劫', '大乘'],
            realmCult: [0, 100, 300, 800, 2000, 5000, 12000, 25000],
            realmLifespan: [100, 150, 250, 400, 600, 900, 1300, Infinity],
            realmCoeff: [1, 2, 3, 4, 5, 6, 7, 8],
            spiritQuality: [
                { name: '下品', prob: 0.40, speed: 0.05, power: 0.03 },
                { name: '中品', prob: 0.35, speed: 0.20, power: 0.12 },
                { name: '上品', prob: 0.20, speed: 0.50, power: 0.25 },
                { name: '极品', prob: 0.05, speed: 1.00, power: 0.45 }
            ],
            spiritCount: [
                { count: 1, prob: 0.30, bonus: 0.00 },
                { count: 2, prob: 0.35, bonus: 0.05 },
                { count: 3, prob: 0.25, bonus: 0.08 },
                { count: 4, prob: 0.08, bonus: 0.12 },
                { count: 5, prob: 0.02, bonus: 0.15 }
            ],
            elements: ['金', '木', '水', '火', '土'],
            elementAbility: { '金': '飞剑', '木': '御风术', '水': '不死之身', '火': '炼丹术', '土': '法天象地' },
            birthlands: [
                { name: '荒芜村落', prob: 0.30, cult: 0, power: 80, items: [], bonusCult: 0, bonusLife: 0, extraPower: 0,
                    desc: '灵气枯竭之地' },
                { name: '边境小镇', prob: 0.25, cult: 10, power: 90, items: [], bonusCult: 0, bonusLife: 10, extraPower: 0,
                    desc: '边陲之地' },
                { name: '灵溪村', prob: 0.20, cult: 30, power: 110, items: ['疗伤药'], bonusCult: 0.05, bonusLife: 0,
                    extraPower: 0, desc: '灵溪之畔' },

        // ================================================================

        let G = {};
        // 头像图片缓存：记录每个图片URL是否已成功加载
        const avatarImageCache = {};

        function initState() {

                birthland: '',

                age: 18,
                cult: 0,
                basePower: 80,
                abilities: [],
                items: { '渡劫丹': 0, '疗伤药': 0, '解毒丹': 0 },

                logs: [],
                achievements: {},

        function rand(min, max) { return Math.random() * (max - min) + min; }

        function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

        function drawProb(items) { let r = Math.random(),
                c = 0; for (let it of items) { c += it.prob; if (r < c) return it; } return items[items.length - 1]; }

        // ================================================================
        //  辅助函数
        // ================================================================
        function getSpiritDisplay() {
            if (!G.spiritQ || !G.spiritElements) return '未知灵根';
            let q = G.spiritQ.name || '下品';
            let els = G.spiritElements.join('') || '';
            let c = G.spiritCount || 1;
            let suffix = c === 1 ? '灵根' : (c === 5 ? '混沌五灵根' : ['单', '双', '三', '四', '五'][c - 1] + '灵根');
            return `${q}${els}${suffix}`;
        }

        function calcPower() {
            const base = G.birthlandData ? G.birthlandData.power : 80;
            const realmAdd = CONFIG.realmCoeff[G.realmIndex] * 50;
            const abilityAdd = (G.abilities || []).length * 30;
            const specials = ['不死之身', '法天象地', '古神血脉', '神兽伙伴', '金刚不坏', '剑心通明', '断念剑意', '天眼通', '元神出窍'];
            const specialAdd = (G.abilities || []).filter(a => specials.includes(a)).length * 100;
            const lawAdd = G.laws ? Object.values(G.laws).reduce((a, b) => a + b, 0) * 20 : 0;
            const extra = G.birthlandData ? G.birthlandData.extraPower : 0;
            let raw = base + realmAdd + abilityAdd + specialAdd + lawAdd + extra + (G._powerBuff || 0);
            let mult = 1;
            if (G.status === '轻伤') mult *= 0.8;
            if (G.status === '重伤') mult *= 0.5;
            if (G.status === '濒死') mult *= 0.2;
            if (G.status && G.status.includes('中毒')) mult *= 0.9;
            const spiritPower = G.spiritQ ? G.spiritQ.power : 0;
            return Math.floor(raw * mult * (1 + spiritPower));
        }

        function applyCultGain(base) {
            let mult = 1 + (G.birthlandData ? G.birthlandData.bonusCult : 0) + (G.sectData ? G.sectData.bonusCult : 0) + (G
                .spiritQ ? G.spiritQ.speed : 0);
            let match = 0;
            if (G.spiritElements && G.abilities) {
                for (let el of G.spiritElements) {
                    if (G.abilities.includes(CONFIG.elementAbility[el])) match++;
                }
            }
            mult += match * 0.30;
            const cb = CONFIG.spiritCount.find(s => s.count === G.spiritCount)?.bonus || 0;
            mult += cb;
            let gain = Math.floor(base * mult);
            return gain;
        }

        function addLog(msg) {
            if (!G.logs) G.logs = [];
            G.logs.push(`【${G.age}岁】波照 ${msg}`);
            if (G.logs.length > 80) G.logs.shift();
            updateLogUI();
        }

        function updateLogUI() {
            const area = document.getElementById('logArea');
            if (area && G.logs) area.innerHTML = G.logs.slice(-25).map(s => `<p>${s}</p>`).join('');
        }

        function setSubtitle(text, cls = '') {
            const el = document.getElementById('subtitle');
            if (el) { el.textContent = text;
                el.className = 'subtitle ' + (cls || ''); }
        }

        // ================================================================
        //  头像更新（根据境界切换图片）
        // ================================================================
        function updateAvatar() {
            const avatarEl = document.getElementById('avatar');
            if (!avatarEl) return;

            const idx = G.realmIndex || 0;
            const chars = ['炼', '筑', '金', '婴', '化', '合', '渡', '仙'];

            // 金丹前（index 0,1）使用 obstacle-sprite.png，金丹后（index >=2）使用 zhujue.jpg
            let imgSrc;
            if (idx < 2) {
                imgSrc = 'obstacle-sprite.png';
            } else {
                imgSrc = 'zhujue.jpg';
            }

            // 检查缓存：已成功加载 -> 直接显示图片
            if (avatarImageCache[imgSrc] === true) {
                avatarEl.style.backgroundImage = `url(${imgSrc})`;
                avatarEl.style.backgroundSize = 'cover';
                avatarEl.style.backgroundPosition = 'center';
                avatarEl.innerHTML = '';
                avatarEl.className = 'avatar';
                applyAvatarAnimations(avatarEl, idx);
                return;
            }

            // 缓存中明确加载失败 -> 回退到文字
            if (avatarImageCache[imgSrc] === false) {
                showTextAvatar(avatarEl, idx, chars);
                return;
            }

            // 未缓存，尝试加载图片
            const img = new Image();
            img.onload = function() {
                avatarImageCache[imgSrc] = true;
                avatarEl.style.backgroundImage = `url(${imgSrc})`;
                avatarEl.style.backgroundSize = 'cover';
                avatarEl.style.backgroundPosition = 'center';
                avatarEl.innerHTML = '';
                avatarEl.className = 'avatar';
                applyAvatarAnimations(avatarEl, idx);
            };
            img.onerror = function() {
                avatarImageCache[imgSrc] = false;
                showTextAvatar(avatarEl, idx, chars);
            };
            img.src = imgSrc;
        }

        // 应用头像动画（突破、脉动）
        function applyAvatarAnimations(avatarEl, idx) {
            if (G._avatarBreakthrough) {
                avatarEl.classList.add('breakthrough');
                setTimeout(() => {
                    avatarEl.classList.remove('breakthrough');
                    G._avatarBreakthrough = false;
                }, 800);
            }
            if (idx === 7) {
                avatarEl.classList.add('pulse');
            } else {
                avatarEl.classList.remove('pulse');
            }
        }

        // 回退到文字头像
        function showTextAvatar(avatarEl, idx, chars) {
            avatarEl.className = `avatar realm-${idx}`;
            avatarEl.innerHTML = `<span class="realm-char">${chars[idx]}</span>`;
            avatarEl.style.backgroundImage = '';
            if (G._avatarBreakthrough) {
                avatarEl.classList.add('breakthrough');
                setTimeout(() => {
                    avatarEl.classList.remove('breakthrough');
                    G._avatarBreakthrough = false;
                }, 800);
            }
            if (idx === 7) {
                avatarEl.classList.add('pulse');
            } else {
                avatarEl.classList.remove('pulse');
            }
        }

        // ================================================================
        //  更新面板
        // ================================================================
        function updatePanel() {

            if (!p) return;
            const realm = CONFIG.realms[G.realmIndex] || '炼气';
            const nextCult = G.realmIndex < 7 ? CONFIG.realmCult[G.realmIndex + 1] : Infinity;
            const cultProgress = G.realmIndex < 7 ? (G.cult - CONFIG.realmCult[G.realmIndex]) / (nextCult - CONFIG
                .realmCult[G.realmIndex]) : 1;
            const lifespan = CONFIG.realmLifespan[G.realmIndex] + (G._bonusLife || 0);
            const ageProgress = G.age / lifespan;
            const power = calcPower();
            const smap = { '健康': '❤️', '轻伤': '🟡', '重伤': '🔴', '濒死': '💀', '中毒': '☠️' };
            const avatarHTML = `
                <div class="avatar-container">
                    <div class="avatar" id="avatar"></div>
                    <div>
                        <div style="font-size:1.2rem; font-weight:bold; color:#f5d080;">波照</div>
                        <div style="font-size:0.8rem; color:#a09080;">${G.birthland || ''} · ${G.sect || ''}</div>
                    </div>
                </div>
            `;
            let allAbilities = G.abilities || [];
            let abTags = allAbilities.map(a => `<span class="ability-tag ${CONFIG.elementAbility.includes? '':'gold'}">${a}</span>`)
                .join('');
            let html = avatarHTML + `
                <div class="panel-item"><span class="label">🌱 灵根</span><span class="value gold">${getSpiritDisplay()}</span></div>

                <div class="progress-bar"><div class="fill life" style="width:${Math.min(ageProgress,1)*100}%"></div></div>
                <div class="panel-item"><span class="label">📈 修为</span><span class="value">${Math.floor(G.cult)}/${nextCult===Infinity?'∞':nextCult}</span></div>
                <div class="progress-bar"><div class="fill cult" style="width:${Math.min(cultProgress,1)*100}%"></div></div>
                <div class="panel-item"><span class="label">⚡ 战力</span><span class="value gold">${Math.floor(power)}</span></div>
                <div class="panel-item"><span class="label">🧬 状态</span><span class="value">${G.status} ${smap[G.status]||'❤️'}</span></div>
                <div class="panel-item"><span class="label">🏯 宗门</span><span class="value gold">${G.sect || '无'}</span></div>
                <div class="panel-item"><span class="label">🏯 贡献</span><span class="value gold">${G._sectContribution||0}</span></div>
                <div class="panel-item" style="flex-wrap:wrap;"><span class="label">📜 能力</span><span>${abTags || '无'}</span></div>
                <div class="panel-item" style="flex-wrap:wrap;"><span class="label">⚖️ 法则</span><span>${Object.entries(G.laws||{}).map(([k,v])=>`<span class="law-tag ${v>=3?'complete':''}">${k} ${v}/3</span>`).join('')}</span></div>
                <div class="panel-item" style="flex-wrap:wrap;"><span class="label">🏆 成就</span><span>${CONFIG.achievements.map(a=>`<span class="achieve-tag ${G.achievements && G.achievements[a.id]?'unlocked':'locked'}">${a.name}</span>`).join('')}</span></div>
                <div class="panel-item" style="flex-wrap:wrap;"><span class="label">🎒 道具</span><span>${Object.entries(G.items||{}).filter(([k,v])=>v>0).map(([k,v])=>`${k}×${v}`).join(' ')||'无'}</span></div>
            `;
            p.innerHTML = html;

        // ================================================================
        //  成就、状态、死亡
        // ================================================================
        function checkAchievements() {
            let unlocked = [];
            for (let a of CONFIG.achievements) {
                if (!G.achievements[a.id] && a.check(G)) {
                    G.achievements[a.id] = true;
                    unlocked.push(a.name);
                    addLog(`🏆 解锁成就：${a.name}！`);
                }
            }
            if (unlocked.length) { setSubtitle(`🏆 解锁成就：${unlocked.join('、')}`, 'special');
                updatePanel(); }
        }

        function recoverStatus() {
            const p = calcPower();
            const bonus = (p > 500 ? 0.05 : 0) + (p > 1000 ? 0.05 : 0);
            if (G.status === '轻伤' && Math.random() < 0.30 + bonus) { G.status = '健康';
                setSubtitle('伤势好转，轻伤已愈！', 'good');
                addLog('伤势恢复，回到健康'); } else if (G.status === '重伤' && Math.random() < 0.15 + bonus) { G.status =
                    '轻伤';
                setSubtitle('伤势好转，重伤→轻伤', 'good');
                addLog('重伤缓解为轻伤'); } else if (G.status === '濒死' && Math.random() < 0.05 + (p > 500 ? 0.05 : 0)) { G
                    .status = '重伤';
                setSubtitle('吊住一口气，濒死→重伤', 'good');
                addLog('从濒死中缓过来'); }
            if (G.status && G.status.includes('中毒') && Math.random() < 0.20 + (p > 800 ? 0.15 : 0)) {
                G.status = G.status.replace('中毒', '').trim() || '健康';
                setSubtitle('毒素消退！', 'good');
                addLog('解毒成功');
            }
            if (G.status === '濒死' && Math.random() < 0.20) triggerDeath('濒死未能挺过');
        }

        function triggerDeath(reason) {
            if (G._dead) return;
            G._dead = true;
            G._deathCause = reason;
            const ending = pick(CONFIG.deathEndings);
            document.getElementById('endTitle').textContent = '道陨 · ' + ending.split('：')[0].replace(/[「」]/g, '');
            document.getElementById('endDesc').textContent = ending;
            document.getElementById('endSummary').textContent =
                `寿元 ${G.age} 岁 · 境界 ${CONFIG.realms[G.realmIndex]||'炼气'} · 战力 ${Math.floor(calcPower())} · 修为 ${Math.floor(G.cult)} · 贡献 ${G._sectContribution||0}`;
            const review = document.getElementById('endLogReview');
            review.innerHTML = G.logs.map(s => `<p>${s}</p>`).join('');
            document.getElementById('endOverlay').classList.add('show');
            document.getElementById('spinBtn').disabled = true;
            addLog(`⚠️ 道陨：${ending}`);
        }

        function checkRealmDrop() {
            while (G.realmIndex > 0 && G.cult < CONFIG.realmCult[G.realmIndex]) {
                G.realmIndex--;
                addLog(`⚠️ 修为不足，境界跌落至 ${CONFIG.realms[G.realmIndex]}`);
                setSubtitle(`修为不足，跌落至 ${CONFIG.realms[G.realmIndex]}！`, 'bad');
                let maxLife = CONFIG.realmLifespan[G.realmIndex] + (G._bonusLife || 0);
                if (G.age > maxLife) { triggerDeath('境界跌落导致寿元耗尽'); return; }
                updatePanel();
            }
        }

        // ================================================================
        //  渡劫转盘（修复版）
        // ================================================================
        let tribResolve = null;
        let tribSuccess = false;

        function showTribWheel(baseProb, success) {
            return new Promise((resolve) => {
                tribResolve = resolve;
                tribSuccess = success;
                const overlay = document.getElementById('tribOverlay');
                const wheel = document.getElementById('tribWheel');
                const resultEl = document.getElementById('tribResult');
                const probDisplay = document.getElementById('tribProbDisplay');
                const btn = document.getElementById('tribBtn');
                const pct = Math.round(baseProb);
                probDisplay.textContent = `⚡ 当前渡劫成功率：${pct}%  · 点击「渡劫」旋转命运之轮`;
                const totalSlots = 8;
                const successSlots = Math.round((baseProb / 100) * totalSlots);
                const failSlots = totalSlots - successSlots;
                let slots = [];
                for (let i = 0; i < successSlots; i++) slots.push('success');
                for (let i = 0; i < failSlots; i++) slots.push('fail');
                for (let i = slots.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [slots[i], slots[j]] = [slots[j], slots[i]];
                }
                if (successSlots === 0) slots = ['fail', 'fail', 'fail', 'fail', 'fail', 'fail', 'fail', 'fail'];
                if (failSlots === 0) slots = ['success', 'success', 'success', 'success', 'success', 'success', 'success',
                    'success'
                ];
                wheel.innerHTML = '';
                slots.forEach((type, idx) => {
                    const div = document.createElement('div');
                    div.className = `trib-item ${type}`;
                    div.dataset.index = idx;
                    div.dataset.type = type;
                    div.textContent = type === 'success' ? '✅ 成功' : '❌ 失败';
                    wheel.appendChild(div);
                });
                resultEl.textContent = '?';
                resultEl.className = 'trib-result';
                btn.disabled = false;
                overlay.classList.add('show');
            });
        }

        document.getElementById('tribBtn').addEventListener('click', function() {
            const btn = this;
            if (btn.disabled) return;
            btn.disabled = true;
            const wheel = document.getElementById('tribWheel');
            const items = wheel.querySelectorAll('.trib-item');
            const resultEl = document.getElementById('tribResult');
            const targetType = tribSuccess ? 'success' : 'fail';
            let count = 0;
            const maxCount = 20 + Math.floor(Math.random() * 10);
            const interval = 80;
            const timer = setInterval(() => {
                items.forEach(el => el.classList.remove('active'));
                const showIdx = Math.floor(Math.random() * items.length);
                items[showIdx].classList.add('active');
                count++;
                if (count >= maxCount) {
                    clearInterval(timer);
                    items.forEach(el => el.classList.remove('active'));
                    let targetEl = null;
                    for (let el of items) {
                        if (el.dataset.type === targetType) {
                            targetEl = el;
                            break;
                        }
                    }
                    if (targetEl) targetEl.classList.add('active');
                    else items[0].classList.add('active');
                    const label = tribSuccess ? '✅ 渡劫成功！' : '❌ 渡劫失败…';
                    resultEl.textContent = label;
                    resultEl.className = 'trib-result ' + (tribSuccess ? 'success' : 'fail');
                    setTimeout(() => {
                        document.getElementById('tribOverlay').classList.remove('show');
                        if (tribResolve) {
                            tribResolve(tribSuccess);
                            tribResolve = null;
                        }
                        btn.disabled = false;
                    }, 1200);
                }
            }, interval);
        });

        // ================================================================
        //  渡劫逻辑
        // ================================================================
        async function attemptTribulation() {
            if (G.realmIndex >= 7) return;
            if (G.cult < CONFIG.realmCult[G.realmIndex + 1]) {
                setSubtitle('修为不足，无法渡劫', 'bad');
                return;
            }
            if (G.realmIndex < 2) {
                G.realmIndex++;
                G._consecutiveTrib = (G._consecutiveTrib || 0) + 1;
                G._flagTribPass = true;
                G.status = '健康';
                G._avatarBreakthrough = true;
                setSubtitle(`🎉 突破成功！当前境界：${CONFIG.realms[G.realmIndex]}`, 'good');
                addLog(`🎉 突破成功！晋升至 ${CONFIG.realms[G.realmIndex]}`);
                updatePanel();
                checkAchievements();
                checkRealmDrop();
                if (G.realmIndex < 7 && G.cult >= CONFIG.realmCult[G.realmIndex + 1]) {
                    await attemptTribulation();
                }
                return;
            }
            if (G.realmIndex === 5 && !Object.values(G.laws).some(v => v >= 1)) {
                setSubtitle('法则雏形缺失，瓶颈凝滞！', 'bad');
                addLog('法则不全，无法渡劫');
                return;
            }
            let power = calcPower();
            let baseProb = Math.min(99, 50 + (power - 100) / 20);
            if (G.items['渡劫丹'] > 0) {
                G.items['渡劫丹']--;
                baseProb = Math.max(baseProb, 90);
                addLog('消耗渡劫丹');
            }
            baseProb = Math.min(99, Math.max(0, baseProb));
            const success = Math.random() * 100 < baseProb;
            await showTribWheel(baseProb, success);
            if (success) {
                G.realmIndex++;
                G._consecutiveTrib = (G._consecutiveTrib || 0) + 1;
                G._flagTribPass = true;
                G.status = '健康';
                G._avatarBreakthrough = true;
                if (Math.random() * 100 < 40) {
                    let keys = Object.keys(G.laws);
                    let l = pick(keys);
                    G.laws[l] = (G.laws[l] || 0) + 1;
                    addLog(`⚡ 天降机缘！领悟 ${l} 法则！`);
                    setSubtitle(`领悟 ${l} 法则！（${G.laws[l]}/3）`, 'special');
                } else {
                    let consolation = Math.floor(G.cult * 0.05);
                    G.cult += consolation;
                    addLog(`未能领悟法则，但获得 ${consolation} 修为补偿`);
                    setSubtitle('未能领悟法则，略有遗憾', 'bad');
                }
                setSubtitle(`渡劫成功！突破至 ${CONFIG.realms[G.realmIndex]}`, 'good');
                if (G.realmIndex === 7 && Object.values(G.laws).some(v => v >= 3)) {
                    setSubtitle('🎉 飞升成仙！', 'special');
                    addLog('🎉 飞升成仙！通关！');
                    document.getElementById('endTitle').textContent = '🎉 飞升成仙！';
                    document.getElementById('endDesc').textContent = '波照历经万劫，终证大道，逍遥长生！';
                    document.getElementById('endSummary').textContent =
                        `寿元 ${G.age} 岁 · 境界 大乘 · 战力 ${Math.floor(calcPower())} · 贡献 ${G._sectContribution||0}`;
                    document.getElementById('endLogReview').innerHTML = G.logs.map(s => `<p>${s}</p>`).join('');
                    document.getElementById('endOverlay').classList.add('show');
                    document.getElementById('spinBtn').disabled = true;
                    return;
                }
                updatePanel();
                checkAchievements();
                checkRealmDrop();
            } else {
                if (Math.random() < 0.70) {
                    G.cult *= 0.6;
                    G.age += 15;
                    G.status = '重伤';
                    setSubtitle('渡劫失败，重伤！', 'bad');
                    addLog('渡劫失败，重伤');
                    checkRealmDrop();
                } else {
                    triggerDeath('渡劫失败，魂飞魄散');
                    return;
                }
                G._consecutiveTrib = 0;
                updatePanel();
            }
        }

        // ================================================================
        //  事件处理（包含抽象事件 + 修复隐世高手）
        // ================================================================
        function handleEvent(eventName) {
            const power = calcPower();
            let story, gain, opp;

            const abstract = CONFIG.abstractEvents.find(e => e.id === eventName || e.event === eventName);
            if (abstract) {
                switch (abstract.type) {
                    case 'cult': {
                        gain = applyCultGain(abstract.value || 50);
                        G.cult += gain;
                        story = abstract.story ? abstract.story(G) : `波照 ${abstract.desc}，修为+${gain}`;
                        setSubtitle(`修为 +${gain}`, 'good');
                        addLog(story);
                        break;
                    }
                    case 'ability': {
                        const abName = abstract.name;
                        if (!G.abilities.includes(abName)) {
                            G.abilities.push(abName);
                            story = abstract.story ? abstract.story(G) : `波照获得能力：${abName}`;
                            setSubtitle(`获得能力：${abName}`, 'good');
                            addLog(story);
                        } else {
                            story = `波照再次遇到${abstract.label}，但已掌握${abName}，获得少许感悟，修为+20`;
                            gain = applyCultGain(20);
                            G.cult += gain;
                            setSubtitle(`重复能力，修为+20`, 'good');
                            addLog(story);
                        }
                        break;
                    }
                    case 'law': {
                        const lawName = abstract.value;
                        G.laws[lawName] = (G.laws[lawName] || 0) + 1;
                        story = abstract.story ? abstract.story(G) : `波照感悟${lawName}法则，法则+1`;
                        setSubtitle(`${lawName}法则+1（${G.laws[lawName]}/3）`, 'special');
                        addLog(story);
                        break;
                    }
                    case 'item': {
                        const itemName = abstract.item;
                        G.items[itemName] = (G.items[itemName] || 0) + 1;
                        story = abstract.story ? abstract.story(G) : `波照获得${itemName}×1`;
                        setSubtitle(`获得${itemName}`, 'good');
                        addLog(story);
                        break;
                    }
                    case 'event': {
                        if (abstract.id === '灵蝶奇遇') {
                            gain = applyCultGain(80);
                            G.cult += gain;
                            story = abstract.story(G);
                            setSubtitle(`灵蝶引路，修为+${gain}`, 'good');
                            addLog(story);
                        } else if (abstract.id === '血月心魔') {
                            if (G.abilities.includes('不死之身') || G.abilities.includes('金刚不坏')) {
                                gain = applyCultGain(40);
                                G.cult += gain;
                                story = `血月之夜，心魔来袭，但波照凭不死之身硬抗，反获修为+${gain}`;
                                setSubtitle('心魔不侵，反获修为', 'good');
                                addLog(story);
                            } else {
                                G.cult *= 0.9;
                                G.status = '轻伤';
                                story = abstract.story(G);
                                setSubtitle('心魔侵蚀，修为受损', 'bad');
                                addLog(story);
                            }
                        } else if (abstract.id === '古墓探险') {
                            gain = applyCultGain(50);
                            G.cult += gain;
                            G.status = '轻伤';
                            story = abstract.story(G);
                            setSubtitle('古墓脱险，修为+50', 'bad');
                            addLog(story);
                        } else if (abstract.id === '断崖惊魂') {
                            G.status = '轻伤';
                            story = abstract.story(G);
                            setSubtitle('断崖惊魂，轻伤', 'bad');
                            addLog(story);
                        } else {
                            gain = applyCultGain(30);
                            G.cult += gain;
                            story = abstract.story ? abstract.story(G) : `波照经历奇遇，修为+${gain}`;
                            setSubtitle(`修为+${gain}`, 'good');
                            addLog(story);
                        }
                        break;
                    }
                }
                checkAchievements();
                checkRealmDrop();
                updatePanel();
                return;
            }

            // ---- 战斗事件（含修复后的隐世高手） ----
            switch (eventName) {
                case '波刚': {
                    let gangPower = G.cult < 300 ? 280 : (G.cult < 2000 ? 680 : 1600);
                    if (power < gangPower) {

        const canvas = document.getElementById('wheelCanvas');

        function getSegments() {
            let segs = [];
            let isModao = (G._sectSpecial === 'modao');
            let isCaibup = (G._sectSpecial === 'caibup');

            let pool = [];
            let abstracts = CONFIG.abstractEvents.slice();
            for (let i = abstracts.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [abstracts[i], abstracts[j]] = [abstracts[j], abstracts[i]];
            }
            let chosenAbstracts = abstracts.slice(0, 10);
            chosenAbstracts.forEach(ab => {
                pool.push({ label: ab.label, type: 'abstract', event: ab.id, color: '#8a7a6a' });
            });

            const normalEvents = [
                { label: '波刚', type: 'event', event: '波刚', color: '#8a4a3a' },
                { label: '抢劫', type: 'event', event: '被抢劫', color: '#5a4a4a' },
                { label: '路见不平', type: 'event', event: '路见不平', color: '#4a6a5a' },
                { label: '挑衅', type: 'event', event: '被挑衅', color: '#6a4a5a' },
                { label: '隐世高手', type: 'event', event: '隐世高手', color: '#3a3a5a' }
            ];
            const cultItems = [
                { label: '+30修', type: 'cult', value: 30, color: '#b89a6a' },
                { label: '+80修', type: 'cult', value: 80, color: '#c8aa7a' },
                { label: '+150修', type: 'cult', value: 150, color: '#d4b08a' }
            ];
            const allAb = CONFIG.allAbilities.slice();
            let chosenAb = [];
            for (let i = 0; i < 3 && allAb.length > 0; i++) {
                let idx = Math.floor(Math.random() * allAb.length);
                chosenAb.push(allAb.splice(idx, 1)[0]);
            }
            chosenAb.forEach(ab => {
                pool.push({ label: ab, type: 'ability', name: ab, color: '#6a9a7a' });
            });

            pool.push(...normalEvents);
            pool.push(...cultItems);

            if (isModao) {
                pool.push({ label: '魔袭', type: 'event', event: '魔道偷袭', color: '#5a3a5a' });
                pool.push({ label: '反噬', type: 'event', event: '反噬', color: '#6a3a3a' });
            }
            if (isCaibup) {
                pool.push({ label: '采补', type: 'event', event: '采补', color: '#8a4a5a' });
                pool.push({ label: '采补', type: 'event', event: '采补', color: '#8a4a5a' });
            }

            for (let i = pool.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [pool[i], pool[j]] = [pool[j], pool[i]];
            }
            if (pool.length > 18) pool = pool.slice(0, 18);
            else if (pool.length < 14) {
                while (pool.length < 14) {
                    pool.push({ label: '+30修', type: 'cult', value: 30, color: '#b89a6a' });
                }
            }
            segs = pool.map(item => ({
                label: item.label,
                type: item.type || 'event',
                value: item.value || 0,
                name: item.name || '',
                event: item.event || '',
                color: item.color || '#6a5a4a'
            }));
            return segs;
        }

        function drawWheel(angle) {
            const segs = getSegments();
            currentSegments = segs;
            const n = segs.length,
                arc = 2 * PI / n;
            const w = canvas.width,
                h = canvas.height,
                r = Math.min(w, h) * 0.42,
                cx = w / 2,
                cy = h / 2;
            ctx.clearRect(0, 0, w, h);
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(angle);
            for (let i = 0; i < n; i++) {
                const start = i * arc,
                    end = start + arc;
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.arc(0, 0, r, start, end);
                ctx.closePath();
                ctx.fillStyle = segs[i].color;
                ctx.fill();
                ctx.strokeStyle = '#2a221a';
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.save();
                ctx.rotate(start + arc / 2);
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = '#1a1410';
                ctx.font = 'bold 11px serif';
                ctx.shadowColor = 'rgba(0,0,0,0.3)';
                ctx.shadowBlur = 4;
                ctx.fillText(segs[i].label, r * 0.68, 0);
                ctx.restore();
            }
            ctx.restore();
            ctx.save();
            ctx.translate(cx, cy);
            ctx.beginPath();
            ctx.moveTo(0, -r - 10);
            ctx.lineTo(-12, -r - 30);
            ctx.lineTo(12, -r - 30);
            ctx.closePath();
            ctx.fillStyle = '#d4b080';
            ctx.shadowColor = '#000';
            ctx.shadowBlur = 12;
            ctx.fill();
            ctx.restore();
            ctx.beginPath();
            ctx.arc(cx, cy, 14, 0, 2 * PI);
            ctx.fillStyle = '#2a221a';
            ctx.fill();
            ctx.strokeStyle = '#b89a6a';
            ctx.lineWidth = 3;
            ctx.stroke();
        }

        // ================================================================
        //  spinWheel 和 handleSpinResult
        // ================================================================
        function spinWheel() {
            if (isSpinning) return;
            if (G._dead) return;
            isSpinning = true;
            document.getElementById('spinBtn').disabled = true;

            const segs = getSegments();
            const n = segs.length;
            const targetIndex = Math.floor(Math.random() * n);
            const arc = 2 * PI / n;
            const targetAngle = -PI / 2 - targetIndex * arc - arc / 2;
            const spins = 5 + Math.floor(Math.random() * 4);
            const totalAngle = targetAngle + spins * 2 * PI;
            const startAngle = spinAngle;
            const duration = 2500 + Math.random() * 1000;
            const startTime = performance.now();

            function animate(time) {
                const elapsed = time - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const ease = 1 - Math.pow(1 - progress, 3);
                const current = startAngle + (totalAngle - startAngle) * ease;
                spinAngle = current;
                drawWheel(current);
                if (progress < 1) { requestAnimationFrame(animate); } else {
                    spinAngle = current;
                    drawWheel(current);
                    const result = segs[targetIndex];
                    isSpinning = false;
                    document.getElementById('spinBtn').disabled = false;
                    handleSpinResult(result);
                }
            }
            requestAnimationFrame(animate);
        }

        function handleSpinResult(seg) {
            if (G._dead) return;
            let ageAdded = true;
            if (seg.type === 'abstract') {
                const ab = CONFIG.abstractEvents.find(e => e.id === seg.event);
                if (ab) {
                    handleEvent(seg.event);
                    ageAdded = false;
                } else {
                    let gain = applyCultGain(30);
                    G.cult += gain;
                    setSubtitle(`奇遇，修为+${gain}`, 'good');
                    addLog(`奇遇，修为+${gain}`);
                }
            } else if (seg.type === 'ability') {
                if (!G.abilities.includes(seg.name)) {
                    G.abilities.push(seg.name);
                    setSubtitle(`获得能力：${seg.name}`, 'good');
                    addLog(`获得能力：${seg.name}`);
                    checkAchievements();
                } else {
                    ageAdded = false;
                    setSubtitle(`已拥有${seg.name}，再抽一次！`, 'special');
                    addLog(`重复能力${seg.name}，重转`);
                    setTimeout(() => spinWheel(), 800);
                    return;
                }
            } else if (seg.type === 'cult') {
                let gain = applyCultGain(seg.value);
                G.cult += gain;
                setSubtitle(`修为 +${gain}`, 'good');
                addLog(`修为增加 ${gain}`);
            } else if (seg.type === 'event') {
                handleEvent(seg.event);
                ageAdded = false;
            } else {
                let gain = applyCultGain(20);
                G.cult += gain;
                setSubtitle(`机缘，修为+${gain}`, 'good');
                addLog(`机缘，修为+${gain}`);
            }

            if (ageAdded) {
                let ageCost;
                if (G.realmIndex === 0) ageCost = 1;
                else if (G.realmIndex <= 2) ageCost = 5;
                else ageCost = 5 * Math.pow(2, G.realmIndex - 2);
                G.age += ageCost;
            }

            if (G.status && G.status.includes('中毒')) G._poisonAge = (G._poisonAge || 0) + 1;
            let maxLife = CONFIG.realmLifespan[G.realmIndex] + (G._bonusLife || 0);
            if (G.age > maxLife) { triggerDeath('寿元耗尽'); return; }
            recoverStatus();
            checkAchievements();
            checkRealmDrop();
            updatePanel();
            if (G.realmIndex < 7 && G.cult >= CONFIG.realmCult[G.realmIndex + 1]) {
                attemptTribulation();
            }
        }

                    G.items = { '渡劫丹': 0, '疗伤药': 0, '解毒丹': 0 };
                    birth.items.forEach(item => {
                        if (item === '疗伤药') G.items['疗伤药'] = (G.items['疗伤药'] || 0) + 1;
                        else if (item === '渡劫丹') G.items['渡劫丹'] = (G.items['渡劫丹'] || 0) + 1;
                        else if (CONFIG.allAbilities.includes(item)) {
                            if (!G.abilities.includes(item)) G.abilities.push(item);
                        }
                    });
                    if (birth.name === '紫府圣地') {
                        let keys = Object.keys(G.laws);
                        G.laws[pick(keys)] = 1;
                    }
                    G._bonusLife = birth.bonusLife || 0;
                    G._flagNearDeath = false;
                    G._flagTribPass = false;
                    G._flagCaibup = false;
                    G._flagRealmUpAfterCaibup = false;
                    G._consecutiveTrib = 0;
                    G._winVillage = false;
                    G._winArena = false;
                    G._winTourney = false;
                    G._poisonAge = 0;
                    G._gangKill = 0;
                    G._sectContribution = 0;
                    G._sectHero = false;
                    G._dead = false;
                    G._deathCause = '';
                    G._powerBuff = 0;
                    G.logs = [];
                    G.achievements = {};
                    CONFIG.achievements.forEach(a => G.achievements[a.id] = false);

                    let finalDisplay = getSpiritDisplay();
                    resultEl.textContent = `✨ ${finalDisplay} ✨`;
                    if (q.name === '极品') resultEl.style.color = '#ffd700';
                    else resultEl.style.color = '#f5d080';

                    let spiritStory = '';
                    if (q.name === '极品') spiritStory = '天资卓越，修行之路一片坦途。';
                    else if (q.name === '上品') spiritStory = '资质上佳，勤修苦练可成大器。';
                    else if (q.name === '中品') spiritStory = '资质平平，唯有以勤补拙。';
                    else spiritStory = '资质愚钝，但心怀坚韧，亦能逆天而行。';
                    addLog(`🌱 波照的灵根为：${finalDisplay}，${spiritStory}`);

                    setTimeout(() => {
                        document.getElementById('spiritOverlay').classList.remove('show');
                        initSectOverlay();
                        document.getElementById('sectOverlay').classList.add('show');
                        pendingBirth2 = null;
                    }, 1500);
                }
            }, interval);
        });

        document.getElementById('restartBtn').addEventListener('click', function() {
            document.getElementById('endOverlay').classList.remove('show');
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('startOverlay').classList.add('show');
            document.getElementById('birthOverlay').classList.remove('show');
            document.getElementById('spiritOverlay').classList.remove('show');
            document.getElementById('sectOverlay').classList.remove('show');
            document.getElementById('spinBtn').disabled = false;
            if (birthTimer2) { clearInterval(birthTimer2);
                birthTimer2 = null; }
            if (sectTimer) { clearInterval(sectTimer);
                sectTimer = null; }
            if (tribResolve) { tribResolve = null; }
            initState();
        });

        // ================================================================
        //  按钮绑定
        // ================================================================
        document.getElementById('spinBtn').addEventListener('click', function() {
            spinWheel();
        });

        // ================================================================
        //  初始化
        // ================================================================
        initState();
        document.getElementById('mainMenu').style.display = 'none';
        document.getElementById('startOverlay').classList.add('show');
        console.log('🧘 修仙转盘 · 波途 — 金丹前 obstacle-sprite.png，金丹后 zhujue.jpg');
    </script>

</body>
</html>
