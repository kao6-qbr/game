<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>修仙转盘 · 波途</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; user-select:none; }
body { background:#1a1410; color:#d4c9b0; font-family:'Georgia','宋体',serif; min-height:100vh; display:flex; justify-content:center; align-items:center; padding:20px; background-image:radial-gradient(ellipse at 20% 50%, #2a2018 0%, #0d0a08 100%); }
.game-wrapper { max-width:1400px; width:100%; background:rgba(30,24,20,0.88); border:2px solid #6a5a4a; border-radius:28px; padding:25px 22px; box-shadow:0 20px 60px rgba(0,0,0,0.8), inset 0 0 80px rgba(80,60,40,0.15); backdrop-filter:blur(4px); }
.game-title { text-align:center; font-size:2rem; font-weight:bold; letter-spacing:8px; color:#e6d5b8; text-shadow:0 0 20px #b89a6a,0 2px 4px #000; margin-bottom:16px; border-bottom:1px solid #4a3f34; padding-bottom:10px; }
.game-title small { font-size:0.9rem; letter-spacing:2px; color:#a08060; display:block; margin-top:2px; }
.main-area { display:flex; flex-wrap:wrap; gap:20px; }
.left-panel { flex:2.2; min-width:380px; }
.right-panel { flex:1.2; min-width:260px; background:rgba(20,16,12,0.65); border-radius:18px; padding:16px 14px; border:1px solid #3d3228; max-height:700px; overflow-y:auto; }
.right-panel::-webkit-scrollbar { width:4px; }
.right-panel::-webkit-scrollbar-thumb { background:#6a5a4a; border-radius:8px; }
.wheel-container { position:relative; display:flex; flex-direction:column; align-items:center; }
canvas#wheelCanvas { width:100%; max-width:440px; height:auto; aspect-ratio:1/1; background:#2a221a; border-radius:50%; border:6px solid #6a5a4a; box-shadow:0 0 40px rgba(180,140,100,0.25), inset 0 0 30px #00000066; cursor:pointer; }
.btn-spin { margin-top:14px; padding:10px 36px; font-size:1.3rem; font-weight:bold; background:#3d3228; border:2px solid #b89a6a; color:#e6d5b8; border-radius:50px; cursor:pointer; transition:0.2s; letter-spacing:4px; text-shadow:0 0 8px #b89a6a44; }
.btn-spin:hover { background:#5a4a3a; border-color:#d4b080; box-shadow:0 0 30px #b89a6a33; }
.btn-spin:disabled { opacity:0.4; cursor:not-allowed; box-shadow:none; }
.subtitle { min-height:56px; margin:10px 0 6px; font-size:1.1rem; text-align:center; color:#f0e0c8; background:rgba(0,0,0,0.55); padding:10px 16px; border-radius:12px; border-left:4px solid #b89a6a; transition:all 0.3s; width:100%; max-width:440px; line-height:1.5; }
.subtitle.good { border-left-color:#6fc; color:#bfe; }
.subtitle.bad { border-left-color:#c66; color:#fcc; }
.subtitle.special { border-left-color:#fa0; color:#fea; background:rgba(40,30,10,0.7); }
.log-area { margin-top:10px; max-height:140px; overflow-y:auto; background:#0d0a08cc; border-radius:12px; padding:6px 12px; font-size:0.8rem; border:1px solid #3d3228; width:100%; max-width:440px; line-height:1.6; }
.log-area p { margin:2px 0; padding:2px 0; border-bottom:1px dashed #1f1814; color:#c4b8a8; }
.log-area p .highlight { color:#f5d080; }
.log-area p .badge { color:#d66; }
.log-area p .good { color:#8cc; }
.log-area::-webkit-scrollbar { width:3px; }
.log-area::-webkit-scrollbar-thumb { background:#5a4a3a; }
.panel-item { display:flex; justify-content:space-between; padding:4px 0; border-bottom:1px solid #221c16; font-size:0.9rem; flex-wrap:wrap; gap:4px; }
.panel-item .label { color:#a09080; }
.panel-item .value { color:#ecd8c0; font-weight:bold; }
.panel-item .value.gold { color:#f5d080; }
.panel-item .value.green { color:#8cc; }
.panel-item .value.red { color:#d66; }
.progress-bar { width:100%; height:7px; background:#1a1410; border-radius:8px; overflow:hidden; margin:3px 0 6px; border:1px solid #3d3228; }
.progress-bar .fill { height:100%; background:linear-gradient(90deg,#b89a6a,#e6c08a); border-radius:8px; transition:width 0.4s; }
.progress-bar .fill.life { background:linear-gradient(90deg,#6a8a6a,#8aba8a); }
.progress-bar .fill.cult { background:linear-gradient(90deg,#8a6a9a,#b08ac0); }
.ability-tag, .law-tag, .achieve-tag { display:inline-block; background:#2a221a; padding:1px 10px; border-radius:12px; margin:2px 3px 2px 0; font-size:0.75rem; border:1px solid #4a3f34; }
.ability-tag.gold { border-color:#b89a6a; color:#f5d080; }
.law-tag { border-color:#6a8aba; color:#8ac0e0; }
.law-tag.complete { border-color:#f5d080; background:#3d3228; color:#f5d080; box-shadow:0 0 12px #f5d08044; }
.achieve-tag.locked { opacity:0.35; filter:grayscale(0.7); }
.achieve-tag.unlocked { border-color:#f5d080; color:#f5d080; background:#3d3228; }
.world-buff { display:inline-block; background:#2a1a0a; border:1px solid #6a5a3a; border-radius:20px; padding:1px 12px; margin:2px 3px; font-size:0.7rem; color:#d4b080; }
.overlay { position:fixed; inset:0; background:rgba(0,0,0,0.88); display:none; justify-content:center; align-items:center; z-index:999; backdrop-filter:blur(10px); flex-direction:column; }
.overlay.show { display:flex; }
.overlay-box { background:#1a1410; border:2px solid #6a5a4a; border-radius:28px; padding:35px 45px; max-width:620px; text-align:center; box-shadow:0 0 80px rgba(0,0,0,0.95); }
.overlay-box h1 { font-size:2.4rem; color:#f5d080; margin-bottom:8px; }
.overlay-box p { font-size:1.05rem; color:#d4c9b0; margin:8px 0; line-height:1.6; }
.overlay-box .btn-restart { margin-top:22px; padding:10px 36px; font-size:1.1rem; background:#3d3228; border:2px solid #b89a6a; color:#e6d5b8; border-radius:50px; cursor:pointer; transition:0.2s; letter-spacing:2px; }
.overlay-box .btn-restart:hover { background:#5a4a3a; }
.overlay-box .spirit-result { font-size:2rem; color:#f5d080; margin:15px 0; padding:10px; background:rgba(0,0,0,0.5); border-radius:12px; border:1px solid #6a5a4a; }
.birth-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin:20px 0; }
.birth-item { padding:12px 8px; background:rgba(30,24,20,0.6); border:2px solid #3d3228; border-radius:12px; font-size:0.9rem; color:#a09080; transition:all 0.15s; text-align:center; }
.birth-item.active { border-color:#f5d080; background:rgba(245,208,128,0.15); color:#f5d080; box-shadow:0 0 20px rgba(245,208,128,0.3); transform:scale(1.05); }
.birth-item .prob { display:block; font-size:0.7rem; color:#6a5a4a; margin-top:4px; }
.birth-result { font-size:1.8rem; color:#f5d080; padding:12px; min-height:60px; background:rgba(0,0,0,0.4); border-radius:12px; border:1px solid #6a5a4a; margin:10px 0; }
.avatar-container { display:flex; align-items:center; gap:12px; margin-bottom:10px; padding:8px 12px; background:rgba(0,0,0,0.3); border-radius:16px; border:1px solid #3d3228; }
.avatar { width:60px; height:60px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:26px; font-weight:bold; color:#1a1410; text-shadow:0 0 8px rgba(255,255,255,0.3); flex-shrink:0; transition:all 0.6s ease; box-shadow:0 0 20px rgba(0,0,0,0.6); border:2px solid #6a5a4a; background-size:cover; background-position:center; background-repeat:no-repeat; }
.avatar.realm-0 { background-color:#6a7a7a; }
.avatar.realm-1 { background-color:#7a9a8a; }
.avatar.realm-2 { background-color:#4a8aaa; }
.avatar.realm-3 { background-color:#9a6aba; }
.avatar.realm-4 { background-color:#d4a04a; }
.avatar.realm-5 { background-color:#d47a4a; }
.avatar.realm-6 { background-color:#c04a5a; }
.avatar.realm-7 { background-color:#f5d080; box-shadow:0 0 40px #f5d08088; }
.avatar .realm-char { font-size:28px; color:#1a1410; font-weight:bold; text-shadow:0 1px 4px rgba(255,255,255,0.2); }
.avatar.pulse { animation:pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%{transform:scale(1);box-shadow:0 0 20px rgba(255,215,0,0.2);} 50%{transform:scale(1.08);box-shadow:0 0 40px rgba(255,215,0,0.6);} 100%{transform:scale(1);box-shadow:0 0 20px rgba(255,215,0,0.2);} }
.avatar.breakthrough { animation:breakthrough 0.8s ease; }
@keyframes breakthrough { 0%{transform:scale(0.5) rotate(-20deg);opacity:0;} 50%{transform:scale(1.4) rotate(10deg);opacity:1;} 100%{transform:scale(1) rotate(0deg);opacity:1;} }
@media (max-width:800px){ .game-wrapper{padding:12px;} .right-panel{max-height:380px;} .overlay-box{padding:25px 20px; margin:0 16px;} .birth-grid{grid-template-columns:repeat(2,1fr);} }
</style>
</head>
<body>

<div class="game-wrapper" id="mainMenu" style="display:none;">
    <div class="game-title">修仙转盘 · 波途 <small>天命由运 · 万法归一</small></div>
    <div class="main-area">
        <div class="left-panel">
            <div class="wheel-container">
                <canvas id="wheelCanvas" width="500" height="500"></canvas>
                <button class="btn-spin" id="spinBtn">开始修仙</button>
                <div class="subtitle" id="subtitle">点击转盘，抽取命运之轮</div>
                <div class="log-area" id="logArea"></div>
            </div>
        </div>
        <div class="right-panel" id="panelContent"></div>
    </div>
</div>

<div class="overlay show" id="startOverlay">
    <div class="overlay-box">
        <h1 style="font-size:2.8rem;">修仙转盘</h1>
        <p style="font-size:1.2rem; color:#b89a6a;">波照 · 天命伊始</p>
        <button class="btn-restart" id="startBtn">开始波途</button>
    </div>
</div>

<div class="overlay" id="birthOverlay">
    <div class="overlay-box">
        <h1>出生地 · 天命之选</h1>
        <p style="color:#b89a6a;">波照将生于何方？</p>
        <div class="birth-grid" id="birthGrid"></div>
        <div class="birth-result" id="birthResult">点击「抽取」决定命运</div>
        <button class="btn-restart" id="drawBirthBtn">抽取出生地</button>
    </div>
</div>

<div class="overlay" id="spiritOverlay">
    <div class="overlay-box">
        <h1>灵根测试</h1>
        <p style="color:#b89a6a;">波照正在感应天地灵气...</p>
        <div class="spirit-result" id="spiritResult">???</div>
        <button class="btn-restart" id="testSpiritBtn">测试灵根</button>
    </div>
</div>

<div class="overlay" id="endOverlay">
    <div class="overlay-box">
        <h1 id="endTitle">道陨</h1>
        <p id="endDesc"></p>
        <p id="endSummary" style="font-size:0.9rem; color:#a09080; margin-top:12px;"></p>
        <button class="btn-restart" id="restartBtn">轮回重修</button>
    </div>
</div>

<script>
// ================================================================
//  CONFIG
// ================================================================
const CONFIG = {
    realms: ['炼气','筑基','金丹','元婴','化神','合体','渡劫','大乘'],
    realmCult: [0,100,300,800,2000,5000,12000,25000],
    realmLifespan: [100,150,250,400,600,900,1300,Infinity],
    realmCoeff: [1,2,3,4,5,6,7,8],
    spiritQuality: [
        {name:'下品',prob:0.40,speed:0.05,power:0.03},
        {name:'中品',prob:0.35,speed:0.20,power:0.12},
        {name:'上品',prob:0.20,speed:0.50,power:0.25},
        {name:'极品',prob:0.05,speed:1.00,power:0.45}
    ],
    spiritCount: [
        {count:1,prob:0.30,bonus:0.00},
        {count:2,prob:0.35,bonus:0.05},
        {count:3,prob:0.25,bonus:0.08},
        {count:4,prob:0.08,bonus:0.12},
        {count:5,prob:0.02,bonus:0.15}
    ],
    elements: ['金','木','水','火','土'],
    elementAbility: {'金':'飞剑','木':'御风术','水':'不死之身','火':'炼丹术','土':'法天象地'},
    birthlands: [
        {name:'荒芜村落',prob:0.30,cult:0,power:80,items:[],bonusCult:0,bonusLife:0,extraPower:0,desc:'灵气枯竭之地'},
        {name:'边境小镇',prob:0.25,cult:10,power:90,items:[],bonusCult:0,bonusLife:10,extraPower:0,desc:'边陲之地'},
        {name:'灵溪村',prob:0.20,cult:30,power:110,items:['疗伤药'],bonusCult:0.05,bonusLife:0,extraPower:0,desc:'灵溪之畔'},
        {name:'青云镇',prob:0.13,cult:60,power:140,items:['御风术'],bonusCult:0,bonusLife:0,extraPower:10,desc:'仙气萦绕'},
        {name:'仙踪城',prob:0.08,cult:100,power:180,items:['炼丹术','疗伤药','疗伤药'],bonusCult:0,bonusLife:20,extraPower:20,desc:'上古遗城'},
        {name:'紫府圣地',prob:0.04,cult:150,power:220,items:['渡劫丹','疗伤药','疗伤药'],bonusCult:0.15,bonusLife:30,extraPower:20,desc:'万古圣地'}
    ],
    worldEvents: [
        {name:'灵气潮汐',desc:'修获+20%',buff:{cultGain:0.20},duration:5},
        {name:'乱世将至',desc:'对手×1.2',buff:{opponentMult:1.2},duration:5},
        {name:'仙门开启',desc:'突破额外法则',buff:{extraLaw:1},duration:5},
        {name:'魔劫降临',desc:'每回合扣2%修',buff:{drainCult:0.02},duration:5},
        {name:'天道赐福',desc:'渡劫概率+15%',buff:{tribBuff:0.15},duration:5},
        {name:'业火焚心',desc:'30%状态降级',buff:{degrade:0.30},duration:5},
        {name:'灵脉复苏',desc:'修获+30%年龄+1',buff:{cultGain:0.30,extraAge:1},duration:5}
    ],
    deathEndings: [
        '「天雷诛邪」：九霄神雷劈碎元神，形神俱灭。',
        '「心魔噬魂」：执念太深，自斩道基，疯癫而亡。',
        '「寿终正寝」：大限已至，坐化洞府。',
        '「道争陨落」：仇家趁虚而入，一剑穿心。',
        '「大道反噬」：强行感悟法则，爆体为血雾。',
        '「虚空放逐」：被吸入虚无裂缝，永坠时空乱流。',
        '「因果业火」：业火焚身，灼烧四十九日而灭。',
        '「天人五衰」：肉身腐朽，神魂消散。',
        '「万蛊噬心」：剧毒攻心，五脏被蛊虫啃噬殆尽。',
        '「道侣背叛」：渡劫时被至亲从背后刺穿丹田。',
        '「采补反噬」：元阳尽失，精气枯竭而亡。'
    ],
    achievements: [
        {id:'fate_reversal',name:'逆天改命',check:g=>g.birthland==='紫府圣地'&&g.spiritQ.name==='极品'},
        {id:'chosen_one',name:'天选之人',check:g=>g.spiritQ.name==='极品'&&Object.values(g.laws).some(v=>v>=3)},
        {id:'nine_lives',name:'九死一生',check:g=>g._flagNearDeath&&g._flagTribPass},
        {id:'hundred_year_yuan',name:'百岁元婴',check:g=>g.realmIndex>=3&&g.age<100},
        {id:'revenge',name:'采补复仇者',check:g=>g._flagCaibup&&g._flagRealmUpAfterCaibup},
        {id:'law_master',name:'法则之主',check:g=>Object.values(g.laws).some(v=>v>=3)},
        {id:'natural_death',name:'寿终正寝',check:g=>g._deathCause==='lifespan'},
        {id:'thunder_master',name:'渡劫宗师',check:g=>g._consecutiveTrib>=3},
        {id:'arena_champion',name:'擂台霸主',check:g=>g._winVillage&&g._winArena&&g._winTourney},
        {id:'immortal_legend',name:'不死传说',check:g=>g.abilities.includes('不死之身')&&g._flagTribPass},
        {id:'poison_proof',name:'万毒不侵',check:g=>g._poisonAge>=20},
        {id:'heaven_blessed',name:'天道眷顾',check:g=>g._flagBreakInBuff},
        {id:'chaos_body',name:'混沌之体',check:g=>g.spiritCount===5},
        {id:'five_elements',name:'五行俱全',check:g=>['飞剑','御风术','不死之身','炼丹术','法天象地'].every(a=>g.abilities.includes(a))},
        {id:'prodigy',name:'天才修士',check:g=>g.spiritQ.name==='极品'&&g.spiritCount>=2},
        {id:'attribute_master',name:'属性大师',check:g=>{let m=0;for(let el of g.spiritElements)if(g.abilities.includes(CONFIG.elementAbility[el]))m++;return m>=3;}},
        {id:'gang_slayer',name:'屠刚勇士',check:g=>g._gangKill>=1},
        {id:'sect_elite',name:'宗门精英',check:g=>g._sectContribution>=5},
        {id:'sect_hero',name:'宗门英雄',check:g=>g._sectHero===true}
    ]
};

// ================================================================
//  游戏状态
// ================================================================
let G = {};
function initState() {
    G = {
        birthland:'', birthlandData:null,
        spiritQ:{name:'下品',speed:0.05,power:0.03},
        spiritCount:1, spiritElements:[],
        realmIndex:0, age:18, cult:0, basePower:80,
        abilities:[], items:{'渡劫丹':0,'疗伤药':0,'解毒丹':0},
        laws:{'时间':0,'空间':0,'命运':0,'毁灭':0,'生命':0},
        status:'健康', worldBuffs:[], logs:[],
        achievements:{},
        _flagNearDeath:false, _flagTribPass:false, _flagCaibup:false,
        _flagRealmUpAfterCaibup:false, _consecutiveTrib:0,
        _winVillage:false, _winArena:false, _winTourney:false,
        _poisonAge:0, _flagBreakInBuff:false, _gangKill:0,
        _sectContribution:0, _sectHero:false,
        _deathCause:'', _dead:false, _bonusLife:0,
        _powerBuff:0, _spinLock:false,
        _avatarBreakthrough: false
    };
    CONFIG.achievements.forEach(a=>G.achievements[a.id]=false);
}
function rand(min,max){return Math.random()*(max-min)+min;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
function drawProb(items){let r=Math.random(),c=0;for(let it of items){c+=it.prob;if(r<c)return it;}return items[items.length-1];}

// ================================================================
//  故事库（精简但完整，所有事件均已包含）
// ================================================================
const STORIES = {
    '鸡追': {
        win: (p) => `波照在荒野中撞见一只通体金羽的三足灵鸡，那畜生竟口吐人言，嘲弄波照修为低微。波照勃然大怒，拔剑追杀了三里地，最终一剑刺穿灵鸡心脉，从鸡腹中剖出一枚温润如玉的灵羽。那灵羽入手生温，灵气汩汩涌入丹田，波照修为凭空暴涨${p}点！`,
        lose_old: (p) => `波照拖着沉重的伤躯在山路上蹒跚而行，忽听身后传来尖锐的鸡鸣——竟是那只前日结仇的三足灵鸡寻仇来了！波照想跑，却牵动旧伤，一个踉跄摔倒在地，被那畜生啄得浑身是血，本就虚弱的修为又散去了${p}点。`,
        lose: (p) => `波照路过一处荒村时，惊动了一只三足金羽灵鸡。那畜生发了疯似的追赶波照，一路追过三个山头、两条河流，波照鞋都跑丢了一只，最后躲进一个猎户废弃的陷阱里才逃过一劫。经此一役，波照元气大伤，修为跌落${p}点。`
    },
    '村斗': {
        win: (p) => `波照踏入村口擂台时，围观者皆窃笑——一个瘦削少年也敢挑战村中第一力士？波照却不言语，身形如柳絮般飘忽，避开力士三记重拳后，一指点在对方气海穴上。力士闷哼一声倒地，满场哗然。波照抱拳一笑，赢得${p}点修为的彩头。`,
        lose_h: `波照在村口擂台遇到了一个横练功夫已臻化境的糙汉，对方一身铜皮铁骨，波照的拳脚打上去如击金石。糙汉一记铁山靠撞来，波照整个人飞出去三丈远，撞碎了擂台边的石碾子，断了两根肋骨，鲜血染红了衣襟。`,
        lose_l: `波照在村口擂台与一个使双锤的壮汉交手，对方力大势沉，波照以巧劲周旋了十几个回合，终因体力不支被一锤扫中小腿，一个趔趄跌下擂台。虽未伤筋动骨，却也狼狈不堪，被围观者嘘声一片。`
    },
    '采灵草': {
        good: (p) => `波照在断崖边发现一株九叶灵芝，那灵草通体泛着淡紫色的光晕，根须深深扎入岩缝之中。波照小心翼翼地用玉铲挖掘了半个时辰，终将整株灵草完整取出，灵草入手的瞬间，一股精纯的灵气顺着手臂涌入丹田，修为暴涨${p}点！`,
        bad: `波照在瘴气弥漫的谷底发现一株形似灵草的植株，激动之下伸手便摘。不料那竟是“蚀骨毒草”，草叶上的毒刺瞬间刺入皮肉，一股黑气顺着手臂蔓延开来。波照大惊，慌忙斩断草茎，却已是毒气入体，寿命折去5年。`,
        heal: `波照在山涧边发现一株通体透明的“玉髓草”，此草专治内伤。波照将草叶捣碎敷在伤口上，一股清凉之气渗入骨髓，断裂的筋骨以肉眼可见的速度愈合，痛楚大减，还顺手多采了一株留着备用，获得一枚疗伤药。`
    },
    '摔下山崖': {
        fly: `波照脚下一滑，整个人从百丈悬崖上跌落下去！罡风割面，生死一线之间，他猛地运转御风术，衣袂鼓荡如翼，身形在空中划出一道弧线，稳稳落在崖底一块青石上，除了衣衫被风撕裂了几道口子，竟是毫发无伤。`,
        tough: `波照从一处陡峭的山崖上失足坠落，他临危不乱，在半空中调整姿态，以千斤坠的功夫硬生生砸进崖底的灌木丛中。灌木被他砸出一个大坑，波照浑身淤青却筋骨无碍，反而在坠落的冲击中打通了一处淤塞的经脉，修为涨了10点。`,
        hurt: `波照在攀爬一处险峰时不慎踩碎了一块松动的岩石，整个人翻滚着摔下十几丈高的崖壁，在碎石和荆棘中连续撞击了七八次才卡在一棵歪脖子树上停下来。他浑身是血，左腿明显骨折，痛得几乎昏死过去，寿命折去3年。`
    },
    '迷路': {
        lost: `波照在深山老林中迷失了方向，那林子里的树木长得一模一样，连太阳都被浓密的树冠遮得严严实实。他在里面转了整整三天三夜，干粮耗尽，水囊见底，最后不得不以露水和树皮充饥。等他终于找到出路时，修为已不知不觉散逸了15点。`
    },
    '老农赠药': {
        gain: `波照路过一处山间田舍时，一个白发苍苍的老农叫住了他，说昨夜梦见仙人指点，今日会有贵客路过，特赠一枚祖传的“九转还魂丹”以结善缘。波照再三推辞不过，只得收下，老农笑眯眯地挥了挥手，转身隐入竹林深处。`
    },
    '灵泉沐浴': {
        good: (p) => `波照在密林深处发现一眼冒着氤氲白气的灵泉，泉水清澈见底，底部铺满了温润的灵玉。他褪去衣衫浸入泉中，只觉一股暖流从百骸渗入，浑身舒泰，体内暗伤尽数愈合，甚至隐隐触摸到了境界的壁障，修为暴涨${p}点！`
    },
    '心魔': {
        immune: (p) => `波照闭关修炼时，心魔幻境骤然降临！他看到了自己最恐惧的画面——亲人惨死、修为尽废、孤苦无依。然而波照身具不死之身，心志坚如磐石，竟在幻境中一拳轰碎了心魔化身！反噬之力化作精纯的灵气，修为暴涨${p}点。`,
        weak: `波照在修炼中触及瓶颈，心魔趁虚而入。幻境中，他看见自己走火入魔、爆体而亡的惨状，恐惧如潮水般将他吞没。他疯狂地试图挣脱幻境，却越陷越深，最终虽勉强醒来，却已心神大损，修为暴跌两成，寿元折去5年。`,
        normal: `波照在冥想时心魔悄然而至，幻化出无数妖娆身影在他眼前起舞，意图动摇他的道心。波照咬破舌尖，以剧痛唤醒清明，盘坐三天三夜，终于将心魔逼退。虽未伤及根本，修为却也折损了一成。`
    },
    '擂台': {
        win_c: (p) => `波照站在坊市擂台之上，台下乌泱泱围了数百人。他连战七场，对手一个比一个强——使刀的、用毒的、驭兽的——全被他以精妙的身法和浑厚的灵力一一击退。最后一场，他一掌震碎对手护体罡气，满场欢呼雷动，赢得了${p}点修为的丰厚奖励！`,
        win_p: `波照在坊市擂台上遇到了一个手持渡劫丹作为赌注的散修，那人狂妄至极，声称无人能接下他三招。波照微微一笑，闪身避开对方两记杀招后，第三招时一指点在对方手腕上，渡劫丹应声落入波照手中，那散修面如土色。`,
        win_a: `波照在坊市擂台击败了一位炼丹师出身的修士，那人技不如人却输得心服口服，竟主动将一本泛黄的《炼丹心得》赠予波照。波照翻开一看，里面密密麻麻记载着上百种丹方和火候秘诀，惊喜之下当场学会了炼丹术！`,
        lose_h: `波照在坊市擂台上遭遇了一位金丹后期的修士，对方灵力浑厚如海，随手一掌便掀起狂风。波照被那股气浪掀飞出去，重重撞在擂台边的石柱上，呕出一口鲜血，胸骨断了三根，奄奄一息地瘫倒在地。`,
        lose_l: `波照在坊市擂台上与一位剑修交手，对方剑法凌厉如电，波照勉强躲过七剑，第八剑时终于避无可避，被剑脊拍中肩膀，整个人翻下擂台。虽只是皮肉之伤，却在众目睽睽之下丢了颜面。`
    },
    '炸炉': {
        immune: `波照在炼丹时炉火突然失控，丹炉剧烈震颤，发出刺耳的嗡鸣声。换作旁人早已慌乱逃窜，但波照修炼炼丹术多年，临危不乱地打出一道道法诀稳住炉火，最终以精妙的手法将失控的灵气疏导而出，丹炉安然无恙，丹药也完好无损。`,
        tough: `波照炼丹时一味药材放多了量，丹炉当场炸裂，碎片和火焰四溅！他来不及躲避，只得运转灵力护住周身，硬扛了这场爆炸。虽然衣衫被烧得千疮百孔、头发都焦了一半，但总算保住了性命，只是修为被炸去了20点。`,
        heavy: `波照在炼制“破障丹”时火候失控，丹炉轰然爆炸！碎片如利刃般四散飞射，波照胸口被一块丹炉残片击中，整个人被冲击波掀飞撞在墙上。他倒在地上咳血不止，脏腑受到重创，寿命折去10年，境界几乎跌落。`
    },
    '追杀': {
        beast: (p) => `波照被三名宗门弟子追杀至断魂崖边，前有追兵、后有深渊，眼看走投无路。就在这时，一声震天咆哮从深渊中传出——一头通体漆黑的麒麟神兽冲天而起，一口将三名追杀者吞入腹中！神兽对波照俯首称臣，波照不仅捡回一条命，还得了${p}点修为。`,
        escape: `波照被仇家率领的十几名修士围追堵截，一路从青石岭杀到断魂谷，血战了三天三夜。他浑身是伤却始终不曾倒下，最终在一处密林的掩护下甩掉了追兵。代价是修为折损了30点，但好歹捡回了一条命。`,
        caught: `波照在归途中遭遇了宗门执法长老的截杀，那长老根本不给他辩解的机会，一掌拍碎了他的护体灵光。波照倒飞出去撞断了两棵大树，浑身骨骼寸寸作响，修为被震散了80点，身上添了数道深可见骨的伤口。`
    },
    '秘境奇遇': {
        good: (p) => `波照在一处废弃的上古洞府中发现了一间尘封已久的藏宝室，里面堆满了灵玉和法器。他还没来得及细看，就触发了禁制，整个洞府开始崩塌！波照在千钧一发之际只来得及抓了一把灵玉和一枚疗伤药就逃了出去，背后洞府轰然坍塌。虽然惊险，但修为暴涨了${p}点！`,
        bad: `波照在探索一处秘境时误入机关陷阱，无数毒箭从四面八方射来。他左躲右闪却还是中了两箭，箭头上淬了剧毒，伤口迅速发黑。他拼尽全力逃出陷阱区，又吞下随身携带的解毒草才勉强保命，但修为只增长了50点，还落了个轻伤。`
    },
    '采补': {
        win: `波照在客栈打尖时，一个油头粉面的男修凑上前来搭讪，言语间尽是暧昧挑逗。波照冷眼相看，那男修竟趁其不备伸手要按波照的丹田——波照反手一掌拍在那人胸口，将其震飞三尺！那人爬起来捂着胸腹仓皇逃窜，波照顺手拿走了他的储物袋，里面竟有30点修为的灵晶。`,
        mid: `波照在荒郊野岭被一个修炼采补邪术的男修偷袭得手，那人趁着波照调息疗伤的间隙，从背后封住了他的穴道，强行吸走了他两成修为和三年阳寿。波照恢复行动后恨得咬牙切齿，但那人早已逃之夭夭，只剩波照独自坐在石头上运功调息，面色苍白如纸。`,
        low: `波照在夜深人静时被一个潜伏已久的采补修士拖入暗巷，那人力气大得出奇，一把攥住波照的脉门让他动弹不得。波照挣扎了一炷香的时间仍无法脱身，最终被强行采补，三成修为和八年阳寿如决堤之水般流失殆尽。波照瘫倒在地，眼里满是屈辱与不甘。`
    },
    '高人传功': {
        low: (p) => `波照在山路上遇见一个衣衫褴褛的乞丐老头，那老头坐在路边啃着半个馒头，见波照经过，笑嘻嘻地招手。波照上前一问，那老头竟是个云游散仙，看波照根骨清奇，当场传了他半部功法。波照只觉一股热流在经脉中奔涌，修为涨了${p}点。`,
        mid: (p) => `波照在一处坍塌的山洞深处发现了一具端坐的枯骨，枯骨膝上放着一卷竹简和一封遗书。原来这是三千年前一位合体期大能的坐化之所，遗书将毕生所学托付于有缘人。波照跪拜三拜，竹简化作一道金光没入眉心，修为暴涨${p}点，连体内的毒素也被冲散化解。`,
        high: (p) => `波照在渡劫的雷光之中，忽然看见一道仙光从天而降，一位白衣仙人踏云而来，竟是仙界使者！使者伸手一点，一道法则真意灌入波照天灵，波照顿时明悟了天地运行之理，修为暴涨${p}点，同时领悟了一道法则碎片！`
    },
    '魔道偷袭': {
        high: `波照途径黑风岭时，遭遇了一个魔道高手的埋伏。那魔修身穿黑袍、面容狰狞，手中一柄血红色的长刀散发着森森煞气。波照与他对了三招便知不敌，被一刀劈中胸口，血光迸溅、骨裂声清晰可闻，整个人倒飞出去砸进山壁里，身负重伤。`,
        low: `波照在夜行途中被三个魔道弟子拦截，这些家伙修为不高但手段阴毒，洒出一把淬毒的暗器封锁了波照的退路。波照虽奋力杀退了两人，却被第三人的毒刺划中了后背，伤势虽不致命，但修为折损了一成。`
    },
    '丹会交流': {
        win: `波照参加了一场地下丹会，会上各路炼丹高手汇聚一堂比拼丹术。波照以一手“九转回火”的绝技技惊四座，炼出的丹药品质远超同侪，被公推为丹会魁首。不仅赢得了150点修为的奖励，还从一个落败的炼丹师手中得到了一本炼丹术秘籍！`,
        lose: `波照在丹会上与一位老炼丹师比试控火之术，结果对方的修为高出波照两个境界，轻而易举地压制了他的炉火。波照的丹药炼到一半便焦糊了，场面颇为尴尬，不过老炼丹师念在他年幼，还是分给他30点修为作为安慰。`
    },
    '反噬': {
        law: `天道反噬化作一道赤红色的雷劫劈向波照！波照面不改色，体内积蓄的法则之力骤然爆发，在头顶凝聚成一面法则之盾。雷劫劈在盾上激起漫天火花，波照虽被震退三步，却安然无恙，只是损失了100点修为作为代价。`,
        tough: `天道反噬降临时，波照来不及躲避，只得将全身灵力凝聚于头顶硬扛这一击。雷劫劈落，波照脚下的大地裂开了一道丈许深的裂缝，他口中喷出一口鲜血，寿命折去15年，连修为都散逸了50点战力。`,
        heavy: `天道反噬如灭世之雷般轰然降临，波照被劈得浑身焦黑、皮开肉绽，整个人陷入了地下三尺深的坑洞中。等他挣扎着爬出来时，已是重伤濒死，寿命折去25年，整个人像被天火灼烧过一般惨不忍睹。`
    },
    '渡劫模拟': {
        immune: (p) => `波照在闭关中引动了九重天雷模拟渡劫，一重比一重凶悍的雷劫劈在波照身上，换作旁人早已灰飞烟灭。但波照身具不死之身，每一道雷劫劈下都被他以肉身硬扛，反而将雷霆之力炼化为己用，修为暴涨${p}点！`,
        fail: `波照强行引动渡劫模拟，结果修为根基不稳，天雷失控反噬自身！他整个人被雷光笼罩，惨叫一声倒在洞府中，浑身抽搐，经脉寸断。勉强保住性命后，境界濒临跌落，伤势沉重到几乎无法站立。`,
        normal: (p) => `波照在洞府中闭关模拟渡劫，一重又一重的雷霆呼啸而至，他在雷光中咬牙坚持了整整三天三夜。最终成功扛过九重天雷，修为暴涨${p}点，但连续三天的雷劫淬炼也让他的寿命折去了5年。`
    },
    '顿悟': {
        super: (l) => `波照在月下独自静坐时，忽见漫天星斗闪烁如棋盘，万道流光在夜空中交织成一座巨大的法阵。他心头一震，忽然明悟了天地运行的至理——万法归一！修为当场翻倍，同时顿悟了${l}法则的雏形！整片星空都为之颤抖了一瞬。`,
        poison: `波照在顿悟的关键时刻，体内的毒素突然爆发！灵气在经脉中狂暴奔涌，竟将毒素推向了全身各处。波照咬紧牙关强行收束灵力，最终虽修为增长了五成，却被毒素侵蚀了五脏六腑，寿命折去10年。`,
        normal: `波照在观山望水时忽然心有所感，看着流水东去、云卷云舒，竟悟出了“顺势而为”的天道至理。心中的桎梏豁然开朗，积蓄已久的修为在这一刻轰然爆发，直接翻了一倍！`
    },
    '仙道大会': {
        win_c: (p) => `波照踏入仙道大会的战场时，台下坐着数十位化神以上的老怪。他一路过关斩将，剑斩七位对手，最后一位更是达到了合体期的老怪！波照以精妙的身法避开对方杀招，一剑刺破其护体灵光，全场震动！波照夺得魁首，修为暴涨${p}点！`,
        win_l: (p, l) => `波照在仙道大会的决赛中遭遇了一位渡劫期的大能，对方随手一挥便是滔天灵压。波照在绝境中忽然触碰到了一道法则的边缘，一剑劈出竟带动了天地规则之力！对方被震退三步，波照趁势追击，赢得魁首之位，修为暴涨${p}点，同时领悟了${l}法则！`,

function getSpiritDisplay() {
    if (!G.spiritQ || !G.spiritElements) return '未知灵根';
    let q = G.spiritQ.name || '下品';
    let els = G.spiritElements.join('') || '';
    let c = G.spiritCount || 1;
    let suffix = c===1?'灵根':(c===5?'混沌五灵根':['单','双','三','四','五'][c-1]+'灵根');
    return `${q}${els}${suffix}`;
}

function calcPower() {
    const base = G.birthlandData ? G.birthlandData.power : 80;
    const realmAdd = CONFIG.realmCoeff[G.realmIndex] * 50;
    const abilityAdd = (G.abilities || []).length * 30;
    const specials = ['不死之身','法天象地','古神血脉','神兽伙伴'];
    const specialAdd = (G.abilities || []).filter(a=>specials.includes(a)).length * 100;
    const lawAdd = G.laws ? Object.values(G.laws).reduce((a,b)=>a+b,0)*20 : 0;
    const extra = G.birthlandData ? G.birthlandData.extraPower : 0;
    let raw = base + realmAdd + abilityAdd + specialAdd + lawAdd + extra + (G._powerBuff || 0);
    let mult = 1;
    if(G.status === '轻伤') mult *= 0.8;
    if(G.status === '重伤') mult *= 0.5;
    if(G.status === '濒死') mult *= 0.2;
    if(G.status && G.status.includes('中毒')) mult *= 0.9;
    const spiritPower = G.spiritQ ? G.spiritQ.power : 0;
    return Math.floor(raw * mult * (1 + spiritPower));
}

function applyCultGain(base) {
    let mult = 1 + (G.birthlandData ? G.birthlandData.bonusCult : 0) + (G.spiritQ ? G.spiritQ.speed : 0);
    let match = 0;
    if (G.spiritElements && G.abilities) {
        for(let el of G.spiritElements) {
            if(G.abilities.includes(CONFIG.elementAbility[el])) match++;
        }
    }
    mult += match * 0.30;
    const cb = CONFIG.spiritCount.find(s=>s.count === G.spiritCount)?.bonus || 0;
    mult += cb;
    if (G.worldBuffs) {
        for(let b of G.worldBuffs) if(b.buff.cultGain) mult += b.buff.cultGain;
    }
    let gain = Math.floor(base * mult);
    if (G.worldBuffs) {
        for(let b of G.worldBuffs) if(b.buff.extraAge) G.age += b.buff.extraAge;
    }
    return gain;
}

function addLog(msg){ 
    if (!G.logs) G.logs = [];
    G.logs.push(`【${G.age}岁】波照 ${msg}`); 
    if(G.logs.length>60) G.logs.shift(); 
    updateLogUI(); 
}
function updateLogUI(){ 
    const area = document.getElementById('logArea'); 
    if(area && G.logs) area.innerHTML = G.logs.slice(-25).map(s=>`<p>${s}</p>`).join(''); 
}
function setSubtitle(text, cls=''){ 
    const el = document.getElementById('subtitle'); 
    if(el){ el.textContent = text; el.className = 'subtitle '+(cls||''); } 
}

function updateAvatar() {
    const avatarEl = document.getElementById('avatar');
    if (!avatarEl) return;
    const chars = ['炼','筑','金','婴','化','合','渡','仙'];
    const idx = G.realmIndex || 0;
    avatarEl.className = `avatar realm-${idx}`;
    avatarEl.innerHTML = `<span class="realm-char">${chars[idx]}</span>`;
    if (G._avatarBreakthrough) {
        avatarEl.classList.add('breakthrough');
        setTimeout(() => {
            avatarEl.classList.remove('breakthrough');
            G._avatarBreakthrough = false;
        }, 800);
    }
    if (idx === 7) avatarEl.classList.add('pulse');
    else avatarEl.classList.remove('pulse');
}

function updatePanel() {
    const p = document.getElementById('panelContent');
    if (!p) return;
    const realm = CONFIG.realms[G.realmIndex] || '炼气';
    const nextCult = G.realmIndex < 7 ? CONFIG.realmCult[G.realmIndex+1] : Infinity;
    const cultProgress = G.realmIndex < 7 ? (G.cult - CONFIG.realmCult[G.realmIndex]) / (nextCult - CONFIG.realmCult[G.realmIndex]) : 1;
    const lifespan = CONFIG.realmLifespan[G.realmIndex] + (G._bonusLife || 0);
    const ageProgress = G.age / lifespan;
    const power = calcPower();
    const smap = {'健康':'❤️','轻伤':'🟡','重伤':'🔴','濒死':'💀','中毒':'☠️'};
    const avatarHTML = `
        <div class="avatar-container">
            <div class="avatar realm-${G.realmIndex || 0}" id="avatar">
                <span class="realm-char">${['炼','筑','金','婴','化','合','渡','仙'][G.realmIndex || 0]}</span>
            </div>
            <div>
                <div style="font-size:1.2rem; font-weight:bold; color:#f5d080;">波照</div>
                <div style="font-size:0.8rem; color:#a09080;">${G.birthland || ''}</div>

        </div>
    `;
    let html = avatarHTML + `
        <div class="panel-item"><span class="label">🌱 灵根</span><span class="value gold">${getSpiritDisplay()}</span></div>
        <div class="panel-item"><span class="label">⚔️ 境界</span><span class="value">${realm}</span></div>
        <div class="panel-item"><span class="label">📅 年龄</span><span class="value ${G.age>lifespan*0.9?'red':''}">${G.age}/${lifespan===Infinity?'∞':lifespan}</span></div>
        <div class="progress-bar"><div class="fill life" style="width:${Math.min(ageProgress,1)*100}%"></div></div>

        <div class="panel-item"><span class="label">⚡ 战力</span><span class="value gold">${Math.floor(power)}</span></div>
        <div class="panel-item"><span class="label">🧬 状态</span><span class="value">${G.status} ${smap[G.status]||'❤️'}</span></div>
        <div class="panel-item"><span class="label">🏯 宗门贡献</span><span class="value gold">${G._sectContribution||0}</span></div>
        <div class="panel-item" style="flex-wrap:wrap;"><span class="label">📜 能力</span><span>${(G.abilities||[]).map(a=>`<span class="ability-tag">${a}</span>`).join('')||'无'}</span></div>
        <div class="panel-item" style="flex-wrap:wrap;"><span class="label">⚖️ 法则</span><span>${Object.entries(G.laws||{}).map(([k,v])=>`<span class="law-tag ${v>=3?'complete':''}">${k} ${v}/3</span>`).join('')}</span></div>
        <div class="panel-item" style="flex-wrap:wrap;"><span class="label">🏆 成就</span><span>${CONFIG.achievements.map(a=>`<span class="achieve-tag ${G.achievements && G.achievements[a.id]?'unlocked':'locked'}">${a.name}</span>`).join('')}</span></div>

        <div class="panel-item" style="flex-wrap:wrap;"><span class="label">🌍 天道</span><span>${(G.worldBuffs||[]).map(b=>`<span class="world-buff">${b.name}</span>`).join('')||'无'}</span></div>
    `;

function checkAchievements(){
    let unlocked = [];
    for(let a of CONFIG.achievements) {
        if(!G.achievements[a.id] && a.check(G)) {
            G.achievements[a.id] = true;
            unlocked.push(a.name);
            addLog(`🏆 解锁成就：${a.name}！`);
        }
    }
    if(unlocked.length){ setSubtitle(`🏆 解锁成就：${unlocked.join('、')}`,'special'); updatePanel(); }
}
function recoverStatus(){
    const p = calcPower();
    const bonus = (p>500?0.05:0) + (p>1000?0.05:0);
    if(G.status === '轻伤' && Math.random()<0.30+bonus){ G.status='健康'; setSubtitle('伤势好转，轻伤已愈！','good'); addLog('伤势恢复，回到健康'); }
    else if(G.status === '重伤' && Math.random()<0.15+bonus){ G.status='轻伤'; setSubtitle('伤势好转，重伤→轻伤','good'); addLog('重伤缓解为轻伤'); }
    else if(G.status === '濒死' && Math.random()<0.05+(p>500?0.05:0)){ G.status='重伤'; setSubtitle('吊住一口气，濒死→重伤','good'); addLog('从濒死中缓过来'); }
    if(G.status && G.status.includes('中毒') && Math.random()<0.20+(p>800?0.15:0)){ 
        G.status = G.status.replace('中毒','').trim() || '健康'; 
        setSubtitle('毒素消退！','good'); 
        addLog('解毒成功'); 
    }
    if(G.status === '濒死' && Math.random()<0.20) triggerDeath('濒死未能挺过');
}
function triggerDeath(reason){
    if(G._dead) return;
    G._dead = true; 
    G._deathCause = reason;
    const ending = pick(CONFIG.deathEndings);
    document.getElementById('endTitle').textContent = '道陨 · '+ending.split('：')[0].replace(/[「」]/g,'');
    document.getElementById('endDesc').textContent = ending;
    document.getElementById('endSummary').textContent = `寿元 ${G.age} 岁 · 境界 ${CONFIG.realms[G.realmIndex]||'炼气'} · 战力 ${Math.floor(calcPower())} · 修为 ${Math.floor(G.cult)} · 贡献 ${G._sectContribution||0} · 日志 ${G.logs?G.logs.length:0} 条`;
    document.getElementById('endOverlay').classList.add('show');
    document.getElementById('spinBtn').disabled = true;
    addLog(`⚠️ 道陨：${ending}`);
}

function attemptTribulation() {
    if(G.realmIndex >= 7) return;
    if(G.cult < CONFIG.realmCult[G.realmIndex + 1]) return;

    if(G.realmIndex < 2) {
        G.realmIndex++;
        G._consecutiveTrib = (G._consecutiveTrib || 0) + 1;
        G._flagTribPass = true;
        G.status = '健康';
        G._avatarBreakthrough = true;
        setSubtitle(`🎉 突破成功！当前境界：${CONFIG.realms[G.realmIndex]}`, 'good');
        addLog(`🎉 突破成功！晋升至 ${CONFIG.realms[G.realmIndex]}`);
        updatePanel();
        checkAchievements();
        if(G.realmIndex < 7 && G.cult >= CONFIG.realmCult[G.realmIndex + 1]) {
            attemptTribulation();
        }
        return;
    }

    if(G.realmIndex === 5 && !Object.values(G.laws).some(v => v >= 1)) {
        setSubtitle('法则雏形缺失，瓶颈凝滞！', 'bad');
        addLog('法则不全，无法渡劫');
        return;
    }

    let power = calcPower();
    let baseProb = Math.min(99, 50 + (power - 100) / 20);
    if(G.items['渡劫丹'] > 0) {
        G.items['渡劫丹']--;
        baseProb = Math.max(baseProb, 90);
        addLog('消耗渡劫丹');
    }
    for(let b of G.worldBuffs) if(b.buff.tribBuff) baseProb += b.buff.tribBuff;
    baseProb = Math.min(99, baseProb);

    if(Math.random() * 100 < baseProb) {
        G.realmIndex++;
        G._consecutiveTrib = (G._consecutiveTrib || 0) + 1;
        G._flagTribPass = true;
        G.status = '健康';
        G._avatarBreakthrough = true;
        let keys = Object.keys(G.laws);
        let l = pick(keys);
        G.laws[l] = (G.laws[l] || 0) + 1;
        addLog(`⚡ 渡劫成功！突破至 ${CONFIG.realms[G.realmIndex]}，领悟${l}法则`);
        for(let b of G.worldBuffs) if(b.buff.extraLaw) {
            let e = pick(keys);
            G.laws[e] = (G.laws[e] || 0) + 1;
            addLog(`仙门开启，额外获得${e}法则`);
            b.used = true;
        }
        G.worldBuffs = G.worldBuffs.filter(b => !b.used);
        setSubtitle(`渡劫成功！突破至 ${CONFIG.realms[G.realmIndex]}`, 'good');
        if(G.realmIndex === 7 && Object.values(G.laws).some(v => v >= 3)) {
            setSubtitle('🎉 飞升成仙！', 'special');
            addLog('🎉 飞升成仙！通关！');
            document.getElementById('endTitle').textContent = '🎉 飞升成仙！';
            document.getElementById('endDesc').textContent = '波照历经万劫，终证大道，逍遥长生！';
            document.getElementById('endSummary').textContent = `寿元 ${G.age} 岁 · 境界 大乘 · 战力 ${Math.floor(calcPower())} · 贡献 ${G._sectContribution||0}`;
            document.getElementById('endOverlay').classList.add('show');
            document.getElementById('spinBtn').disabled = true;
            return;
        }
        updatePanel();
        checkAchievements();
    } else {
        if(Math.random() < 0.70) {
            G.cult *= 0.6;
            G.age += 15;
            G.status = '重伤';
            setSubtitle('渡劫失败，重伤！', 'bad');
            addLog('渡劫失败，重伤');
        } else {
            triggerDeath('渡劫失败，魂飞魄散');
            return;
        }
        G._consecutiveTrib = 0;
        updatePanel();
    }
}

                    setSubtitle(`宗门大比夺魁！修为+${gain}`,'good');
                }
            } else {
                let h=power<300;
                G.status=h?'重伤':'轻伤';
                G.cult*=0.9;
                story=h?STORIES['宗门大比'].lose_h:STORIES['宗门大比'].lose_l;
                setSubtitle(`宗门大比落败，${h?'重伤':'轻伤'}`,'bad');
            }
            addLog(story); break;
        }
        case '秘境探索': {
            let opp=power*(0.65+Math.random()*0.6);
            if(power>=opp){
                gain=applyCultGain(300); G.cult+=gain;
                G.items['疗伤药']=(G.items['疗伤药']||0)+2;
                G._sectContribution=(G._sectContribution||0)+4;
                story=STORIES['秘境探索'].win(gain);
                setSubtitle('秘境探索成功！','special');
            } else {
                gain=applyCultGain(50); G.cult+=gain;
                G.status='重伤';
                story=STORIES['秘境探索'].lose;
                setSubtitle('秘境被困，重伤','bad');
            }
            addLog(story); break;
        }
        case '掌门传功': {
            if(G.realmIndex>=4){
                gain=applyCultGain(500); G.cult+=gain;
                let keys=Object.keys(G.laws); lawKey=pick(keys);
                G.laws[lawKey]=(G.laws[lawKey]||0)+1;
                G._sectContribution=(G._sectContribution||0)+5;
                story=STORIES['掌门传功'].high(gain, lawKey);
                setSubtitle(`掌门亲传！${lawKey}法则+1`,'special');
            } else {
                gain=applyCultGain(200); G.cult+=gain;
                G._sectContribution=(G._sectContribution||0)+2;
                story=STORIES['掌门传功'].mid(gain);
                setSubtitle(`掌门指点，修为+${gain}`,'good');
            }
            addLog(story); break;
        }
        case '宗门之难': {
            let opp=power*(0.8+Math.random()*0.5);
            if(power>=opp){
                gain=applyCultGain(400); G.cult+=gain;
                let keys=Object.keys(G.laws); lawKey=pick(keys);
                G.laws[lawKey]=(G.laws[lawKey]||0)+1;
                G._sectContribution=(G._sectContribution||0)+6;
                G._sectHero=true;
                story=STORIES['宗门之难'].win(gain);
                setSubtitle('守护宗门！','special');
                checkAchievements();
            } else {
                G.cult*=0.8;
                G.status='濒死';
                story=STORIES['宗门之难'].lose;
                setSubtitle('宗门之战重伤','bad');
                if(Math.random()<0.3){ triggerDeath('宗门之战伤重不治'); return; }
            }
            addLog(story); break;
        }
        default: { setSubtitle('未知事件','bad'); addLog('未知事件'); }
    }
    updatePanel();
}

function updateWorldBuffs(){
    let toRemove=[];
    for(let b of G.worldBuffs){ b.remaining=(b.remaining||0)-1; if(b.remaining<=0) toRemove.push(b); }
    for(let b of toRemove){ G.worldBuffs=G.worldBuffs.filter(w=>w!==b); setSubtitle(`「${b.name}」消退`,'special'); addLog(`天道「${b.name}」平息`); }

}

function drawWheel(angle) {
    const segs = getSegments();
    currentSegments = segs;
    const n = segs.length, arc = 2*PI/n;
    const w = canvas.width, h = canvas.height, r = Math.min(w,h)*0.42, cx = w/2, cy = h/2;
    ctx.clearRect(0,0,w,h);
    ctx.save();
    ctx.translate(cx,cy);
    ctx.rotate(angle);
    for(let i=0;i<n;i++){
        const start = i*arc, end = start+arc;
        ctx.beginPath();
        ctx.moveTo(0,0);
        ctx.arc(0,0,r,start,end);
        ctx.closePath();
        ctx.fillStyle = segs[i].color;
        ctx.fill();
        ctx.strokeStyle = '#2a221a';
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.save();
        ctx.rotate(start + arc/2);
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = '#1a1410';
        ctx.font = 'bold 11px serif';
        ctx.shadowColor = 'rgba(0,0,0,0.3)';
        ctx.shadowBlur = 4;
        ctx.fillText(segs[i].label, r*0.68, 0);
        ctx.restore();
    }
    ctx.restore();
    ctx.save();
    ctx.translate(cx,cy);
    ctx.beginPath();
    ctx.moveTo(0,-r-10);
    ctx.lineTo(-12,-r-30);
    ctx.lineTo(12,-r-30);
    ctx.closePath();
    ctx.fillStyle = '#d4b080';
    ctx.shadowColor = '#000';
    ctx.shadowBlur = 12;
    ctx.fill();
    ctx.restore();
    ctx.beginPath();
    ctx.arc(cx,cy,14,0,2*PI);
    ctx.fillStyle = '#2a221a';
    ctx.fill();
    ctx.strokeStyle = '#b89a6a';
    ctx.lineWidth = 3;
    ctx.stroke();
}

// ================================================================
//  spinWheel - 转盘旋转主函数（已确保可调用）
// ================================================================
function spinWheel() {
    console.log('spinWheel 被调用'); // 调试日志
    if (isSpinning) {
        console.log('转盘正在旋转，忽略');
        return;
    }
    if (G._dead) {
        console.log('游戏已结束，无法旋转');
        return;
    }
    isSpinning = true;
    document.getElementById('spinBtn').disabled = true;

    const segs = getSegments();
    const n = segs.length;
    const targetIndex = Math.floor(Math.random() * n);
    const arc = 2 * PI / n;
    const targetAngle = -PI/2 - targetIndex * arc - arc/2;
    const spins = 5 + Math.floor(Math.random() * 4);
    const totalAngle = targetAngle + spins * 2 * PI;
    const startAngle = spinAngle;
    const duration = 2500 + Math.random() * 1000;
    const startTime = performance.now();

    function animate(time) {
        const elapsed = time - startTime;
        const progress = Math.min(elapsed / duration, 1);
        const ease = 1 - Math.pow(1 - progress, 3);
        const current = startAngle + (totalAngle - startAngle) * ease;
        spinAngle = current;
        drawWheel(current);
        if (progress < 1) {
            requestAnimationFrame(animate);
        } else {
            spinAngle = current;
            drawWheel(current);
            const result = segs[targetIndex];
            isSpinning = false;
            document.getElementById('spinBtn').disabled = false;
            console.log('转盘结果：', result);
            handleSpinResult(result);
        }
    }
    requestAnimationFrame(animate);
}

function handleSpinResult(seg) {
    if(G._dead) return;
    let ageAdded = true;
    if(seg.type === 'ability' && G.abilities.includes(seg.name)){
        ageAdded = false;
        setSubtitle(`已拥有${seg.name}，再抽一次！`,'special');
        addLog(`重复能力${seg.name}，重转`);
        setTimeout(() => spinWheel(), 800);
        return;
    }
    if(seg.type === 'cult'){
        let gain = applyCultGain(seg.value);
        G.cult += gain;
        setSubtitle(`修为 +${gain}`,'good');
        addLog(`修为增加 ${gain}`);
    } else if(seg.type === 'ability'){
        G.abilities.push(seg.name);
        setSubtitle(`获得能力：${seg.name}`,'good');
        addLog(`获得能力：${seg.name}`);
        if(seg.name === '渡劫丹') G.items['渡劫丹'] = (G.items['渡劫丹']||0)+1;
        if(seg.name === '疗伤药') G.items['疗伤药'] = (G.items['疗伤药']||0)+1;
        if(seg.name === '解毒丹') G.items['解毒丹'] = (G.items['解毒丹']||0)+1;
        checkAchievements();
    } else if(seg.type === 'event'){
        handleEvent(seg.event);
    }
    if(ageAdded) G.age++;
    if(G.status && G.status.includes('中毒')) G._poisonAge = (G._poisonAge||0)+1;
    let maxLife = CONFIG.realmLifespan[G.realmIndex] + (G._bonusLife||0);
    if(G.age > maxLife){ triggerDeath('寿元耗尽'); return; }
    recoverStatus();
    updateWorldBuffs();
    checkAchievements();
    updatePanel();
    if(G.realmIndex < 7 && G.cult >= CONFIG.realmCult[G.realmIndex + 1]) {
        attemptTribulation();
        if(G.realmIndex < 7 && G.cult >= CONFIG.realmCult[G.realmIndex + 1]) {
            attemptTribulation();
        }
    }
}

let birthTimer = null;

function initBirthOverlay() {
    const grid = document.getElementById('birthGrid');
    if (!grid) return;
    grid.innerHTML = '';
    CONFIG.birthlands.forEach((b, idx) => {
        const div = document.createElement('div');
        div.className = 'birth-item';
        div.dataset.index = idx;
        div.innerHTML = `${b.name}<span class="prob">${(b.prob*100).toFixed(0)}%</span>`;
        grid.appendChild(div);
    });
    document.getElementById('birthResult').textContent = '点击「抽取出生地」决定命运';
    document.getElementById('drawBirthBtn').disabled = false;
}

    document.getElementById('startOverlay').classList.remove('show');
    initBirthOverlay();
    document.getElementById('birthOverlay').classList.add('show');
});

document.getElementById('drawBirthBtn').addEventListener('click', function() {
    if (birthTimer) return;
    const btn = this;
    btn.disabled = true;
    const items = document.querySelectorAll('.birth-item');
    const resultEl = document.getElementById('birthResult');
    const targetIdx = Math.floor(Math.random() * CONFIG.birthlands.length);
    let count = 0, maxCount = 20 + Math.floor(Math.random() * 10), interval = 80;
    birthTimer = setInterval(() => {
        items.forEach(el => el.classList.remove('active'));
        const showIdx = Math.floor(Math.random() * items.length);
        items[showIdx].classList.add('active');
        count++;
        if (count >= maxCount) {
            clearInterval(birthTimer);
            birthTimer = null;
            items.forEach(el => el.classList.remove('active'));
            items[targetIdx].classList.add('active');
            const birth = CONFIG.birthlands[targetIdx];
            resultEl.textContent = `✨ 波照生于「${birth.name}」— ${birth.desc} ✨`;
            pendingBirth = birth;
            btn.disabled = false;
            setTimeout(() => {
                document.getElementById('birthOverlay').classList.remove('show');
                document.getElementById('spiritOverlay').classList.add('show');
                document.getElementById('spiritResult').textContent = '点击测试灵根';
                document.getElementById('spiritResult').style.color = '#f5d080';
            }, 1200);
        }
    }, interval);
});
