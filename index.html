            }
            if (!G._dead && Math.random() < 0.005) {
                triggerDeath('莫名遭遇天谴');
                if (!G._dead) { G.status = '重伤';
                    addLog('替身草人挡下天谴，重伤'); }
            }
            updatePanel();
        }

        // ================================================================
        //  转盘 Canvas（主转盘）— 调整擂台出现顺序
        // ================================================================
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        let currentSegments = [],
            spinAngle = 0,
            isSpinning = false;
        const PI = Math.PI;

        function getSegments() {
            let segs = [];
            let isModao = (G._sectSpecial === 'modao');
            let isCaibup = (G._sectSpecial === 'caibup');

            let pool = [];
            let allAbstracts = CONFIG.abstractEvents.filter(e => !(e.type === 'item' && e.item === '替身草人'));
            let shuffled = [...allAbstracts];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            let chosen = shuffled.slice(0, 12);
            chosen.forEach(ab => {
                pool.push({ label: ab.label, type: 'abstract', event: ab.id, color: '#8a7a6a' });
            });

            // ---- 擂台按顺序添加 ----
            // 村斗：只有未获胜且失败次数<2才出现
            if (!G._winVillage && G._villageFails < 2) {
                pool.push({ label: '村斗', type: 'event', event: '村斗', color: '#7a8a6a' });
                pool.push({ label: '村斗', type: 'event', event: '村斗', color: '#7a8a6a' });
            }
            // 坊市擂台：必须村斗获胜后才出现
            if (G._winVillage && !G._winArena && G._arenaFails < 2) {
                pool.push({ label: '擂台', type: 'event', event: '擂台', color: '#6a8a7a' });
                pool.push({ label: '擂台', type: 'event', event: '擂台', color: '#6a8a7a' });
            }
            // 仙道大会：必须坊市擂台获胜后才出现
            if (G._winArena && !G._winTourney && G._tourneyFails < 2) {
                pool.push({ label: '仙道大会', type: 'event', event: '仙道大会', color: '#d4a06a' });
                pool.push({ label: '仙道大会', type: 'event', event: '仙道大会', color: '#d4a06a' });
            }

            // 波刚（未斩杀时出现，遭遇越多出现越多）
            if (G._gangKill < 1) {
                let count = 1 + (G._gangEncounters || 0);
                for (let i = 0; i < Math.min(count, 4); i++) {
                    pool.push({ label: '波刚', type: 'event', event: '波刚', color: '#8a4a3a' });
                }
            }
            // 其他常规战斗
            const normalEvents = [
                { label: '抢劫', type: 'event', event: '被抢劫', color: '#5a4a4a' },
                { label: '路见不平', type: 'event', event: '路见不平', color: '#4a6a5a' },
                { label: '挑衅', type: 'event', event: '被挑衅', color: '#6a4a5a' },
                { label: '隐世高手', type: 'event', event: '隐世高手', color: '#3a3a5a' }
            ];
            let shuffledNormal = [...normalEvents];
            for (let i = shuffledNormal.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffledNormal[i], shuffledNormal[j]] = [shuffledNormal[j], shuffledNormal[i]];
            }
            let chosenNormal = shuffledNormal.slice(0, 2 + Math.floor(Math.random() * 2));
            chosenNormal.forEach(ev => {
                pool.push({ label: ev.label, type: 'event', event: ev.event, color: ev.color });
            });

            let baseCult = 30 + G.realmIndex * 15;
            const cultItems = [
                { label: `+${baseCult}修`, type: 'cult', value: baseCult, color: '#b89a6a' },
                { label: `+${baseCult*2}修`, type: 'cult', value: baseCult * 2, color: '#c8aa7a' },
                { label: `+${baseCult*4}修`, type: 'cult', value: baseCult * 4, color: '#d4b08a' }
            ];
            pool.push(...cultItems);

            const allAb = CONFIG.allAbilities.slice();
            let chosenAb = [];
            for (let i = 0; i < 3 && allAb.length > 0; i++) {
                let idx = Math.floor(Math.random() * allAb.length);
                chosenAb.push(allAb.splice(idx, 1)[0]);
            }
            chosenAb.forEach(ab => {
                pool.push({ label: ab, type: 'ability', name: ab, color: '#6a9a7a' });
            });

            if (isModao) {
                pool.push({ label: '魔袭', type: 'event', event: '魔道偷袭', color: '#5a3a5a' });
                pool.push({ label: '反噬', type: 'event', event: '反噬', color: '#6a3a3a' });
            }
            if (isCaibup) {
                pool.push({ label: '采补', type: 'event', event: '采补', color: '#8a4a5a' });
            }

            if (G.realmIndex >= 5 && Object.values(G.laws).some(v => v >= 1) && Math.random() < 0.3) {
                pool.push({ label: '替身草人', type: 'abstract', event: '神秘护符', color: '#f5d080' });
            }

            for (let i = pool.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [pool[i], pool[j]] = [pool[j], pool[i]];
            }
            if (pool.length > 18) pool = pool.slice(0, 18);
            else if (pool.length < 14) {
                while (pool.length < 14) {
                    pool.push({ label: `+${baseCult}修`, type: 'cult', value: baseCult, color: '#b89a6a' });
                }
            }
            segs = pool.map(item => ({
                label: item.label,
                type: item.type || 'event',
                value: item.value || 0,
                name: item.name || '',
                event: item.event || '',
                color: item.color || '#6a5a4a'
            }));
            return segs;
        }

        function drawWheel(angle) {
            const segs = getSegments();
            currentSegments = segs;
            const n = segs.length,
                arc = 2 * PI / n;
            const w = canvas.width,
                h = canvas.height,
                r = Math.min(w, h) * 0.42,
                cx = w / 2,
                cy = h / 2;
            ctx.clearRect(0, 0, w, h);
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(angle);
            for (let i = 0; i < n; i++) {
                const start = i * arc,
                    end = start + arc;
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.arc(0, 0, r, start, end);
                ctx.closePath();
                ctx.fillStyle = segs[i].color;
                ctx.fill();
                ctx.strokeStyle = '#2a221a';
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.save();
                ctx.rotate(start + arc / 2);
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = '#1a1410';
                ctx.font = 'bold 11px serif';
                ctx.shadowColor = 'rgba(0,0,0,0.3)';
                ctx.shadowBlur = 4;
                ctx.fillText(segs[i].label, r * 0.68, 0);
                ctx.restore();
            }
            ctx.restore();
            ctx.save();
            ctx.translate(cx, cy);
            ctx.beginPath();
            ctx.moveTo(0, -r - 10);
            ctx.lineTo(-12, -r - 30);
            ctx.lineTo(12, -r - 30);
            ctx.closePath();
            ctx.fillStyle = '#d4b080';
            ctx.shadowColor = '#000';
            ctx.shadowBlur = 12;
            ctx.fill();
            ctx.restore();
            ctx.beginPath();
            ctx.arc(cx, cy, 14, 0, 2 * PI);
            ctx.fillStyle = '#2a221a';
            ctx.fill();
            ctx.strokeStyle = '#b89a6a';
            ctx.lineWidth = 3;
            ctx.stroke();
        }

        // ================================================================
        //  spinWheel 和 handleSpinResult（年龄处理保持上次修复）
        // ================================================================
        function spinWheel() {
            if (isSpinning) return;
            if (G._dead) return;
            isSpinning = true;
            document.getElementById('spinBtn').disabled = true;

            const segs = getSegments();
            const n = segs.length;
            const targetIndex = Math.floor(Math.random() * n);
            const arc = 2 * PI / n;
            const targetAngle = -PI / 2 - targetIndex * arc - arc / 2;
            const spins = 5 + Math.floor(Math.random() * 4);
            const totalAngle = targetAngle + spins * 2 * PI;
            const startAngle = spinAngle;
            const duration = 2500 + Math.random() * 1000;
            const startTime = performance.now();

            function animate(time) {
                const elapsed = time - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const ease = 1 - Math.pow(1 - progress, 3);
                const current = startAngle + (totalAngle - startAngle) * ease;
                spinAngle = current;
                drawWheel(current);
                if (progress < 1) { requestAnimationFrame(animate); } else {
                    spinAngle = current;
                    drawWheel(current);
                    const result = segs[targetIndex];
                    isSpinning = false;
                    document.getElementById('spinBtn').disabled = false;
                    handleSpinResult(result);
                }
            }
            requestAnimationFrame(animate);
        }

        function handleSpinResult(seg) {
            if (G._dead) return;

            // 重复能力重转（不消耗年龄）
            if (seg.type === 'ability' && G.abilities.includes(seg.name)) {
                setSubtitle(`已拥有${seg.name}，再抽一次！`, 'special');
                addLog(`重复能力${seg.name}，重转`);
                setTimeout(() => spinWheel(), 800);
                return;
            }

            // 处理事件
            if (seg.type === 'abstract') {
                const ab = CONFIG.abstractEvents.find(e => e.id === seg.event);
                if (ab) {
                    handleEvent(seg.event);
                } else {
                    let gain = applyCultGain(30);
                    G.cult += gain;
                    setSubtitle(`奇遇，修为+${gain}`, 'good');
                    addLog(`奇遇，修为+${gain}`);
                }
            } else if (seg.type === 'ability') {
                if (!G.abilities.includes(seg.name)) {
                    G.abilities.push(seg.name);
                    setSubtitle(`获得能力：${seg.name}`, 'good');
                    addLog(`获得能力：${seg.name}`);
                    checkAchievements();
                }
            } else if (seg.type === 'cult') {
                let gain = applyCultGain(seg.value);
                G.cult += gain;
                setSubtitle(`修为 +${gain}`, 'good');
                addLog(`修为增加 ${gain}`);
            } else if (seg.type === 'event') {
                handleEvent(seg.event);
            } else {
                let gain = applyCultGain(20);
                G.cult += gain;
                setSubtitle(`机缘，修为+${gain}`, 'good');
                addLog(`机缘，修为+${gain}`);
            }

            // ---- 统一年龄消耗（仅非event类型） ----
            if (seg.type !== 'event') {
                let ageCost;
                if (G.realmIndex === 0) ageCost = 1;
                else if (G.realmIndex <= 2) ageCost = 5;
                else ageCost = 5 * Math.pow(2, G.realmIndex - 2);
                G.age += ageCost;
            }

            // ---- 后续处理 ----
            if (G.status && G.status.includes('中毒')) G._poisonAge = (G._poisonAge || 0) + 1;
            let maxLife = CONFIG.realmLifespan[G.realmIndex] + (G._bonusLife || 0);
            if (G.age > maxLife) { triggerDeath('寿元耗尽'); return; }
            recoverStatus();
            checkAchievements();
            checkRealmDrop();
            updatePanel();
            if (G.realmIndex < 7 && G.cult >= CONFIG.realmCult[G.realmIndex + 1]) {
                attemptTribulation();
            }
        }

        // ================================================================
        //  宗门抽取、出生地、灵根测试等（与之前相同，省略）
        // ================================================================
        let sectTimer = null;
        let pendingSect = null;

        function initSectOverlay() {
            const grid = document.getElementById('sectGrid');
            if (!grid) return;
            grid.innerHTML = '';
            CONFIG.sects.forEach((s, idx) => {
                const div = document.createElement('div');
                div.className = 'sect-item';
                div.dataset.index = idx;
                div.innerHTML = `${s.name}<span class="desc">${s.desc}</span>`;
                grid.appendChild(div);
            });
            document.getElementById('sectResult').textContent = '点击「抽取」决定宗门';
            document.getElementById('drawSectBtn').disabled = false;
        }

        document.getElementById('drawSectBtn').addEventListener('click', function() {
            if (sectTimer) return;
            const btn = this;
            btn.disabled = true;
            const items = document.querySelectorAll('.sect-item');
            const resultEl = document.getElementById('sectResult');
            const targetIdx = Math.floor(Math.random() * CONFIG.sects.length);
            let count = 0,
                maxCount = 20 + Math.floor(Math.random() * 10),
                interval = 80;
            sectTimer = setInterval(() => {
                items.forEach(el => el.classList.remove('active'));
                const showIdx = Math.floor(Math.random() * items.length);
                items[showIdx].classList.add('active');
                count++;
                if (count >= maxCount) {
                    clearInterval(sectTimer);
                    sectTimer = null;
                    items.forEach(el => el.classList.remove('active'));
                    items[targetIdx].classList.add('active');
                    const sect = CONFIG.sects[targetIdx];
                    resultEl.textContent = `✨ 波照拜入「${sect.name}」— ${sect.desc} ✨`;
                    pendingSect = sect;
                    btn.disabled = false;
                    setSubtitle(`📜 ${sect.story}`, 'special');
                    addLog(`📜 ${sect.story}`);
                    setTimeout(() => {
                        document.getElementById('sectOverlay').classList.remove('show');
                        G.sect = sect.name;
                        G.sectData = sect;
                        G.sectSpecial = sect.special || '';
                        if (G.sectSpecial === 'caibup') { addLog('🌸 合欢宗秘术：采补之道，阴阳双修'); } else if (G
                            .sectSpecial === 'modao') { addLog('⚔️ 魔道宗：杀伐果断，以战养战'); }
                        document.getElementById('mainMenu').style.display = 'block';
                        setSubtitle('波照已拜入宗门，点击转盘开始修仙！', 'special');
                        drawWheel(0);
                        updatePanel();
                        pendingSect = null;
                    }, 1500);
                }
            }, interval);
        });

        let birthTimer2 = null;
        let pendingBirth2 = null;

        function initBirthOverlay() {
            const grid = document.getElementById('birthGrid');
            if (!grid) return;
            grid.innerHTML = '';
            CONFIG.birthlands.forEach((b, idx) => {
                const div = document.createElement('div');
                div.className = 'birth-item';
                div.dataset.index = idx;
                div.innerHTML = `${b.name}<span class="prob">${(b.prob*100).toFixed(0)}%</span>`;
                grid.appendChild(div);
            });
            document.getElementById('birthResult').textContent = '点击「抽取出生地」决定命运';
            document.getElementById('drawBirthBtn').disabled = false;
        }

        document.getElementById('startBtn').addEventListener('click', function() {
            document.getElementById('startOverlay').classList.remove('show');
            initBirthOverlay();
            document.getElementById('birthOverlay').classList.add('show');
        });

        document.getElementById('drawBirthBtn').addEventListener('click', function() {
            if (birthTimer2) return;
            const btn = this;
            btn.disabled = true;
            const items = document.querySelectorAll('.birth-item');
            const resultEl = document.getElementById('birthResult');
            const targetIdx = Math.floor(Math.random() * CONFIG.birthlands.length);
            let count = 0,
                maxCount = 20 + Math.floor(Math.random() * 10),
                interval = 80;
            birthTimer2 = setInterval(() => {
                items.forEach(el => el.classList.remove('active'));
                const showIdx = Math.floor(Math.random() * items.length);
                items[showIdx].classList.add('active');
                count++;
                if (count >= maxCount) {
                    clearInterval(birthTimer2);
                    birthTimer2 = null;
                    items.forEach(el => el.classList.remove('active'));
                    items[targetIdx].classList.add('active');
                    const birth = CONFIG.birthlands[targetIdx];
                    resultEl.textContent = `✨ 波照生于「${birth.name}」— ${birth.desc} ✨`;
                    pendingBirth2 = birth;
                    btn.disabled = false;
                    addLog(`🌍 波照生于「${birth.name}」，${birth.desc}`);
                    setTimeout(() => {
                        document.getElementById('birthOverlay').classList.remove('show');
                        document.getElementById('spiritOverlay').classList.add('show');
                        document.getElementById('spiritResult').textContent = '点击测试灵根';
                        document.getElementById('spiritResult').style.color = '#f5d080';
                    }, 1200);
                }
            }, interval);
        });

        document.getElementById('testSpiritBtn').addEventListener('click', function() {
            if (!pendingBirth2) return;
            const resultEl = document.getElementById('spiritResult');
            let count = 0,
                maxCount = 20,
                interval = 80;
            let timer = setInterval(() => {
                let tempQ = pick(CONFIG.spiritQuality);
                let tempCnt = pick(CONFIG.spiritCount);
                let avail = [...CONFIG.elements];
                let tempEls = [];
                for (let i = 0; i < tempCnt.count; i++) {
                    let idx = Math.floor(Math.random() * avail.length);
                    tempEls.push(avail[idx]);
                    avail.splice(idx, 1);
                }
                let suffix = tempCnt.count === 1 ? '灵根' : (tempCnt.count === 5 ? '混沌五灵根' : ['单', '双', '三', '四',
                    '五'
                ][tempCnt.count - 1] + '灵根');
                resultEl.textContent = `${tempQ.name}${tempEls.join('')}${suffix}`;
                count++;
                if (count >= maxCount) {
                    clearInterval(timer);
                    let q = drawProb(CONFIG.spiritQuality.map(s => ({ ...s, prob: s.prob })));
                    let cnt = drawProb(CONFIG.spiritCount.map(s => ({ ...s, prob: s.prob })));
                    G.spiritQ = q;
                    G.spiritCount = cnt.count;
                    let avail2 = [...CONFIG.elements];
                    let chosen = [];
                    for (let i = 0; i < cnt.count; i++) {
                        let idx = Math.floor(Math.random() * avail2.length);
                        chosen.push(avail2[idx]);
                        avail2.splice(idx, 1);
                    }
                    G.spiritElements = chosen;

                    let birth = pendingBirth2;
                    G.birthland = birth.name;
                    G.birthlandData = birth;
                    G.cult = birth.cult;
                    G.basePower = birth.power;
                    G.age = 18;
                    G.items = { '渡劫丹': 0, '疗伤药': 0, '解毒丹': 0, '替身草人': 0 };
                    birth.items.forEach(item => {
                        if (item === '疗伤药') G.items['疗伤药'] = (G.items['疗伤药'] || 0) + 1;
                        else if (item === '渡劫丹') G.items['渡劫丹'] = (G.items['渡劫丹'] || 0) + 1;
                        else if (CONFIG.allAbilities.includes(item)) {
                            if (!G.abilities.includes(item)) G.abilities.push(item);
                        }
                    });
                    if (birth.name === '紫府圣地') {
                        let keys = Object.keys(G.laws);
                        G.laws[pick(keys)] = 1;
                    }
                    G._bonusLife = birth.bonusLife || 0;
                    G._flagNearDeath = false;
                    G._flagTribPass = false;
                    G._flagCaibup = false;
                    G._flagRealmUpAfterCaibup = false;
                    G._consecutiveTrib = 0;
                    G._winVillage = false;
                    G._winArena = false;
                    G._winTourney = false;
                    G._villageFails = 0;
                    G._arenaFails = 0;
                    G._tourneyFails = 0;
                    G._gangEncounters = 0;
                    G._gangKill = 0;
                    G._sectHero = false;
                    G._dead = false;
                    G._deathCause = '';
                    G._powerBuff = 0;
                    G.logs = [];
                    G.achievements = {};
                    CONFIG.achievements.forEach(a => G.achievements[a.id] = false);

                    let finalDisplay = getSpiritDisplay();
                    resultEl.textContent = `✨ ${finalDisplay} ✨`;
                    if (q.name === '极品') resultEl.style.color = '#ffd700';
                    else resultEl.style.color = '#f5d080';

                    let spiritStory = '';
                    if (q.name === '极品') spiritStory = '天资卓越，修行之路一片坦途。';
                    else if (q.name === '上品') spiritStory = '资质上佳，勤修苦练可成大器。';
                    else if (q.name === '中品') spiritStory = '资质平平，唯有以勤补拙。';
                    else spiritStory = '资质愚钝，但心怀坚韧，亦能逆天而行。';
                    addLog(`🌱 波照的灵根为：${finalDisplay}，${spiritStory}`);

                    setTimeout(() => {
                        document.getElementById('spiritOverlay').classList.remove('show');
                        initSectOverlay();
                        document.getElementById('sectOverlay').classList.add('show');
                        pendingBirth2 = null;
                    }, 1500);
                }
            }, interval);
        });

        document.getElementById('restartBtn').addEventListener('click', function() {
            document.getElementById('endOverlay').classList.remove('show');
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('startOverlay').classList.add('show');
            document.getElementById('birthOverlay').classList.remove('show');
            document.getElementById('spiritOverlay').classList.remove('show');
            document.getElementById('sectOverlay').classList.remove('show');
            document.getElementById('spinBtn').disabled = false;
            if (birthTimer2) { clearInterval(birthTimer2);
                birthTimer2 = null; }
            if (sectTimer) { clearInterval(sectTimer);
                sectTimer = null; }
            if (tribResolve) { tribResolve = null; }
            initState();
        });

        // ================================================================
        //  按钮绑定
        // ================================================================
        document.getElementById('spinBtn').addEventListener('click', function() {
            spinWheel();
        });

        // ================================================================
        //  初始化
        // ================================================================
        initState();
        document.getElementById('mainMenu').style.display = 'none';
        document.getElementById('startOverlay').classList.add('show');
        console.log('🧘 修仙转盘 · 波途 — 擂台顺序修复、波刚战力显示与高战力设定');
    </script>
