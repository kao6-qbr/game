<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>波照仙途</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%; overflow: hidden;
  background: #1a1a2e; font-family: 'Microsoft YaHei', sans-serif;
  touch-action: none; -webkit-touch-callout: none;
  -webkit-user-select: none; user-select: none;
}
#gameWrapper {
  position: absolute; display: flex; align-items: center; justify-content: center;
  width: 100%; height: 100%;
}
#gameCanvas {
  display: block; background: #1a1a2e;
  image-rendering: pixelated;
}
#portraitHint {
  display: none; position: absolute; top: 0; left: 0;
  width: 100%; height: 100%; background: #1a1a2e;
  flex-direction: column; align-items: center; justify-content: center;
  color: #fff; font-size: 24px; z-index: 100;
}
#portraitHint .icon { font-size: 64px; margin-bottom: 20px; animation: rotatePhone 2s infinite; }
@keyframes rotatePhone {
  0%, 100% { transform: rotate(0deg); }
  50% { transform: rotate(90deg); }
}
#muteBtn {
  position: absolute; top: 12px; right: 12px; z-index: 50;
  width: 44px; height: 44px; background: rgba(0,0,0,0.5);
  border-radius: 50%; display: none; align-items: center; justify-content: center;
  cursor: pointer; font-size: 22px; color: #fff;
  border: 2px solid rgba(255,255,255,0.3);
  -webkit-tap-highlight-color: transparent;
}
#muteBtn:hover { background: rgba(0,0,0,0.7); }
/* 手机端按钮 */
#leftButtons {
  position: absolute; bottom: 10px; left: 10px; z-index: 40;
  display: none; flex-direction: column; gap: 10px;
}
.mobileBtn {
  width: 60px; height: 60px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; color: #fff;
  border: 2px solid rgba(255,255,255,0.4);
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  cursor: pointer;
  transition: opacity 0.15s;
}
#dashBtn { background: rgba(255,215,0,0.6); }
#slideBtn { background: rgba(200,200,200,0.6); }
#jumpBtn { background: rgba(76,175,80,0.6); }
.mobileBtn.cooldown { opacity: 0.35 !important; background: rgba(100,100,100,0.5) !important; }
</style>
</head>
<body>
<div id="portraitHint">
  <div class="icon">📱</div>
  <div>请旋转手机至横屏模式</div>
</div>
<div id="gameWrapper">
  <canvas id="gameCanvas"></canvas>
  <div id="leftButtons">
    <div class="mobileBtn" id="dashBtn">⚡</div>
    <div class="mobileBtn" id="slideBtn">⬇</div>
  </div>
  <div id="rightButtons">
    <div class="mobileBtn" id="jumpBtn">⬆</div>
  </div>
</div>
<div id="muteBtn" title="静音/有声">🔊</div>
<script>
(function () {
  'use strict';

  // ===================== 常量定义 =====================
  const GAME_W = 800, GAME_H = 450, GROUND_Y = GAME_H - 60;
  const GRAVITY = 0.6;
  const JUMP_VEL = -13;
  const DOUBLE_JUMP_VEL = -9.5;
  const PLAYER_X = 100;
  const PLAYER_SIZE = 60;
  const COIN_SCORE = 5;
  const SLIDE_DURATION = 24;
  const SLIDE_COOLDOWN = 48;
  const DASH_DURATION = 30;
  const DASH_COOLDOWN = 180;
  const DASH_SPEED_MULT = 2;

  // ===================== Canvas =====================
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const portraitHint = document.getElementById('portraitHint');
  const muteBtn = document.getElementById('muteBtn');
  const mobileButtons = document.getElementById('leftButtons');
  const rightButtons = document.getElementById('rightButtons');
  const dashBtnEl = document.getElementById('dashBtn');
  const slideBtnEl = document.getElementById('slideBtn');
  const jumpBtnEl = document.getElementById('jumpBtn');
  let scale = 1;
  let isMobile = false;

  function detectMobile() {
    isMobile = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
  }
  detectMobile();

  function resize() {
    const sw = window.innerWidth, sh = window.innerHeight;
    if (sw < sh ) {
      portraitHint.style.display = 'flex';
      canvas.style.display = 'none';
      muteBtn.style.display = 'none';
      leftButtons.style.display = 'none';
      rightButtons.style.display = 'none';
      return;
    }
    portraitHint.style.display = 'none';
    canvas.style.display = 'block';
    muteBtn.style.display = 'flex';
    if (isMobile) {
      leftButtons.style.display = 'flex';
      rightButtons.style.display = 'flex';
    } else {
      leftButtons.style.display = 'none';
      rightButtons.style.display = 'none';
    }
    scale = Math.min(sw / GAME_W, sh / GAME_H);
    canvas.width = GAME_W;
    canvas.height = GAME_H;
    canvas.style.width = (GAME_W * scale) + 'px';
    canvas.style.height = (GAME_H * scale) + 'px';
  }
  window.addEventListener('resize', resize);
  resize();

  let audioCtx = null, muted = localStorage.getItem('parkour_muted') === 'true';
  let bgmPlaying = false, bgmInterval = null, bgmNoteIdx = 0;
  function ensureAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }
  function updateMuteIcon() { muteBtn.innerHTML = muted ? '\ud83d\udd07' : '\ud83d\udd0a'; }
  updateMuteIcon();
  muteBtn.addEventListener('click', function (e) {
    e.stopPropagation(); ensureAudio();
    muted = !muted; localStorage.setItem('parkour_muted', muted);
    updateMuteIcon();
    if (muted) stopBGM(); else if (gameState === 'playing') startBGM();
  });
  function playTone(freq, duration, type, vol, slideFrom, slideTo) {
    if (muted || !audioCtx) return;
    const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.type = type || 'sine'; const t = audioCtx.currentTime;
    if (slideFrom !== undefined) { osc.frequency.setValueAtTime(slideFrom, t); osc.frequency.exponentialRampToValueAtTime(slideTo, t + duration); }
    else { osc.frequency.value = freq; }
    gain.gain.setValueAtTime(vol || 0.2, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
    osc.start(t); osc.stop(t + duration);
  }
  function playJumpSound() { playTone(0, 0.15, 'sine', 0.25, 300, 900); }
  function playDoubleJumpSound() { playTone(0, 0.12, 'sine', 0.25, 600, 1600); }
  function playDeathSound() { playTone(120, 0.5, 'sawtooth', 0.3, 200, 60); }
  function playDashSound() { playTone(0, 0.25, 'sawtooth', 0.2, 150, 400); }
  function playDashHitSound() { playTone(0, 0.15, 'square', 0.25, 200, 800); }
  function playSlideSound() {
    if (muted || !audioCtx) return;
    const bufferSize = audioCtx.sampleRate * 0.15;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
    const src = audioCtx.createBufferSource(), gain = audioCtx.createGain();
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass'; filter.frequency.value = 600;
    src.buffer = buffer; src.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
    src.start();
  }
  function playCoinSound() {
    if (muted || !audioCtx) return;
    const o1 = audioCtx.createOscillator(), o2 = audioCtx.createOscillator(), g = audioCtx.createGain();
    o1.connect(g); o2.connect(g); g.connect(audioCtx.destination);
    o1.type = 'sine'; o2.type = 'sine'; o1.frequency.value = 880; o2.frequency.value = 1320;
    g.gain.setValueAtTime(0.2, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
    o1.start(); o2.start(); o1.stop(audioCtx.currentTime + 0.2); o2.stop(audioCtx.currentTime + 0.2);
  }
  const BGM_MELODY = [262,294,330,349,392,349,330,294, 262,330,392,523,392,330,294,262];
  function startBGM() {
    if (muted || bgmPlaying) return; ensureAudio(); bgmPlaying = true; bgmNoteIdx = 0;
    function playNote() {
      if (!bgmPlaying || muted) return;
      playTone(BGM_MELODY[bgmNoteIdx % BGM_MELODY.length], 0.18, 'triangle', 0.06);
      bgmNoteIdx++;
    }
    playNote(); bgmInterval = setInterval(playNote, 200);
  }
  function stopBGM() { bgmPlaying = false; if (bgmInterval) { clearInterval(bgmInterval); bgmInterval = null; } }

  // ===================== 游戏状态 =====================
  let gameState = 'menu';
  let score = 0, highScore = parseInt(localStorage.getItem('parkour_highscore')) || 0;
  let gameTime = 0, baseSpeed = 3, frameCount = 0, bgOffset = 0;
  let obstacleTimer = 0, coinTimer = 0;
  let stageText = '', stageTextTimer = 0;
  let lastStageChecked = 0;
  let player = {};
  function initPlayer() {
    player = { x: PLAYER_X, y: GROUND_Y - PLAYER_SIZE, w: PLAYER_SIZE, h: PLAYER_SIZE, vy: 0, grounded: true, jumpsLeft: 2, sliding: false, slideTimer: 0, slideCooldown: 0, dashing: false, dashTimer: 0, dashCooldown: 0, dashRingTimer: 0, legAnim: 0 };
  }
  initPlayer();
  let obstacles = [], coins = [], particles = [];
  let clouds = [], mountainsArr = [];
  function initBackground() {
    clouds = [];
    for (let i = 0; i < 5; i++) clouds.push({ x: Math.random()*GAME_W, y: 30+Math.random()*100, w: 40+Math.random()*60, speed: 0.3+Math.random()*0.5 });
    mountainsArr = [];
    for (let i = 0; i < 7; i++) mountainsArr.push({ x: i*130-50, w: 80+Math.random()*60, h: 40+Math.random()*50, layer: i%2 });
  }
  initBackground();
  const playerImgSrc = 'character-transparent.png';
  let playerImg = null;
  if (playerImgSrc) { playerImg = new Image(); playerImg.src = playerImgSrc; }
  if (!ctx.roundRect) {
    CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r) {
      if (typeof r === 'number') r = [r,r,r,r];
      const [tl,tr,br,bl] = r;
      this.beginPath(); this.moveTo(x+tl,y); this.lineTo(x+w-tr,y); this.quadraticCurveTo(x+w,y,x+w,y+tr);
      this.lineTo(x+w,y+h-br); this.quadraticCurveTo(x+w,y+h,x+w-br,y+h);
      this.lineTo(x+bl,y+h); this.quadraticCurveTo(x,y+h,x,y+h-bl); this.lineTo(x,y+tl); this.quadraticCurveTo(x,y,x+tl,y);
      this.closePath(); return this;
    };
  }
  function rectsOverlap(a, b) { return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y; }
  function showStageText(text) { stageText = text; stageTextTimer = 90; }
  function resetGame() {
    initPlayer(); player.y = GROUND_Y - player.h;
    score = 0; gameTime = 0; baseSpeed = 3;
    obstacles = []; coins = []; particles = [];
    obstacleTimer = 0; coinTimer = 0; frameCount = 0; bgOffset = 0;
    stageText = ''; stageTextTimer = 0; lastStageChecked = 0;
    initBackground();
  }
  function jump() {
    if (!player.grounded && player.jumpsLeft > 0) {
      player.vy = DOUBLE_JUMP_VEL; player.jumpsLeft--; player.grounded = false;
      player.dashRingTimer = 18; playDoubleJumpSound();
      for (let i = 0; i < 6; i++) particles.push({ x: player.x+player.w/2, y: player.y+player.h/2, vx: (Math.random()-0.5)*4, vy: (Math.random()-0.5)*4, life: 15+Math.random()*10, color: '#87CEFA', size: 2+Math.random()*2 });
    } else if (player.grounded) {
      player.vy = JUMP_VEL; player.grounded = false; player.jumpsLeft = 1;
      playJumpSound();
      for (let i = 0; i < 5; i++) particles.push({ x: player.x+player.w/2, y: player.y+player.h, vx: (Math.random()-0.5)*3, vy: Math.random()*2+1, life: 20+Math.random()*10, color: '#aaa', size: 2+Math.random()*3 });
    }
  }
  function startSlide() {
    if (!player.grounded || player.sliding || player.slideCooldown > 0) return;
    player.sliding = true; player.slideTimer = SLIDE_DURATION; player.slideCooldown = SLIDE_COOLDOWN;
    player.h = PLAYER_SIZE / 2; player.y = GROUND_Y - player.h;
    playSlideSound();
  }
  function stopSlide() { player.sliding = false; player.h = PLAYER_SIZE; player.y = GROUND_Y - player.h; }
  function startDash() {
    if (player.dashing || player.dashCooldown > 0) return;
    player.dashing = true; player.dashTimer = DASH_DURATION; player.dashCooldown = DASH_COOLDOWN;
    playDashSound();
    for (let i = 0; i < 3; i++) particles.push({ x: player.x-10, y: player.y+10+i*15, vx: -3-Math.random()*2, vy: 0, life: 20, color: '#ffffff', size: 2, type: 'speedLine' });
  }

  // ===================== 障碍物生成（严格按分数阶段） =====================
  function spawnObstacle() {
    const type = determineObstacleType();
    if (type === 'ground_spike') {
      obstacles.push({ x: GAME_W+10, y: GROUND_Y-30, w: 30, h: 30, type: 'spike', hp: 1 });
    } else if (type === 'ground_rock') {
      obstacles.push({ x: GAME_W+10, y: GROUND_Y-35, w: 35, h: 35, type: 'rock', hp: 1 });
    } else if (type === 'flying') {
      obstacles.push({ x: GAME_W+10, y: GROUND_Y - 30 - 120, w: 35, h: 120, type: 'flying', hp: 1 });
    } else if (type === 'double') {
      obstacles.push({ x: GAME_W+10, y: GROUND_Y-30, w: 30, h: 30, type: 'spike', hp: 1 });
      obstacles.push({ x: GAME_W+10, y: GROUND_Y - 30 - 120, w: 35, h: 120, type: 'flying', hp: 1 });
    } else if (type === 'wall') {
      obstacles.push({ x: GAME_W+10, y: GROUND_Y-80, w: 30, h: 80, type: 'wall', hp: 1 });
    }
  }

  function determineObstacleType() {
    let r = Math.random();
    if (score <= 10) {
      // 0-10分：只有地面尖刺
      return Math.random() < 0.5 ? 'ground_spike' : 'ground_rock';
    } else if (score <= 20) {
      // 10-20分：加入飞行障碍
      if (r < 0.4) return 'ground_spike';
      if (r < 0.7) return 'ground_rock';
      return 'flying';
    } else if (score <= 30) {
      // 20-30分：加入双障碍组合
      if (r < 0.25) return 'ground_spike';
      if (r < 0.5) return 'ground_rock';
      if (r < 0.75) return 'flying';
      return 'double';
    } else if (score <= 40) {
      // 30-40分：加入高墙
      if (r < 0.2) return 'ground_spike';
      if (r < 0.35) return 'ground_rock';
      if (r < 0.55) return 'flying';
      if (r < 0.75) return 'double';
      return 'wall';
    } else if (score <= 50) {
      // 40-50分：加速+四种混合
      if (r < 0.15) return 'ground_spike';
      if (r < 0.3) return 'ground_rock';
      if (r < 0.5) return 'flying';
      if (r < 0.7) return 'double';
      return 'wall';
    } else {
      // 50分以上：全力冲刺，五种混合
      if (r < 0.12) return 'ground_spike';
      if (r < 0.25) return 'ground_rock';
      if (r < 0.45) return 'flying';
      if (r < 0.65) return 'double';
      return 'wall';
    }
  }

  function spawnCoin() {
    const y = GROUND_Y - 50 - Math.random()*100;
    coins.push({ x: GAME_W+10, y: y, r: 12, sparkle: Math.random()*Math.PI*2 });
  }

  // ===================== 碰撞检测 =====================
  function checkCollisions() {
    // 冲刺状态：无敌，撞碎障碍物
    if (player.dashing) {
      for (let i = obstacles.length-1; i >= 0; i--) {
        const ob = obstacles[i];
        const obBox = { x: ob.x, y: ob.y, w: ob.w, h: ob.h };
        const pb = { x: player.x, y: player.y, w: player.w, h: player.h };
        if (rectsOverlap(pb, obBox)) {
          playDashHitSound();
          score += COIN_SCORE;
          for (let j = 0; j < 10; j++) {
            particles.push({ x: ob.x+ob.w/2, y: ob.y+ob.h/2, vx: (Math.random()-0.5)*6, vy: (Math.random()-0.5)*6, life: 20+Math.random()*15, color: ob.type==='wall'?'#888':'#8B4513', size: 3+Math.random()*3, type: 'debris' });
          }
          obstacles.splice(i, 1);
        }
      }
      return;
    }

    // 非冲刺状态：正常碰撞检测
    for (let i = obstacles.length-1; i >= 0; i--) {
      const ob = obstacles[i];
      let hit = false;
      if (ob.type === 'spike' || ob.type === 'rock' || ob.type === 'wall') {
        // 地面/高墙：检测角色整体
        const hb = { x: player.x+5, y: player.y+5, w: player.w-10, h: player.h-10 };
        const obBox = { x: ob.x+4, y: ob.y+4, w: ob.w-8, h: ob.h-4 };
        hit = rectsOverlap(hb, obBox);
      } else if (ob.type === 'flying') {
        // 飞行障碍：检测角色上半部分
        const hb = { x: player.x+5, y: player.y+5, w: player.w-10, h: (player.h-10)/2 };
        const obBox = { x: ob.x+4, y: ob.y+4, w: ob.w-8, h: ob.h-4 };
        hit = rectsOverlap(hb, obBox);
      } else if (ob.type === 'double') {
        // 双障碍：分别检测
        // 地面部分
        const spike = ob.subObstacles && ob.subObstacles[0];
        if (spike) {
          const hb = { x: player.x+5, y: player.y+5, w: player.w-10, h: player.h-10 };
          const obBox = { x: spike.x+4, y: spike.y+4, w: spike.w-8, h: spike.h-4 };
          if (rectsOverlap(hb, obBox)) hit = true;
        }
        // 飞行部分
        if (!hit && ob.subObstacles && ob.subObstacles[1]) {
          const fly = ob.subObstacles[1];
          const hb = { x: player.x+5, y: player.y+5, w: player.w-10, h: (player.h-10)/2 };
          const obBox = { x: fly.x+4, y: fly.y+4, w: fly.w-8, h: fly.h-4 };
          if (rectsOverlap(hb, obBox)) hit = true;
        }
      }
      if (hit) { die(); return; }
    }
  }

  function checkCoins() {
    const cx = player.x+player.w/2, cy = player.y+player.h/2;
    for (let i = coins.length-1; i >= 0; i--) {
      const c = coins[i], dx = cx-c.x, dy = cy-c.y;
      if (Math.sqrt(dx*dx+dy*dy) < c.r+25) {
        score += COIN_SCORE; playCoinSound();
        for (let j = 0; j < 8; j++) { const angle = (j/8)*Math.PI*2; particles.push({ x:c.x, y:c.y, vx:Math.cos(angle)*3, vy:Math.sin(angle)*3, life:15+Math.random()*10, color:'#FFD700', size:2+Math.random()*2 }); }
        coins.splice(i, 1);
      }
    }
  }

  function checkStages() {
    const thresholds = [
      { s: 10, t: '飞行妖兽出现！' },
      { s: 20, t: '上下夹击！' },
      { s: 30, t: '高墙挡路！' },
      { s: 40, t: '加速！' },
      { s: 50, t: '全力冲刺！' }
    ];
    for (const th of thresholds) {
      if (score >= th.s && lastStageChecked < th.s) {
        showStageText(th.t);
        lastStageChecked = th.s;
      }
    }
  }

  function die() {
    gameState = 'dead'; stopBGM(); playDeathSound();
    if (score > highScore) { highScore = score; localStorage.setItem('parkour_highscore', highScore); }
    for (let i = 0; i < 25; i++) particles.push({ x: player.x+player.w/2, y: player.y+player.h/2, vx:(Math.random()-0.5)*8, vy:(Math.random()-0.5)*8, life:30+Math.random()*20, color: ['#ff6b6b','#ffa502','#ff4757'][Math.floor(Math.random()*3)], size: 3+Math.random()*4 });
  }

  // ===================== 更新 =====================
  function update() {
    if (gameState !== 'playing') return;
    frameCount++; gameTime += 1/60;
    baseSpeed = 3 + gameTime * 0.08;
    if (baseSpeed > 10) baseSpeed = 10;
    let currentSpeed = isMobile ? baseSpeed * 1.35 : (player.dashing ? baseSpeed * DASH_SPEED_MULT : baseSpeed);
    bgOffset += currentSpeed * 0.5;

    for (const c of clouds) { c.x -= c.speed + currentSpeed*0.1; if (c.x+c.w < 0) { c.x = GAME_W+Math.random()*100; c.y = 30+Math.random()*100; } }
    for (const m of mountainsArr) { m.x -= currentSpeed * (m.layer===0 ? 0.15 : 0.3); if (m.x+m.w < -50) m.x = GAME_W+Math.random()*100; }

    if (!player.grounded) {
      player.vy += GRAVITY; player.y += player.vy;
      if (player.y+player.h >= GROUND_Y) { player.y = GROUND_Y-player.h; player.vy = 0; player.grounded = true; player.jumpsLeft = 2; }
    }

    if (player.sliding) {
      player.slideTimer--;
      if (frameCount % 3 === 0) particles.push({ x: player.x+player.w/2-Math.random()*20, y: player.y+player.h, vx: -1-Math.random()*2, vy: -Math.random()*1.5, life: 15+Math.random()*10, color: '#8B7355', size: 2+Math.random()*3 });
      if (player.slideTimer <= 0) stopSlide();
    }
    if (player.slideCooldown > 0) player.slideCooldown--;

    if (player.dashing) {
      player.dashTimer--;
      if (frameCount % 5 === 0) { for (let i = 0; i < 2; i++) particles.push({ x: player.x-5, y: player.y+5+i*20, vx: -5-Math.random()*3, vy: 0, life: 15, color: '#ffffff', size: 2, type: 'speedLine' }); }
      if (player.dashTimer <= 0) player.dashing = false;
    }
    if (player.dashCooldown > 0) player.dashCooldown--;
    if (player.dashRingTimer > 0) player.dashRingTimer--;
    player.legAnim = player.grounded ? Math.sin(frameCount*0.3)*6 : -3;

    // 障碍生成间隔随阶段变化
    let spawnInterval;
    if (score <= 10) spawnInterval = 120;
    else if (score <= 20) spawnInterval = 108;
    else if (score <= 30) spawnInterval = 90;
    else if (score <= 40) spawnInterval = 72;
    else if (score <= 50) spawnInterval = 60;
    else spawnInterval = 60;
    spawnInterval = Math.max(spawnInterval - gameTime*0.5, 40);

    obstacleTimer++;
    if (obstacleTimer >= spawnInterval) { obstacleTimer = 0; spawnObstacle(); }
    coinTimer++;
    if (coinTimer >= 70) { coinTimer = 0; spawnCoin(); }

    for (let i = obstacles.length-1; i >= 0; i--) { obstacles[i].x -= currentSpeed; if (obstacles[i].x+obstacles[i].w < -20) obstacles.splice(i,1); }
    checkCollisions();
    for (let i = coins.length-1; i >= 0; i--) { coins[i].x -= currentSpeed; coins[i].sparkle += 0.1; if (coins[i].x+coins[i].r < -10) coins.splice(i,1); }
    checkCoins();
    checkStages();

    for (let i = particles.length-1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx || 0; p.y += p.vy || 0;
      if (p.type !== 'speedLine' && p.vy !== undefined) p.vy += 0.1;
      p.life--;
      if (p.life <= 0) particles.splice(i,1);
    }
    if (stageTextTimer > 0) stageTextTimer--;
  }

  // ===================== 绘制：背景 =====================
  function drawSky() {
    const grad = ctx.createLinearGradient(0,0,0,GROUND_Y);
    grad.addColorStop(0, '#1a1a4e'); grad.addColorStop(0.5, '#4a90d9'); grad.addColorStop(1, '#87CEEB');
    ctx.fillStyle = grad; ctx.fillRect(0,0,GAME_W,GROUND_Y);
  }
  function drawMountains() {
    for (const m of mountainsArr) {
      ctx.fillStyle = m.layer===0 ? '#5a7a5a' : '#7a9a6a';
      ctx.beginPath(); ctx.moveTo(m.x, GROUND_Y); ctx.lineTo(m.x+m.w/2, GROUND_Y-m.h); ctx.lineTo(m.x+m.w, GROUND_Y); ctx.closePath(); ctx.fill();
    }
  }
  function drawClouds() {
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    for (const c of clouds) {
      ctx.beginPath(); ctx.arc(c.x, c.y, c.w*0.3, 0, Math.PI*2); ctx.arc(c.x+c.w*0.25, c.y-5, c.w*0.25, 0, Math.PI*2); ctx.arc(c.x+c.w*0.5, c.y, c.w*0.3, 0, Math.PI*2); ctx.fill();
    }
  }
  function drawGround() {
    ctx.fillStyle = '#4CAF50'; ctx.fillRect(0, GROUND_Y, GAME_W, GAME_H-GROUND_Y);
    ctx.fillStyle = '#388E3C';
    for (let i = -((bgOffset%20)+0); i < GAME_W; i += 20) ctx.fillRect(i, GROUND_Y, 2, 8);
    ctx.fillStyle = '#8B6914'; ctx.fillRect(0, GROUND_Y+10, GAME_W, GAME_H-GROUND_Y-10);
  }
  function drawPlayer() {
    const px = player.x, py = player.y;
    if (player.dashing) {
      ctx.strokeStyle = 'rgba(100,180,255,0.6)'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.ellipse(px+player.w/2, py+player.h/2, player.w/2+8, player.h/2+8, 0, 0, Math.PI*2); ctx.stroke();
    }
    if (player.dashRingTimer > 0) {
      const prog = 1 - player.dashRingTimer/18, radius = 20 + prog * 30, alpha = 1 - prog;
      ctx.strokeStyle = 'rgba(135,206,250,' + alpha + ')'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(px+player.w/2, py+player.h/2, radius, 0, Math.PI*2); ctx.stroke();
    }
    if (playerImg && playerImg.complete && playerImg.naturalWidth > 0) {
      ctx.save();
      if (player.sliding) { ctx.translate(px+player.w/2, py+player.h/2); ctx.rotate(Math.PI/2); ctx.drawImage(playerImg, -player.h/2, -player.w/2, player.h, player.w); }
      else { ctx.drawImage(playerImg, px, py, player.w, player.h); }
      ctx.restore();
    } else {
      if (player.sliding) {
        ctx.fillStyle = '#FF5722'; ctx.fillRect(px, py, player.w, player.h);
        ctx.fillStyle = '#E64A19'; ctx.fillRect(px+5, py+3, 12, 8);
      } else {
        ctx.fillStyle = '#FF5722'; ctx.fillRect(px+5, py+15, player.w-10, player.h-20);
        ctx.fillStyle = '#E64A19'; const legOff = player.legAnim;
        ctx.fillRect(px+10, py+player.h-10, 8, 10+legOff); ctx.fillRect(px+player.w-18, py+player.h-10, 8, 10-legOff);
        ctx.fillStyle = '#fff'; ctx.fillRect(px+player.w-20, py+20, 10, 10);
        ctx.fillStyle = '#000'; ctx.fillRect(px+player.w-16, py+22, 5, 5);
      }
    }
  }

  // ===================== 绘制：障碍物 =====================
  function drawSpike(o) {
    ctx.fillStyle = '#8B4513'; ctx.beginPath(); ctx.moveTo(o.x, o.y+o.h); ctx.lineTo(o.x+o.w/2, o.y); ctx.lineTo(o.x+o.w, o.y+o.h); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#654321'; ctx.lineWidth = 2; ctx.stroke();
  }
  function drawRock(o) {
    ctx.fillStyle = '#808080'; ctx.beginPath(); ctx.arc(o.x+o.w/2, o.y+o.h/2, o.w/2, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#696969'; ctx.lineWidth = 2; ctx.stroke();
  }
  function drawFlying(o) {
    // 高大的紫色妖兽，从半空延伸到接近地面
    ctx.fillStyle = '#8B5CF6';
    // 主体长条
    ctx.beginPath();
    ctx.roundRect(o.x, o.y, o.w, o.h, 8);
    ctx.fill();
    // 翅膀
    ctx.fillStyle = '#7C3AED';
    const wingFlap = Math.sin(frameCount*0.3)*8;
    ctx.beginPath(); ctx.moveTo(o.x, o.y+o.h*0.3); ctx.lineTo(o.x-15, o.y+o.h*0.3+wingFlap); ctx.lineTo(o.x-5, o.y+o.h*0.3+8); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(o.x+o.w, o.y+o.h*0.3); ctx.lineTo(o.x+o.w+15, o.y+o.h*0.3-wingFlap); ctx.lineTo(o.x+o.w+5, o.y+o.h*0.3+8); ctx.closePath(); ctx.fill();
    // 眼睛（上半部分）
    ctx.fillStyle = '#FF0000';
    ctx.beginPath(); ctx.arc(o.x+o.w/2-5, o.y+15, 4, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(o.x+o.w/2+5, o.y+15, 4, 0, Math.PI*2); ctx.fill();
    // 嘴（下半部分）
    ctx.fillStyle = '#CC0000';
    ctx.beginPath(); ctx.arc(o.x+o.w/2, o.y+o.h-12, 6, 0, Math.PI); ctx.fill();
    // 尖牙
    ctx.fillStyle = '#FFF';
    ctx.fillRect(o.x+o.w/2-8, o.y+o.h-12, 3, 6);
    ctx.fillRect(o.x+o.w/2-2, o.y+o.h-12, 3, 6);
    ctx.fillRect(o.x+o.w/2+4, o.y+o.h-12, 3, 6);
  }
  function drawWall(o) {
    ctx.fillStyle = '#696969'; ctx.fillRect(o.x, o.y, o.w, o.h);
    ctx.strokeStyle = '#555'; ctx.lineWidth = 2;
    for (let row = 0; row < o.h; row += 15) { ctx.beginPath(); ctx.moveTo(o.x, o.y+row); ctx.lineTo(o.x+o.w, o.y+row); ctx.stroke(); }
    // 向上箭头
    ctx.fillStyle = '#FF4444'; ctx.font = 'bold 16px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('\u2191', o.x+o.w/2, o.y+o.h/2+6);
  }
  function drawDouble(o) {
    // 地面尖刺
    drawSpike({ x: o.x, y: o.y, w: o.w, h: o.h });
    // 飞行障碍
    const flyY = o.y - 100 - o.h;
    ctx.fillStyle = '#8B5CF6';
    ctx.beginPath(); ctx.arc(o.x+o.w/2, flyY+12, 17, 0, Math.PI*2); ctx.fill();
    // 中间虚线提示
    ctx.strokeStyle = 'rgba(255,0,0,0.4)'; ctx.lineWidth = 1; ctx.setLineDash([3,3]);
    ctx.beginPath(); ctx.moveTo(o.x+o.w/2, o.y); ctx.lineTo(o.x+o.w/2, flyY+25); ctx.stroke();
    ctx.setLineDash([]);
  }
  function drawCoin(c) {
    const glow = 0.5 + 0.5*Math.sin(c.sparkle);
    ctx.fillStyle = '#FFD700'; ctx.beginPath(); ctx.arc(c.x, c.y, c.r, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,200,' + glow + ')'; ctx.beginPath(); ctx.arc(c.x-3, c.y-3, c.r*0.4, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#DAA520'; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(c.x, c.y, c.r, 0, Math.PI*2); ctx.stroke();
  }
  function drawParticles() {
    for (const p of particles) {
      const alpha = Math.min(1, p.life / 30); ctx.globalAlpha = alpha;
      if (p.type === 'speedLine') {
        ctx.strokeStyle = p.color; ctx.lineWidth = p.size;
        ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.x + 20 + (30-p.life), p.y); ctx.stroke();
      } else {
        ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
      }
      ctx.globalAlpha = 1;
    }
  }

  // ===================== 绘制：UI =====================
  function drawUI() {
    ctx.fillStyle = '#fff'; ctx.font = 'bold 20px "Microsoft YaHei",sans-serif'; ctx.textAlign = 'center';
    ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = 4;
    ctx.fillText('波照仙途', GAME_W/2, 30); ctx.shadowBlur = 0;
    ctx.textAlign = 'right'; ctx.font = 'bold 22px "Microsoft YaHei",sans-serif';
    ctx.fillStyle = '#FFD700'; ctx.fillText('分数: ' + score, GAME_W-20, 30);
    drawDashCooldownIcon();
    if (stageTextTimer > 0) {
      const alpha = stageTextTimer > 60 ? (90-stageTextTimer)/30 : stageTextTimer/60;
      ctx.globalAlpha = alpha; ctx.textAlign = 'center'; ctx.font = 'bold 28px "Microsoft YaHei",sans-serif';
      ctx.fillStyle = '#FFD700'; ctx.shadowColor = 'rgba(0,0,0,0.8)'; ctx.shadowBlur = 6;
      ctx.fillText(stageText, GAME_W/2, GAME_H/2 - 40); ctx.shadowBlur = 0; ctx.globalAlpha = 1;
    }
  }
  function drawDashCooldownIcon() {
    const iconX = 30, iconY = GAME_H - 35, iconR = 16;
    ctx.save(); ctx.beginPath(); ctx.arc(iconX, iconY, iconR, 0, Math.PI*2); ctx.closePath();
    if (player.dashCooldown > 0) {
      ctx.fillStyle = 'rgba(100,100,100,0.7)'; ctx.fill();
      const progress = 1 - player.dashCooldown / DASH_COOLDOWN;
      ctx.strokeStyle = '#88BBFF'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(iconX, iconY, iconR, -Math.PI/2, -Math.PI/2 + Math.PI*2*progress); ctx.stroke();
    } else if (player.dashing) { ctx.fillStyle = 'rgba(100,180,255,0.7)'; ctx.fill(); }
    else { ctx.fillStyle = 'rgba(30,144,255,0.8)'; ctx.fill(); }
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5; ctx.stroke();
    ctx.fillStyle = '#fff'; ctx.font = '10px "Microsoft YaHei",sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('冲刺', iconX, iconY + iconR + 12);
    ctx.restore();
  }

  // ===================== 绘制：菜单/结束 =====================
  function drawMenu() {
    drawSky(); drawMountains(); drawClouds(); drawGround();
    ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0,0,GAME_W,GAME_H);
    ctx.textAlign = 'center'; ctx.fillStyle = '#FFD700'; ctx.font = 'bold 48px "Microsoft YaHei",sans-serif';
    ctx.shadowColor = 'rgba(0,0,0,0.8)'; ctx.shadowBlur = 8;
    ctx.fillText('波照仙途', GAME_W/2, GAME_H/2 - 40); ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff'; ctx.font = '18px "Microsoft YaHei",sans-serif';
    ctx.fillText('空格/点击跳跃  \u2193滑铲  Shift冲刺', GAME_W/2, GAME_H/2 + 10);
    const btnW = 220, btnH = 55, btnX = GAME_W/2-btnW/2, btnY = GAME_H/2+40;
    ctx.fillStyle = '#4CAF50'; ctx.beginPath(); ctx.roundRect(btnX,btnY,btnW,btnH,12); ctx.fill();
    ctx.strokeStyle = '#81C784'; ctx.lineWidth = 2; ctx.beginPath(); ctx.roundRect(btnX,btnY,btnW,btnH,12); ctx.stroke();
    ctx.fillStyle = '#fff'; ctx.font = 'bold 24px "Microsoft YaHei",sans-serif';
    ctx.fillText('点击开始', GAME_W/2, btnY+btnH/2+8);
    if (highScore > 0) { ctx.fillStyle = 'rgba(255,255,255,0.7)'; ctx.font = '16px "Microsoft YaHei",sans-serif'; ctx.fillText('最高分: ' + highScore, GAME_W/2, btnY + btnH + 30); }
  }
  function drawGameOver() {
    ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0,0,GAME_W,GAME_H);
    ctx.textAlign = 'center'; ctx.fillStyle = '#ff6b6b'; ctx.font = 'bold 40px "Microsoft YaHei",sans-serif';
    ctx.fillText('游戏结束', GAME_W/2, GAME_H/2 - 30);
    ctx.fillStyle = '#fff'; ctx.font = '24px "Microsoft YaHei",sans-serif';
    ctx.fillText('得分: ' + score, GAME_W/2, GAME_H/2 + 15);
    if (score >= highScore && score > 0) {
      ctx.fillStyle = '#FFD700'; ctx.font = 'bold 18px "Microsoft YaHei",sans-serif';
      ctx.fillText('\ud83c\udf89 新纪录!', GAME_W/2, GAME_H/2 + 45);
    } else {
      ctx.fillStyle = 'rgba(255,255,255,0.6)'; ctx.font = '16px "Microsoft YaHei",sans-serif';
      ctx.fillText('最高分: ' + highScore, GAME_W/2, GAME_H/2 + 45);
    }
    const btnW=200, btnH=50, btnX=GAME_W/2-btnW/2, btnY=GAME_H/2+70;
    ctx.fillStyle = '#4CAF50'; ctx.beginPath(); ctx.roundRect(btnX,btnY,btnW,btnH,12); ctx.fill();
    ctx.strokeStyle = '#81C784'; ctx.lineWidth = 2; ctx.beginPath(); ctx.roundRect(btnX,btnY,btnW,btnH,12); ctx.stroke();
    ctx.fillStyle = '#fff'; ctx.font = 'bold 22px "Microsoft YaHei",sans-serif';
    ctx.fillText('再来一次', GAME_W/2, btnY+btnH/2+7);
  }

  // ===================== 主渲染 =====================
  function draw() {
    ctx.clearRect(0,0,GAME_W,GAME_H);
    if (gameState === 'menu') { drawMenu(); }
    else if (gameState === 'playing' || gameState === 'dead') {
      drawSky(); drawMountains(); drawClouds(); drawGround();
      for (const o of obstacles) {
        if (o.type==='spike') drawSpike(o);
        else if (o.type==='rock') drawRock(o);
        else if (o.type==='flying') drawFlying(o);
        else if (o.type==='wall') drawWall(o);
        else if (o.type==='double') drawDouble(o);
      }
      for (const c of coins) drawCoin(c);
      if (gameState === 'playing') drawPlayer();
      drawParticles(); drawUI();
      if (gameState === 'dead') drawGameOver();
    }
  }

  function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }

  // ===================== 输入处理 =====================
  let touchStartY = 0, touchStartTouches = 0;

  function handleJump(e) {
    if (e) e.preventDefault();
    ensureAudio();
    if (gameState === 'menu') { resetGame(); gameState = 'playing'; startBGM(); }
    else if (gameState === 'playing') { jump(); }
    else if (gameState === 'dead') { resetGame(); gameState = 'playing'; startBGM(); }
  }
  function handleSlide(e) {
    if (e) e.preventDefault(); ensureAudio();
    if (gameState === 'playing') startSlide();
  }
  function handleDash(e) {
    if (e) e.preventDefault(); ensureAudio();
    if (gameState === 'playing') startDash();
  }

  // 键盘
  document.addEventListener('keydown', function(e) {
    ensureAudio();
    if (e.code === 'Space' || e.key === ' ') { e.preventDefault(); handleJump(e); }
    else if (e.code === 'ArrowDown' || e.key === 'ArrowDown') { e.preventDefault(); handleSlide(e); }
    else if (e.code === 'ShiftLeft' || e.code === 'ShiftRight' || e.key === 'Shift') { e.preventDefault(); handleDash(e); }
  });

  // 触摸：右侧跳跃，左下按钮冲刺/滑铲
  canvas.addEventListener('touchstart', function(e) {
    e.preventDefault(); ensureAudio();
    const touches = e.touches;
    touchStartTouches = touches.length;
    touchStartY = touches[0] ? touches[0].clientY : 0;
    if (touches.length >= 2) { handleDash(e); return; }
  }, { passive: false });

  canvas.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });

  canvas.addEventListener('touchend', function(e) {
    e.preventDefault();
    if (gameState !== 'playing') { handleJump(e); return; }
    const touches = e.changedTouches;
    if (touches.length === 0) return;
    const touch = touches[0];
    const rect = canvas.getBoundingClientRect();
    const relY = (touch.clientY - rect.top) / scale;
    if (touchStartTouches === 1 && relY > GAME_H / 2) { handleSlide(e); }
    else { handleJump(e); }
  }, { passive: false });

  // 鼠标
  canvas.addEventListener('mousedown', function(e) {
    ensureAudio();
    if (gameState === 'playing') { jump(); }
    else { handleJump(e); }
  });

  // 手机端按钮
  dashBtnEl.addEventListener('touchstart', function(e) {
    e.preventDefault(); e.stopPropagation();
    handleDash(e);
  }, { passive: false });
  dashBtnEl.addEventListener('mousedown', function(e) {
    e.preventDefault(); e.stopPropagation();
    handleDash(e);
  });

  slideBtnEl.addEventListener('touchstart', function(e) {
    e.preventDefault(); e.stopPropagation();
    handleSlide(e);
  }, { passive: false });
  slideBtnEl.addEventListener('mousedown', function(e) {
    e.preventDefault(); e.stopPropagation();
    handleSlide(e);
  });

  // 手机端跳跃按钮
  jumpBtnEl.addEventListener('touchstart', function(e) {
    e.stopPropagation();
    handleJump();
  }, { passive: false });
  jumpBtnEl.addEventListener('mousedown', function(e) {
    e.stopPropagation();
    handleJump();
  });

  document.addEventListener('dblclick', function(e) { e.preventDefault(); });

  gameLoop();
})();
</script>
</body>
</html>
